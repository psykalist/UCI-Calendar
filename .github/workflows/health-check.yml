name: Health Check & Auto-Repair

# Runs:
#   - Whenever heal.py pushes status.json from your local machine
#   - Every 6 hours on schedule (catches cases where local machine is off)
#   - Manually from the Actions tab

on:
  push:
    paths:
      - 'status.json'
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:
    inputs:
      force_scrape:
        description: 'Force re-run scraper even if data is fresh'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  health-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      # -- Setup ---------------------------------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name  'UCI Calendar Bot'
          git config --global user.email 'uci-bot@users.noreply.github.com'

      - name: Pull latest (avoid stale checkout)
        run: git pull --rebase origin main || git pull origin main

      # -- Read current status -------------------------------------------------
      - name: Read status.json
        id: status
        run: |
          python - <<'EOF'
          import json, os, sys
          from datetime import datetime, timezone

          overall    = "unknown"
          age_hours  = 999
          data_valid = False
          missing_sp = 999

          if os.path.exists("status.json"):
              try:
                  s = json.load(open("status.json"))
                  overall    = s.get("overall", "unknown")
                  d          = s.get("data", {})
                  age_hours  = d.get("data_age_hours", 999)
                  data_valid = "data_size_kb" in d and d.get("data_size_kb", 0) > 200
                  missing_sp = d.get("specialties_missing", 0)
                  print(f"status.json: overall={overall}, age={age_hours}h, valid={data_valid}")
              except Exception as e:
                  print(f"Could not parse status.json: {e}")
                  overall = "error"
          else:
              print("No status.json found -- treating as unknown")
              overall = "unknown"

          force = os.environ.get("FORCE_SCRAPE", "false").lower() == "true"
          need_scrape = (
              force
              or overall in ("error", "unknown")
              or age_hours > 26
              or not data_valid
          )

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"overall={overall}\n")
              out.write(f"age_hours={age_hours}\n")
              out.write(f"need_scrape={'true' if need_scrape else 'false'}\n")

          print(f"need_scrape={need_scrape}")
          EOF
        env:
          FORCE_SCRAPE: ${{ github.event.inputs.force_scrape }}

      # -- Validate data.json --------------------------------------------------
      - name: Validate data.json
        run: |
          python - <<'EOF'
          import json, sys, os, subprocess
          errors = []

          if not os.path.exists("data.json"):
              errors.append("data.json missing")
          else:
              size_kb = os.path.getsize("data.json") // 1024
              try:
                  data = json.load(open("data.json"))
                  print(f"data.json: {size_kb} KB, valid JSON")
                  if size_kb < 200:
                      errors.append(f"data.json too small: {size_kb} KB")
              except json.JSONDecodeError as e:
                  errors.append(f"data.json invalid JSON: {e}")

          if errors:
              print("Attempting restore from previous commit...")
              commits = subprocess.run(
                  ["git", "log", "--oneline", "-20"], capture_output=True, text=True
              ).stdout.splitlines()
              for line in commits:
                  sha = line.split()[0]
                  msg = " ".join(line.split()[1:])
                  if "heal:" in msg or "status" in msg.lower():
                      continue
                  r2 = subprocess.run(["git", "show", f"{sha}:data.json"], capture_output=True)
                  if r2.returncode == 0:
                      try:
                          json.loads(r2.stdout)
                          with open("data.json", "wb") as f:
                              f.write(r2.stdout)
                          print(f"Restored data.json from commit {sha}: {msg}")
                          break
                      except:
                          continue
          EOF

      # -- Re-scrape if needed -------------------------------------------------
      - name: Run scraper
        if: steps.status.outputs.need_scrape == 'true'
        run: |
          echo "Data needs refresh (age=${{ steps.status.outputs.age_hours }}h)"
          cp data.json data_old.json 2>/dev/null || echo '{}' > data_old.json
          python scraper.py --results-only
          python detect_changes.py data_old.json data.json changelog.json
          rm -f data_old.json

      - name: Skip scrape (data is fresh)
        if: steps.status.outputs.need_scrape == 'false'
        run: echo "Data is fresh (${{ steps.status.outputs.age_hours }}h old) -- skipping scrape."

      # -- Write CI status.json ------------------------------------------------
      - name: Write CI status.json
        run: |
          python - <<'EOF'
          import json, os, sys
          from datetime import datetime, timezone

          errors = []
          warnings = []
          info = {}

          if not os.path.exists("data.json"):
              errors.append("data.json missing after scrape")
          else:
              size_kb = os.path.getsize("data.json") // 1024
              info["data_size_kb"] = size_kb
              try:
                  data = json.load(open("data.json"))
                  for key in ("upcoming", "recent", "teams"):
                      n = len(data.get(key, []))
                      info[f"data_{key}"] = n
                      if n == 0:
                          warnings.append(f"data.json has no {key}")
                  info["rider_profiles"] = len(data.get("rider_profiles", {}))
                  scraped = data.get("scraped_at", "")
                  info["scraped_at"] = scraped
                  if scraped:
                      dt = datetime.fromisoformat(scraped.replace("Z", "+00:00"))
                      age_h = (datetime.now(timezone.utc) - dt).total_seconds() / 3600
                      info["data_age_hours"] = round(age_h, 1)
                      if age_h > 72:
                          errors.append(f"data.json still {age_h:.0f}h old after scrape")
              except json.JSONDecodeError as e:
                  errors.append(f"data.json invalid JSON: {e}")

          if os.path.exists("index.html"):
              sz = os.path.getsize("index.html")
              info["index_html_bytes"] = sz
              if sz < 80_000:
                  errors.append(f"index.html too small: {sz} bytes")
          else:
              errors.append("index.html missing")

          overall = "error" if errors else ("warning" if warnings else "ok")
          status = {
              "updated_at": datetime.now(timezone.utc).isoformat(),
              "source": "ci",
              "overall": overall,
              "errors": errors,
              "warnings": warnings,
              "repairs": [],
              "data": info,
          }
          with open("status.json", "w") as f:
              json.dump(status, f, indent=2)

          print(f"STATUS: {overall.upper()}")
          for e in errors:   print(f"  x {e}")
          for w in warnings: print(f"  ! {w}")

          if errors:
              sys.exit(1)
          EOF

      # -- Commit and push -----------------------------------------------------
      - name: Commit and push
        run: |
          git add data.json changelog.json status.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "heal(ci): auto-repair ${TIMESTAMP}"
            git push
          fi
