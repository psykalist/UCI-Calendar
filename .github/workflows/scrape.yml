name: Update UCI Race Data

# Runs results-only scrape -- fetches ONLY new stage results and classifications
# for currently live races. Does NOT re-scrape teams, rider profiles, or the
# full calendar. Those are static and must be run manually when needed.
#
# To run a full scrape manually:  python scraper.py              (local only)
# To refresh teams manually:      python scraper.py --teams-only (local only)
#
# Runner: self-hosted Windows machine (no WSL) -- uses pwsh + python shells

on:
  schedule:
    - cron: '0 11 * * *'  # 11am UTC -- catches morning stage finishes
    - cron: '0 17 * * *'  # 5pm UTC  -- catches afternoon stage finishes
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git + pull latest
        shell: pwsh
        run: |
          git config --global user.name  'UCI Calendar Bot'
          git config --global user.email 'uci-bot@users.noreply.github.com'
          git pull --rebase origin main
          if ($LASTEXITCODE -ne 0) { git pull origin main }

      - name: Save old data.json for change detection
        shell: pwsh
        run: |
          if (Test-Path data.json) {
            Copy-Item data.json data_old.json
          } else {
            '{"live":[],"upcoming":[],"recent":[],"teams":[]}' | Out-File data_old.json -Encoding utf8
          }

      - name: Check cyclingflash.com reachability
        id: reachability
        shell: python
        run: |
          import urllib.request, os
          try:
              req = urllib.request.Request(
                  'https://cyclingflash.com/races.php?category=1&filter=Filter&p=uci&s=latest-results',
                  headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f'cyclingflash.com reachable -- HTTP {r.status}')
                  reachable = True
          except Exception as e:
              print(f'cyclingflash.com unreachable: {e}')
              reachable = False
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'reachable={"true" if reachable else "false"}\n')

      - name: Run results-only scraper
        if: steps.reachability.outputs.reachable == 'true'
        shell: pwsh
        run: python scraper.py --results-only

      - name: Strip any women's races from data.json
        if: steps.reachability.outputs.reachable == 'true'
        shell: python
        run: |
          import json
          WOMEN_KEYWORDS = ['women', 'ladies', 'femmes', 'dames']
          WOMEN_CATS = {'1.WWT','2.WWT','1.W','2.W','1.1W','2.1W'}
          with open('data.json') as f:
              d = json.load(f)
          removed = 0
          for key in ('live', 'upcoming', 'recent'):
              before = len(d.get(key, []))
              d[key] = [r for r in d.get(key, [])
                        if not any(w in (r.get('name', '') or '').lower() for w in WOMEN_KEYWORDS)
                        and (r.get('category', '') or '') not in WOMEN_CATS]
              removed += before - len(d[key])
          if removed:
              with open('data.json', 'w') as f:
                  json.dump(d, f, ensure_ascii=False, separators=(',', ':'))
              print(f'Removed {removed} womens race(s)')
          else:
              print('No womens races found')

      - name: Detect changes and update changelog
        if: steps.reachability.outputs.reachable == 'true'
        shell: pwsh
        run: python detect_changes.py data_old.json data.json changelog.json

      - name: Clean up temp file
        shell: pwsh
        run: Remove-Item -ErrorAction SilentlyContinue data_old.json

      - name: Generate auto-team opponents (best_teams.json)
        if: steps.reachability.outputs.reachable == 'true'
        shell: pwsh
        run: python generate_best_teams.py

      - name: Commit and push if data changed
        shell: pwsh
        run: |
          git add data.json changelog.json best_teams.json
          $diff = git diff --staged --quiet
          if ($LASTEXIT