name: Update UCI Race Data

# Runs results-only scrape -- fetches ONLY new stage results and classifications
# for currently live races. Does NOT re-scrape teams, rider profiles, or the
# full calendar. Those are static and must be run manually when needed.
#
# To run a full scrape manually:  python scraper.py              (local only)
# To refresh teams manually:      python scraper.py --teams-only (local only)
#
# Runner: self-hosted Windows machine -- uses cmd + python shells (no WSL/pwsh needed)

on:
  schedule:
    - cron: '0 11 * * *'  # 11am UTC -- catches morning stage finishes
    - cron: '0 17 * * *'  # 5pm UTC  -- catches afternoon stage finishes
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

# The self-hosted Windows runner's console codepage is cp1252, not UTF-8.
# Every script here (and scraper.py/detect_changes.py/generate_best_teams.py)
# prints unicode symbols like checkmark/cross/warning. Without forcing UTF-8
# mode, the first such print crashes with UnicodeEncodeError and kills the
# step (exit code 1) -- even on the success path.
env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  scrape:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # The runner service has no interactive user profile, so it only sees
      # the machine-wide PATH -- not whatever PATH your own logged-in
      # Windows account has. If Python was installed "for me only" (the
      # python.org installer default), its folder lives under a user
      # profile the service never sees, so "shell: python" steps below fail
      # with "python: command not found" even though Python works fine when
      # you run it yourself. This step searches the usual install locations
      # and adds whichever one it finds to GITHUB_PATH.
      - name: Locate Python and add it to PATH
        shell: powershell
        run: |
          $found = $null

          # 1) py launcher -- works even when python.exe itself isn't on PATH
          try {
            $viaPy = & py -3 -c "import sys; print(sys.executable)" 2>$null
            if ($LASTEXITCODE -eq 0 -and $viaPy) { $found = Split-Path $viaPy }
          } catch {}

          # 2) where.exe -- catches installs on PATH that our candidate list
          # below doesn't know about, while skipping 0-byte Microsoft Store
          # app-execution-alias stubs (those just pop the Store, not Python).
          if (-not $found) {
            foreach ($exe in @('python.exe','python3.exe')) {
              try {
                $whereOut = & where.exe $exe 2>$null
                if ($LASTEXITCODE -eq 0 -and $whereOut) {
                  foreach ($line in ($whereOut -split "`r?`n")) {
                    if ($line -and (Test-Path $line) -and ((Get-Item $line).Length -gt 0)) {
                      $found = Split-Path $line
                      break
                    }
                  }
                }
              } catch {}
              if ($found) { break }
            }
          }

          # 3) Windows registry -- python.org/winget installers register here
          # regardless of PATH, so this survives PATH getting reset by a
          # Windows or Git update.
          if (-not $found) {
            $regRoots = @(
              'HKLM:\SOFTWARE\Python\PythonCore',
              'HKLM:\SOFTWARE\WOW6432Node\Python\PythonCore',
              'HKCU:\SOFTWARE\Python\PythonCore'
            )
            foreach ($root in $regRoots) {
              if (Test-Path $root) {
                $versions = Get-ChildItem $root -ErrorAction SilentlyContinue | Sort-Object Name -Descending
                foreach ($v in $versions) {
                  $ip = Get-ItemProperty -Path (Join-Path $v.PSPath 'InstallPath') -ErrorAction SilentlyContinue
                  $dir = $ip.'(default)'
                  if ($dir -and (Test-Path (Join-Path $dir 'python.exe'))) { $found = $dir.TrimEnd('\'); break }
                }
              }
              if ($found) { break }
            }
          }

          # 4) Filesystem sweep of common install locations (original
          # fallback, now also checking Chocolatey's install dir).
          if (-not $found) {
            $candidates = @()
            $candidates += Get-ChildItem "C:\Program Files\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\Program Files (x86)\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\Users\*\AppData\Local\Programs\Python\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\ProgramData\chocolatey\lib\python*\tools" -Directory -ErrorAction SilentlyContinue
            $match = $candidates | Where-Object { Test-Path (Join-Path $_.FullName "python.exe") } | Sort-Object FullName -Descending | Select-Object -First 1
            if ($match) { $found = $match.FullName }
          }

          if (-not $found) {
            Write-Error "Could not locate python.exe via py launcher, where.exe, registry, or filesystem search. Install Python 'for all users' (so it's machine-wide, not user-profile-only -- the runner service can't see user profiles), or add its folder to this runner's system PATH manually."
            exit 1
          }
          Write-Host "Found Python at: $found"
          Add-Content -Path $env:GITHUB_PATH -Value $found
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $found "Scripts")

      - name: Configure git + pull latest
        shell: cmd
        run: |
          git config user.name "UCI Calendar Bot"
          git config user.email "uci-bot@users.noreply.github.com"
          git pull --rebase origin main || git pull origin main

      - name: Save old data.json for change detection
        shell: python
        run: |
          import shutil, os
          if os.path.exists('data.json'):
              shutil.copy('data.json', 'data_old.json')
          else:
              with open('data_old.json', 'w') as f:
                  f.write('{"live":[],"upcoming":[],"recent":[],"teams":[]}')

      - name: Check cyclingflash.com reachability
        id: reachability
        shell: python
        run: |
          import urllib.request, os
          try:
              req = urllib.request.Request(
                  'https://cyclingflash.com/races.php?category=1&filter=Filter&p=uci&s=latest-results',
                  headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f'cyclingflash.com reachable -- HTTP {r.status}')
                  reachable = True
          except Exception as e:
              print(f'cyclingflash.com unreachable: {e}')
              reachable = False
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'reachable={"true" if reachable else "false"}\n')

      - name: Run results-only scraper
        if: steps.reachability.outputs.reachable == 'true'
        shell: cmd
        run: python scraper.py --results-only

      - name: Strip any women's races from data.json
        if: steps.reachability.outputs.reachable == 'true'
        shell: python
        run: |
          import json
          WOMEN_KEYWORDS