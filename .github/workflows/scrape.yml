name: Update UCI Race Data

# Runs results-only scrape -- fetches ONLY new stage results and classifications
# for currently live races. Does NOT re-scrape teams, rider profiles, or the
# full calendar. Those are static and must be run manually when needed.
#
# To run a full scrape manually:  python scraper.py              (local only)
# To refresh teams manually:      python scraper.py --teams-only (local only)
#
# Runner: self-hosted Windows machine -- uses cmd + python shells (no WSL/pwsh needed)

on:
  schedule:
    - cron: '0 11 * * *'  # 11am UTC -- catches morning stage finishes
    - cron: '0 17 * * *'  # 5pm UTC  -- catches afternoon stage finishes
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # The runner service has no interactive user profile, so it only sees
      # the machine-wide PATH -- not whatever PATH your own logged-in
      # Windows account has. If Python was installed "for me only" (the
      # python.org installer default), its folder lives under a user
      # profile the service never sees, so "shell: python" steps below fail
      # with "python: command not found" even though Python works fine when
      # you run it yourself. This step searches the usual install locations
      # and adds whichever one it finds to GITHUB_PATH.
      - name: Locate Python and add it to PATH
        shell: powershell
        run: |
          $found = $null
          try {
            $viaPy = & py -3 -c "import sys; print(sys.executable)" 2>$null
            if ($LASTEXITCODE -eq 0 -and $viaPy) { $found = Split-Path $viaPy }
          } catch {}
          if (-not $found) {
            $candidates = @()
            $candidates += Get-ChildItem "C:\Program Files\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\Program Files (x86)\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\Users\*\AppData\Local\Programs\Python\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\Python*" -Directory -ErrorAction SilentlyContinue
            $match = $candidates | Where-Object { Test-Path (Join-Path $_.FullName "python.exe") } | Select-Object -First 1
            if ($match) { $found = $match.FullName }
          }
          if (-not $found) {
            Write-Error "Could not locate python.exe in any known install location. Install Python 'for all users', or add its folder to this runner's system PATH manually."
            exit 1
          }
          Write-Host "Found Python at: $found"
          Add-Content -Path $env:GITHUB_PATH -Value $found
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $found "Scripts")

      - name: Configure git + pull latest
        shell: cmd
        run: |
          git config user.name "UCI Calendar Bot"
          git config user.email "uci-bot@users.noreply.github.com"
          git pull --rebase origin main || git pull origin main

      - name: Save old data.json for change detection
        shell: python
        run: |
          import shutil, os
          if os.path.exists('data.json'):
              shutil.copy('data.json', 'data_old.json')
          else:
              with open('data_old.json', 'w') as f:
                  f.write('{"live":[],"upcoming":[],"recent":[],"teams":[]}')

      - name: Check cyclingflash.com reachability
        id: reachability
        shell: python
        run: |
          import urllib.request, os
          try:
              req = urllib.request.Request(
                  'https://cyclingflash.com/races.php?category=1&filter=Filter&p=uci&s=latest-results',
                  headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f'cyclingflash.com reachable -- HTTP {r.status}')
                  reachable = True
          except Exception as e:
              print(f'cyclingflash.com unreachable: {e}')
              reachable = False
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'reachable={"true" if reachable else "false"}\n')

      - name: Run results-only scraper
        if: steps.reachability.outputs.reachable == 'true'
        shell: cmd
        run: python scraper.py --results-only

      - name: Strip any women's races from data.json
        if: steps.reachability.outputs.reachable == 'true'
        shell: python
        run: |
          import json
          WOMEN_KEYWORDS = ['women', 'ladies', 'femmes', 'dames']
          WOMEN_CATS = {'1.WWT','2.WWT','1.W','2.W','1.1W','2.1W'}
          with open('data.json') as f:
              d = json.load(f)
          removed = 0
          for key in ('live', 'upcoming', 'recent'):
              before = len(d.get(key, []))
              d[key] = [r for r in d.get(key, [])
      