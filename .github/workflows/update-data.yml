name: Update UCI Race Data

on:
  schedule:
    - cron: '30 17 * * *'   # 18:30 Irish time (UTC+1)
  workflow_dispatch:          # Allow manual trigger from GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # The self-hosted Windows runner's console codepage is cp1252, not UTF-8.
  # Every script here (and scraper.py/detect_changes.py) prints unicode
  # symbols like checkmark/cross/warning. Without forcing UTF-8 mode, the
  # first such print crashes with UnicodeEncodeError and kills the step
  # (exit code 1) -- even on the success path.
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  scrape:
    runs-on: self-hosted

    defaults:
      run:
        shell: bash

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Plain "shell: bash" resolves bash.exe via PATH lookup. On this
      # self-hosted Windows runner that lookup can land on
      # C:\Windows\System32\bash.exe (the WSL launcher stub) instead of Git
      # Bash, which fails with "Windows Subsystem for Linux has no installed
      # distributions" since no WSL distro is installed here.
      #
      # (We previously tried pinning `shell:` directly to Git's bash.exe path,
      # but the custom-shell string parser breaks on the space in
      # "Program Files" -- it throws "Second path fragment must not be a
      # drive or UNC name" trying to resolve the command. So instead we
      # prepend Git's bin directory to PATH via GITHUB_PATH here, using
      # "shell: cmd" -- a plain keyword with no string-parsing pitfalls --
      # before any bash-default step runs. This makes the "bash" keyword
      # lookup find Git Bash first for the rest of the job.)
      - name: Ensure Git Bash wins over the WSL stub on PATH
        shell: cmd
        run: |
          echo C:\Program Files\Git\bin>>%GITHUB_PATH%
          echo C:\Program Files\Git\usr\bin>>%GITHUB_PATH%

      # Same root cause as the git --global issue above: the runner service
      # has no interactive user profile, so it only sees the machine-wide
      # PATH, not whatever PATH your own logged-in Windows account has. If
      # Python was installed "for me only" (the python.org installer
      # default), its folder lives under a user profile and the service
      # never sees it -- hence "python: command not found" even though
      # Python works fine when you run it yourself. This step searches the
      # usual install locations across all user profiles and the system
      # launcher, then adds whichever one it finds to GITHUB_PATH.
      - name: Locate Python and add it to PATH
        shell: powershell
        run: |
          $found = $null

          # 1) py launcher -- works even when python.exe itself isn't on PATH
          try {
            $viaPy = & py -3 -c "import sys; print(sys.executable)" 2>$null
            if ($LASTEXITCODE -eq 0 -and $viaPy) { $found = Split-Path $viaPy }
          } catch {}

          # 2) where.exe -- catches installs on PATH that our candidate list
          # below doesn't know about, while skipping 0-byte Microsoft Store
          # app-execution-alias stubs (those just pop the Store, not Python).
          if (-not $found) {
            foreach ($exe in @('python.exe','python3.exe')) {
              try {
                $whereOut = & where.exe $exe 2>$null
                if ($LASTEXITCODE -eq 0 -and $whereOut) {
                  foreach ($line in ($whereOut -split "`r?`n")) {
                    if ($line -and (Test-Path $line) -and ((Get-Item $line).Length -gt 0)) {
                      $found = Split-Path $line
                      break
                    }
                  }
                }
              } catch {}
              if ($found) { break }
            }
          }

          # 3) Windows registry -- python.org/winget installers register here
          # regardless of PATH, so this survives PATH getting reset by a
          # Windows or Git update.
          if (-not $found) {
            $regRoots = @(
              'HKLM:\SOFTWARE\Python\PythonCore',
              'HKLM:\SOFTWARE\WOW6432Node\Python\PythonCore',
              'HKCU:\SOFTWARE\Python\PythonCore'
            )
            foreach ($root in $regRoots) {
              if (Test-Path $root) {
                $versions = Get-ChildItem $root -ErrorAction SilentlyContinue | Sort-Object Name -Descending
                foreach ($v in $versions) {
                  $ip = Get-ItemProperty -Path (Join-Path $v.PSPath 'InstallPath') -ErrorAction SilentlyContinue
                  $dir = $ip.'(default)'
                  if ($dir -and (Test-Path (Join-Path $dir 'python.exe'))) { $found = $dir.TrimEnd('\'); break }
                }
              }
              if ($found) { break }
            }
          }

          # 4) Filesystem sweep of common install locations (original
          # fallback, now also checking Chocolatey's install dir).
          if (-not $found) {
            $candidates = @()
            $candidates += Get-ChildItem "C:\Program Files\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\Program Files (x86)\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\Users\*\AppData\Local\Programs\Python\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\ProgramData\chocolatey\lib\python*\tools" -Directory -ErrorAction SilentlyContinue
            $match = $candidates | Where-Object { Test-Path (Join-Path $_.FullName "python.exe") } | Sort-Object FullName -Descending | Select-Object -First 1
            if ($match) { $found = $match.FullName }
          }

          if (-not $found) {
            Write-Error "Could not locate python.exe via py launcher, where.exe, registry, or filesystem search. Install Python 'for all users' (so it's machine-wide, not user-profile-only -- the runner service can't see user profiles), or add its folder to this runner's system PATH manually."
            exit 1
          }
          Write-Host "Found Python at: $found"
          Add-Content -Path $env:GITHUB_PATH -Value $found
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $found "Scripts")

      - name: Configure git + pull latest
        run: |
          # Local (not --global) config: the self-hosted runner service has
          # no normal user profile, so --global tries to write to
          # C:\Program Files\Git\.gitconfig and fails with "Permission
          # denied". Local config writes into this repo's own .git/config,
          # which we already have write access to (we just checked it out).
          git config user.name  'UCI Calendar Bot'
          git config user.email 'uci-bot@users.noreply.github.com'
          git pull --rebase origin main || git pull origin main

      # ── Pre-scrape checks ──────────────────────────────────────────────────
      - name: Pre-scrape checks
        run: |
          python - <<'PYEOF'
          import json, os, sys, urllib.request

          print("=== Pre-scrape checks ===")
          ok = True

          # 1. Source site reachable
          try:
              req = urllib.request.Request(
                  "https://cyclingflash.com",
                  # A bare "Mozilla/5.0" UA gets a 403 from cyclingflash.com --
                  # needs a full browser-like string, same as the other
                  # workflows' reachability checks.
                  headers={"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  body = r.read(2000).decode("utf-8", errors="replace")
              if "cyclingflash" in body.lower() or r.status == 200:
                  print("✓ cyclingflash.com reachable")
              else:
                  print("⚠ cyclingflash.com returned unexpected content")
          except Exception as e:
              print(f"✗ cyclingflash.com unreachable: {e}")
              ok = False

          # 2. Existing data.json valid (save copy for change detection)
          if os.path.exists("data.json"):
              try:
                  d = json.load(open("data.json", encoding="utf-8"))
                  live     = len(d.get("live", []))
                  upcoming = len(d.get("upcoming", []))
                  recent   = len(d.get("recent", []))
                  print(f"✓ Existing data.json valid — {live} live, {upcoming} upcoming, {recent} recent")
                  import shutil
                  shutil.copy("data.json", "data_old.json")
                  print("✓ Saved data_old.json for change detection")
              except Exception as e:
                  print(f"⚠ Existing data.json unreadable ({e}) — will create fresh")
          else:
              print("ℹ No existing data.json — fresh scrape")

          if not ok:
              print("\n✗ Pre-scrape checks failed — aborting to avoid overwriting good data")
              sys.exit(1)

          print("=== Pre-scrape checks passed ===")
          PYEOF

      # ── Scrape ─────────────────────────────────────────────────────────────
      - name: Run scraper
        run: python scraper.py

      # ── Post-scrape validation ─────────────────────────────────────────────
      - name: Validate output
        run: |
          python - <<'PYEOF'
          import json, os, sys

          print("=== Post-scrape validation ===")
          errors = []

          # 1. File exists
          if not os.path.exists("data.json"):
              print("✗ FATAL: data.json missing after scrape")
              sys.exit(1)

          # 2. Valid JSON
          try:
              d = json.load(open("data.json", encoding="utf-8"))
          except Exception as e:
              print(f"✗ FATAL: data.json invalid JSON: {e}")
              sys.exit(1)

          # 3. Required top-level keys
          for key in ("live", "upcoming", "recent", "scraped_at"):
              if key not in d:
                  errors.append(f"missing key '{key}'")

          # 4. At least some races exist
          total = sum(len(d.get(s, [])) for s in ("live", "upcoming", "recent"))
          if total == 0:
              errors.append("zero races across all buckets — likely full scrape failure")

          # 5. File did not shrink vs old data (>20% loss = suspect)
          if os.path.exists("data_old.json"):
              old_sz = os.path.getsize("data_old.json")
              new_sz = os.path.getsize("data.json")
              if old_sz > 0 and new_sz < old_sz * 0.80:
                  errors.append(
                      f"file shrank >20%: {old_sz//1024} KB → {new_sz//1024} KB"
                  )
              else:
                  print(f"✓ File size OK: {old_sz//1024} KB → {new_sz//1024} KB")

          # 6. Each live race has a name and slug
          for r in d.get("live", []):
              if not r.get("name") or not (r.get("slug") or r.get("cf_slug")):
                  errors.append(f"live race missing name/slug: {r}")
                  break

          live     = len(d.get("live", []))
          upcoming = len(d.get("upcoming", []))
          recent   = len(d.get("recent", []))

          if errors:
              for e in errors:
                  print(f"✗ {e}")
              sys.exit(1)

          print(f"✓ data.json valid — {live} live, {upcoming} upcoming, {recent} recent")
          print(f"  scraped_at: {d.get('scraped_at_human', d.get('scraped_at', '?'))}")
          print("=== Validation passed ===")
          PYEOF

      # ── Change detection (non-critical) ───────────────────────────────────
      - name: Detect changes and update changelog
        continue-on-error: true
        run: |
          if [ -f data_old.json ]; then
            python3 detect_changes.py data_old.json data.json changelog.json \
              && echo "✓ Changelog updated" \
              || echo "⚠ detect_changes.py failed — continuing without changelog update"
          else
            echo "ℹ No data_old.json — skipping change detection"
          fi

      # ── Cleanup (always runs) ──────────────────────────────────────────────
      - name: Clean up temp files
        if: always()
        run: rm -f data_old.json

      # ── Commit & push ──────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git add data.json changelog.json
          if git diff --staged --quiet; then
            echo "ℹ No changes to commit"
          else
            git commit -m "chore: update race data $(date -u '+%Y-%m-%d %H:%M UTC')"
            # Retry once on push conflict (another push may have landed during scrape)
            git push origin main || (
              echo "Push rejected — pulling and retrying..."
              git pull --rebase origin main \
                && git push origin main \
                || (echo "✗ Push failed after retry" && exit 1)
            )
            echo "✓ Pushed to GitHub"
          fi
