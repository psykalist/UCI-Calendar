name: Update UCI Race Data

on:
  schedule:
    - cron: '30 17 * * *'   # 18:30 Irish time (UTC+1)
  workflow_dispatch:          # Allow manual trigger from GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: self-hosted

    defaults:
      run:
        shell: bash

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Plain "shell: bash" resolves bash.exe via PATH lookup. On this
      # self-hosted Windows runner that lookup can land on
      # C:\Windows\System32\bash.exe (the WSL launcher stub) instead of Git
      # Bash, which fails with "Windows Subsystem for Linux has no installed
      # distributions" since no WSL distro is installed here.
      #
      # (We previously tried pinning `shell:` directly to Git's bash.exe path,
      # but the custom-shell string parser breaks on the space in
      # "Program Files" -- it throws "Second path fragment must not be a
      # drive or UNC name" trying to resolve the command. So instead we
      # prepend Git's bin directory to PATH via GITHUB_PATH here, using
      # "shell: cmd" -- a plain keyword with no string-parsing pitfalls --
      # before any bash-default step runs. This makes the "bash" keyword
      # lookup find Git Bash first for the rest of the job.)
      - name: Ensure Git Bash wins over the WSL stub on PATH
        shell: cmd
        run: |
          echo C:\Program Files\Git\bin>>%GITHUB_PATH%
          echo C:\Program Files\Git\usr\bin>>%GITHUB_PATH%

      # Same root cause as the git --global issue above: the runner service
      # has no interactive user profile, so it only sees the machine-wide
      # PATH, not whatever PATH your own logged-in Windows account has. If
      # Python was installed "for me only" (the python.org installer
      # default), its folder lives under a user profile and the service
      # never sees it -- hence "python: command not found" even though
      # Python works fine when you run it yourself. This step searches the
      # usual install locations across all user profiles and the system
      # launcher, then adds whichever one it finds to GITHUB_PATH.
      - name: Locate Python and add it to PATH
        shell: powershell
        run: |
          $found = $null
          try {
            $viaPy = & py -3 -c "import sys; print(sys.executable)" 2>$null
            if ($LASTEXITCODE -eq 0 -and $viaPy) { $found = Split-Path $viaPy }
          } catch {}
          if (-not $found) {
            $candidates = @()
            $candidates += Get-ChildItem "C:\Program Files\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\Program Files (x86)\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\Users\*\AppData\Local\Programs\Python\Python*" -Directory -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "C:\Python*" -Directory -ErrorAction SilentlyContinue
            $match = $candidates | Where-Object { Test-Path (Join-Path $_.FullName "python.exe") } | Select-Object -First 1
            if ($match) { $found = $match.FullName }
          }
          if (-not $found) {
            Write-Error "Could not locate python.exe in any known install location. Install Python 'for all users', or add its folder to this runner's system PATH manually."
            exit 1
          }
          Write-Host "Found Python at: $found"
          Add-Content -Path $env:GITHUB_PATH -Value $found
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $found "Scripts")

      - name: Configure git + pull latest
        run: |
          # Local (not --global) config: the self-hosted runner service has
          # no normal user profile, so --global tries to write to
          # C:\Program Files\Git\.gitconfig and fails with "Permission
          # denied". Local config writes into this repo's own .git/config,
          # which we already have write access to (we just checked it out).
          git config user.name  'UCI Calendar Bot'
          git config user.email 'uci-bot@users.noreply.github.com'
          git pull --rebase origin main || git pull origin main

      # ── Pre-scrape checks ──────────────────────────────────────────────────
      - name: Pre-scrape checks
        run: |
          python - <<'PYEOF'
          import json, os, sys, urllib.request

          print("=== Pre-scrape checks ===")
          ok = True

          # 1. Source site reachable
          try:
              req = urllib.request.Request(
                  "https://cyclingflash.com",
                  headers={"User-Agent": "Mozilla/5.0"}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  body = r.read(2000).decode("utf-8", errors="replace")
              if "cyclingflash" in body.lower() or r.status == 200:
                  print("✓ cyclingflash.com reachable")
              else:
                  print("⚠ cyclingflash.com returned unexpected content")
          except Exception as e:
              print(f"✗ cyclingflash.com unreachable: {e}")
              ok = False

          # 2. Existing data.json valid (save copy for change detection)
          if os.path.exists("data.json"):
              try:
                  d = json.load(open("data.json", encoding="utf-8"))
                  live     = len(d.get("live", []))
                  upcoming = len(d.get("upcoming", []))
                  recent   = len(d.get("recent", []))
                  print(f"✓ Existing data.json valid — {live} live, {upcoming} upcoming, {recent} recent")
                  import shutil
                  shutil.copy("data.json", "data_old.json")
                  print("✓ Saved data_old.json for change detection")
              except Exception as e:
                  print(f"⚠ Existing data.json unreadable ({e}) — will create fresh")
          else:
              print("ℹ No existing data.json — fresh scrape")

          if not ok:
              print("\n✗ Pre-scrape checks failed — aborting to avoid overwriting good data")
              sys.exit(1)

          print("=== Pre-scrape checks passed ===")
          PYEOF

      # ── Scrape ─────────────────────────────────────────────────────────────
      - name: Run scraper
        run: python scraper.py

      # ── Post-scrape validation ─────────────────────────────────────────────
      - name: Validate output
        run: |
          python - <<'PYEOF'
          import json, os, sys

          print("=== Post-scrape validation ===")
          errors = []

          # 1. File exists
          if not os.path.exists("data.json"):
              print("✗ FATAL: data.json missing after scrape")
              sys.exit(1)

          # 2. Valid JSON
          try:
              d = json.load(open("data.json", encoding="utf-8"))
          except Exception as e