name: Update UCI Race Data

on:
  schedule:
    - cron: '0 6,12,18 * * *'   # 7am, 1pm, 7pm Irish time (UTC+1)
  workflow_dispatch:              # Allow manual trigger from GitHub UI

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated data.json
        run: |
          git config --global user.name 'UCI Calendar Bot'
          git config --global user.email 'uci-bot@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: update race data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          )
