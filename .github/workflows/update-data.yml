name: Update UCI Race Data

on:
  schedule:
    - cron: '30 17 * * *'  # 18:30 Irish time (UTC+1)
  workflow_dispatch:              # Allow manual trigger from GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pull latest data before scraping
        run: |
          git config --global user.name 'UCI Calendar Bot'
          git config --global user.email 'uci-bot@users.noreply.github.com'
          git pull origin main

      - name: Run scraper (best-effort)
        run: python scraper.py || echo "Scraper encountered errors — using partial/cached data"

      - name: Commit updated data.json
        run: |
          git add data.json
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: update race data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          )
