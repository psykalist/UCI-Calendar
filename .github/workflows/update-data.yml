name: Update UCI Race Data

on:
  schedule:
    - cron: '30 17 * * *'   # 18:30 Irish time (UTC+1)
  workflow_dispatch:          # Allow manual trigger from GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: self-hosted

    defaults:
      run:
        shell: bash

    steps:
      # в”Ђв”Ђ Setup в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Plain "shell: bash" resolves bash.exe via PATH lookup. On this
      # self-hosted Windows runner that lookup can land on
      # C:\Windows\System32\bash.exe (the WSL launcher stub) instead of Git
      # Bash, which fails with "Windows Subsystem for Linux has no installed
      # distributions" since no WSL distro is installed here.
      #
      # (We previously tried pinning `shell:` directly to Git's bash.exe path,
      # but the custom-shell string parser breaks on the space in
      # "Program Files" -- it throws "Second path fragment must not be a
      # drive or UNC name" trying to resolve the command. So instead we
      # prepend Git's bin directory to PATH via GITHUB_PATH here, using
      # "shell: cmd" -- a plain keyword with no string-parsing pitfalls --
      # before any bash-default step runs. This makes the "bash" keyword
      # lookup find Git Bash first for the rest of the job.)
      - name: Ensure Git Bash wins over the WSL stub on PATH
        shell: cmd
        run: |
          echo C:\Program Files\Git\bin>>%GITHUB_PATH%
          echo C:\Program Files\Git\usr\bin>>%GITHUB_PATH%

      - name: Configure git + pull latest
        run: |
          git config --global user.name  'UCI Calendar Bot'
          git config --global user.email 'uci-bot@users.noreply.github.com'
          git pull --rebase origin main || git pull origin main

      # в”Ђв”Ђ Pre-scrape checks в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Pre-scrape checks
        run: |
          python - <<'PYEOF'
          import json, os, sys, urllib.request

          print("=== Pre-scrape checks ===")
          ok = True

          # 1. Source site reachable
          try:
              req = urllib.request.Request(
                  "https://cyclingflash.com",
                  headers={"User-Agent": "Mozilla/5.0"}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  body = r.read(2000).decode("utf-8", errors="replace")
              if "cyclingflash" in body.lower() or r.status == 200:
                  print("вњ“ cyclingflash.com reachable")
              else:
                  print("вљ  cyclingflash.com returned unexpected content")
          except Exception as e:
              print(f"вњ— cyclingflash.com unreachable: {e}")
              ok = False

          # 2. Existing data.json valid (save copy for change detection)
          if os.path.exists("data.json"):
              try:
                  d = json.load(open("data.json", encoding="utf-8"))
                  live     = len(d.get("live", []))
                  upcoming = len(d.get("upcoming", []))
                  recent   = len(d.get("recent", []))
                  print(f"вњ“ Existing data.json valid вЂ” {live} live, {upcoming} upcoming, {recent} recent")
                  import shutil
                  shutil.copy("data.json", "data_old.json")
                  print("вњ“ Saved data_old.json for change detection")
              except Exception as e:
                  print(f"вљ  Existing data.json unreadable ({e}) вЂ” will create fresh")
          else:
              print("в„№ No existing data.json вЂ” fresh scrape")

          if not ok:
              print("\nвњ— Pre-scrape checks failed вЂ” aborting to avoid overwriting good data")
              sys.exit(1)

          print("=== Pre-scrape checks passed ===")
          PYEOF

      # в”Ђв”Ђ Scrape в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Run scraper
        run: python scraper.py

      # в”Ђв”Ђ Post-scrape validation в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Validate output
        run: |
          python - <<'PYEOF'
          import json, os, sys

          print("=== Post-scrape validation ===")
          errors = []

          # 1. File exists
          if not os.path.exists("data.json"):
              print("вњ— FATAL: data.json missing after scrape")
              sys.exit(1)

          # 2. Valid JSON
          try:
              d = json.load(open("data.json", encoding="utf-8"))
          except Exception as e:
              print(f"вњ— FATAL: data.json invalid JSON: {e}")
              sys.exit(1)

          # 3. Required top-level keys
          for key in ("live", "upcoming", "recent", "scraped_at"):
              if key not in d:
                  errors.append(f"missing key '{key}'")

          # 4. At least some races exist
          total = sum(len(d.get(s, [])) for s in ("live", "upcoming", "recent"))
          if total == 0:
              errors.append("zero races across all buckets вЂ” likely full scrape failure")

          # 5. File did not shrink vs old data (>20% loss = suspect)
          if os.path.exists("data_old.json"):
              old_sz = os.path.getsize("data_old.json")
              new_sz = os.path.getsize("data.json")
              if old_sz > 0 and new_sz < old_sz * 0.80:
                  errors.append(
                      f"file shrank >20%: {old_sz//1024} KB в†’ {new_sz//1024} KB"
                  )
              else:
                  print(f"вњ“ File size OK: {old_sz//1024} KB в†’ {new_sz//1024} KB")

          # 6. Each live race has a name and slug
          for r in d.get("live", []):
              if not r.get("name") or not (r.get("slug") or r.get("cf_slug")):
                  errors.append(f"live race missing name/slug: {r}")
                  break

          live     = len(d.get("live", []))
          upcoming = len(d.get("upcoming", []))
          recent   = len(d.get("recent", []))

          if errors:
              for e in errors:
                  print(f"вњ— {e}")
              sys.exit(1)

          print(f"вњ“ data.json valid вЂ” {live} live, {upcoming} upcoming, {recent} recent")
          print(f"  scraped_at: {d.get('scraped_at_human', d.get('scraped_at', '?'))}")
          print("=== Validation passed ===")
          PYEOF

      # в”Ђв”Ђ Change detection (non-critical) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Detect changes and update changelog
        continue-on-error: true
        run: |
          if [ -f data_old.json ]; then
            python3 detect_changes.py data_old.json data.json changelog.json \
              && echo "вњ“ Changelog updated" \
              || echo "вљ  detect_changes.py failed вЂ” continuing without changelog update"
          else
            echo "в„№ No data_old.json вЂ” skipping change detection"
          fi

      # в