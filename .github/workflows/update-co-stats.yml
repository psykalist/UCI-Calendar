name: Update CyclingOracle Stats

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 6am UTC
  workflow_dispatch:

jobs:
  update-co-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull --rebase origin main || git pull origin main

      - name: Run CyclingOracle scraper
        run: python scrape_cyclingoracle.py

      - name: Commit and push if changed
        run: |
          git config user.name "UCI Calendar Bot"
          git config user.email "uci-bot@users.noreply.github.com"
          git add rider_profiles.json
          if git diff --staged --quiet; then
            echo "No changes to rider_profiles.json — skipping commit"
          else
            COUNT=$(python -c "import json; d=json.load(open('rider_profiles.json')); r=d.get('riders',d); print(sum(1 for p in r.values() if p.get('co_stats')))")
            git commit -m "data: cyclingoracle stats — ${COUNT} riders"
            git push
          fi
