<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Men's UCI Road Calendar">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="./favicon.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Men's UCI Road Calendar</title>
<style>
:root {
  --bg:       #0f1117;
  --surface:  #1a1d27;
  --surface2: #22263a;
  --border:   #2e334d;
  --live:     #e63946;
  --upcoming: #4361ee;
  --recent:   #2d6a4f;
  --text:     #e8eaf0;
  --muted:    #8890b0;
  --accent:   #f4a261;
  --gold:     #ffd700;
  --silver:   #c0c0c0;
  --bronze:   #cd7f32;
  --nav-h:    58px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-top: env(safe-area-inset-top);
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

header h1 { font-size: 1.1rem; font-weight: 800; }
header h1 span { color: var(--accent); }

.header-actions { display: flex; align-items: center; gap: 8px; }

#install-btn {
  display: none;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  background: rgba(244,162,97,.15);
  border: 1px solid rgba(244,162,97,.4);
  border-radius: 16px;
  color: var(--accent);
  font-size: .85rem;
  font-weight: 700;
  cursor: pointer;
}

.refresh-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color .2s;
}
.refresh-btn:hover { color: var(--text); }

.header-sub { font-size: .78rem; color: var(--muted); }

/* ── Filter bar ── */
.filter-bar {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  overflow-x: auto;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 64px;
  z-index: 99;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0;
  padding: 5px 13px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}
.filter-chip.active {
  background: var(--upcoming);
  border-color: var(--upcoming);
  color: #fff;
}

/* ── Sections ── */
.section { display: none; padding: 16px 14px; }
.section.active { display: block; }

.group-header {
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 18px 4px 8px;
}
.group-header:first-child { padding-top: 4px; }

/* ── Race card ── */
.race-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.race-card.live-card     { border-left: 3px solid var(--live); }
.race-card.recent-card   { border-left: 3px solid var(--recent); }
.race-card.upcoming-card { border-left: 3px solid var(--upcoming); }

.race-header {
  padding: 12px 14px 12px 16px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.race-header:active { background: var(--surface2); }

.race-title { flex: 1; min-width: 0; }
.race-name {
  font-size: 1rem;
  font-weight: 600;
  white-space: normal;
  line-height: 1.3;
}
.race-meta { font-size: .78rem; color: var(--muted); margin-top: 4px; display: flex; flex-wrap: wrap; align-items: center; gap: 4px; }

.race-right { display: flex; align-items: flex-start; gap: 8px; flex-shrink: 0; padding-top: 2px; }

.cat-badge {
  font-size: .7rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}

.stage-pill { font-size: .78rem; color: var(--muted); white-space: nowrap; }

.chevron {
  width: 20px; height: 20px;
  color: var(--muted);
  transition: transform .2s;
  flex-shrink: 0;
}
.race-card.open .chevron { transform: rotate(180deg); }

.race-body { display: none; border-top: 1px solid var(--border); }
.race-card.open .race-body { display: block; }

.race-body-inner { padding: 14px; }

/* ── Classifications accordion ── */
.classif-section { margin-bottom: 16px; }
.classif-title {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 0 6px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}
.classif-row {
  border-bottom: 1px solid var(--border);
}
.classif-row:last-child { border-bottom: none; }
.classif-row-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 2px;
  cursor: pointer;
  user-select: none;
}
.classif-row-header:active { background: #2a2f47; }
.classif-badge {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .7px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 10px;
  white-space: nowrap;
  min-width: 62px;
  text-align: center;
}
.badge-gc       { background: rgba(245,203,66,.18);  color: #f5cb42; border: 1px solid rgba(245,203,66,.35); }
.badge-points   { background: rgba(45,211,111,.15);  color: #2dd36f; border: 1px solid rgba(45,211,111,.35); }
.badge-mountain { background: rgba(230,57,70,.15);   color: #e63946; border: 1px solid rgba(230,57,70,.35); }
.badge-youth    { background: rgba(76,201,240,.15);  color: #4cc9f0; border: 1px solid rgba(76,201,240,.35); }
.classif-leader-name { font-size: .92rem; font-weight: 600; flex: 1; }
.classif-chevron {
  width: 18px; height: 18px; flex-shrink: 0; color: var(--muted);
  transition: transform .2s;
}
.classif-row.open .classif-chevron { transform: rotate(180deg); }
.classif-row-body { display: none; padding-bottom: 8px; }
.classif-row.open .classif-row-body { display: block; }

/* ── Stages ── */
.stages-title {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.stage-row {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 5px;
  overflow: hidden;
}

.stage-row-header {
  padding: 11px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 46px;
}
.stage-row-header.clickable { cursor: pointer; }
.stage-row-header.clickable:active { background: #2a2f47; }

.stage-num { font-size: .78rem; font-weight: 700; color: var(--muted); min-width: 58px; }
.stage-winner-name { font-size: .92rem; flex: 1; }
.stage-no-data { font-size: .82rem; color: var(--muted); flex: 1; font-style: italic; }
.ttt-badge { font-size: .65rem; font-weight: 700; letter-spacing: .6px; background: rgba(76,201,240,.18); color: #4cc9f0; border: 1px solid rgba(76,201,240,.35); border-radius: 4px; padding: 1px 5px; vertical-align: middle; }

.stage-chevron {
  width: 16px; height: 16px;
  color: var(--muted);
  transition: transform .15s;
  flex-shrink: 0;
}
.stage-row.open .stage-chevron { transform: rotate(180deg); }
.stage-row-body { display: none; border-top: 1px solid var(--border); }
.stage-row.open .stage-row-body { display: block; }
.stage-images { display: flex; flex-direction: column; gap: 8px; padding: 10px 12px 0; }
.stage-images img { width: 100%; border-radius: 6px; display: block; }
.stage-img-label { font-size: .68rem; color: var(--muted); margin-top: 2px; }

/* ── Stage type badges & detail info ── */
.stage-type-badge { display: inline-block; font-size: .62rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; padding: 1px 6px; border-radius: 3px; vertical-align: middle; margin-right: 2px; flex-shrink: 0; }
.stage-type-badge.mountain        { background: #6c3483; color: #fff; }
.stage-type-badge.medium_mountain { background: #9b59b6; color: #fff; }
.stage-type-badge.hilly           { background: #c0392b; color: #fff; }
.stage-type-badge.flat            { background: #27ae60; color: #fff; }
.stage-type-badge.ITT             { background: #2980b9; color: #fff; }
.stage-type-badge.TTT             { background: #16a085; color: #fff; }
.stage-info-line { font-size: .74rem; color: var(--muted); padding: 0 12px 7px; margin-top: -4px; }
.stage-description { font-size: .82rem; line-height: 1.55; color: var(--text); padding: 8px 12px 12px; border-top: 1px solid var(--border); }

/* ── Race Programme table ── */
.programme-toggle { font-size: .8rem; color: var(--muted); cursor: pointer; padding: 6px 12px; display: flex; align-items: center; gap: 6px; user-select: none; border-bottom: 1px solid var(--border); }
.programme-toggle:hover { color: var(--text); }
.programme-chev { font-size: .7rem; transition: transform .2s; }
.programme-body { display: none; overflow-x: auto; }
.programme-body.open { display: block; }
.programme-table { width: 100%; border-collapse: collapse; font-size: .76rem; }
.programme-table th { font-size: .65rem; text-transform: uppercase; color: var(--muted); font-weight: 700; padding: 5px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; text-align: left; }
.programme-table td { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; white-space: nowrap; }
.programme-table tr:last-child td { border-bottom: none; }
.programme-table tr.stage-done td { color: var(--muted); }
.programme-table tr.stage-next td { color: var(--text); font-weight: 600; }
.programme-table tr.stage-rest td { color: var(--muted); font-style: italic; }
.prog-route { white-space: normal; max-width: 160px; line-height: 1.3; }
.prog-time { color: var(--upcoming); font-weight: 600; }
.prog-dist { color: var(--muted); }
.prog-elev { color: #a78bfa; }

/* ── Roadbook ── */
.roadbook-toggle { font-size: .75rem; color: var(--muted); cursor: pointer; padding: 5px 12px; display: flex; align-items: center; gap: 5px; border-top: 1px solid var(--border); user-select: none; }
.roadbook-toggle:hover { color: var(--text); }
.roadbook-body { display: none; overflow-x: auto; -webkit-overflow-scrolling: touch; max-height: 340px; overflow-y: auto; }
.roadbook-body.open { display: block; }
.roadbook-table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: .72rem; }
.roadbook-table th { font-size: .62rem; text-transform: uppercase; color: var(--muted); font-weight: 700; padding: 4px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; text-align: left; position: sticky; top: 0; background: var(--card); }
.roadbook-table td { padding: 4px 8px; border-bottom: 1px solid rgba(255,255,255,.03); white-space: nowrap; }
.roadbook-table tr:last-child td { border-bottom: none; }
.rb-location { white-space: nowrap; max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
.rb-km { color: var(--muted); text-align: right; }
.rb-time { color: var(--upcoming); font-variant-numeric: tabular-nums; }
.rb-chrono { background: rgba(67,97,238,.08); font-weight: 600; }

/* ── Top-10 table ── */
.top10-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
.top10-table th {
  text-align: left;
  padding: 7px 10px;
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.top10-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
.top10-table tr:last-child td { border-bottom: none; }
.rank-cell { width: 32px; font-weight: 700; color: var(--muted); }
.rank-1 { color: var(--gold); }
.rank-2 { color: var(--silver); }
.rank-3 { color: var(--bronze); }
.time-cell { color: var(--muted); font-family: monospace; font-size: .82rem; }
.team-cell { color: var(--muted); font-size: .78rem; }

/* ── Upcoming dates ── */
.upcoming-dates { padding: 14px 16px; font-size: .9rem; color: var(--muted); }

/* ── Startlist ── */
.startlist-toggle { display:flex; align-items:center; gap:6px; padding:10px 16px; font-size:.85rem; font-weight:600; color:var(--muted); cursor:pointer; border-top:1px solid var(--border); user-select:none; }
.startlist-toggle:hover { color:var(--text); }
.startlist-body { display:none; padding:0 16px 12px; }
.race-card.open .startlist-body { display:block; }
.startlist-teams { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:4px 16px; margin-top:6px; }
.startlist-team-name { font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-top:10px; margin-bottom:2px; grid-column:1/-1; }
.startlist-rider { font-size:.82rem; color:var(--text); padding:1px 0; display:flex; align-items:center; gap:5px; }
.startlist-rider .flag-img { width:16px; height:11px; object-fit:cover; border-radius:1px; flex-shrink:0; }
.startlist-empty { font-size:.82rem; color:var(--muted); font-style:italic; }

/* ── Single-day winner ── */
.single-winner {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  font-size: .95rem;
  font-weight: 600;
}
.single-winner .label {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── Bottom nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px 2px 4px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: .72rem;
  font-weight: 600;
  gap: 3px;
}
.nav-btn .nav-icon { font-size: 1.25rem; position: relative; }
.nav-btn.active { color: var(--accent); }

.live-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--live);
  position: absolute;
  top: 0; right: -4px;
  animation: ping 1.5s infinite;
}
@keyframes ping { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }

/* ── Team cards ── */
.team-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.team-card.uwt { border-left: 3px solid var(--gold); }
.team-card.pro  { border-left: 3px solid var(--upcoming); }

.team-header {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  min-height: 70px;
}
.team-header:active { background: var(--surface2); }

.team-jersey-thumb {
  width: 52px;
  height: 52px;
  object-fit: contain;
  background: #fff;
  border-radius: 6px;
  padding: 4px;
  flex-shrink: 0;
}
.team-jersey-placeholder {
  width: 52px; height: 52px;
  background: var(--surface2);
  border-radius: 6px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
}

.team-title { flex: 1; min-width: 0; }
.team-name-text {
  font-size: .95rem;
  font-weight: 700;
  line-height: 1.3;
}
.team-meta { font-size: .78rem; color: var(--muted); margin-top: 3px; }

.team-body { display: none; border-top: 1px solid var(--border); }
.team-card.open .team-body { display: block; }
.team-card.open .chevron { transform: rotate(180deg); }

.roster-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
.roster-table th {
  text-align: left;
  padding: 7px 10px;
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.roster-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.roster-table tr:last-child td { border-bottom: none; }
.roster-num { width: 28px; color: var(--muted); font-weight: 700; font-size: .78rem; }
.roster-age { color: var(--muted); font-size: .82rem; width: 36px; text-align: right; }

/* ── Rider profile in roster ── */
.rider-photo {
  width: 34px; height: 34px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center 15%;
  background: var(--surface2);
  flex-shrink: 0;
}
.rider-photo-ph {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem;
}
.rider-row-wrap { border-bottom: 1px solid var(--border); }
.rider-row-wrap:last-child { border-bottom: none; }
.rider-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
}
.rider-row.clickable { cursor: pointer; }
.rider-row.clickable:active { background: var(--surface2); }
.rider-name-col { flex: 1; min-width: 0; }
.rider-name-text { font-size: .88rem; font-weight: 600; }
.rider-sub { font-size: .72rem; color: var(--muted); margin-top: 1px; }
.wins-badge {
  font-size: .7rem; font-weight: 700;
  background: rgba(244,162,97,.15);
  color: var(--accent);
  border: 1px solid rgba(244,162,97,.3);
  border-radius: 10px;
  padding: 2px 7px;
  white-space: nowrap;
  flex-shrink: 0;
}
.rider-chevron {
  width: 14px; height: 14px;
  color: var(--muted);
  transition: transform .15s;
  flex-shrink: 0;
}
.rider-row-wrap.open .rider-chevron { transform: rotate(180deg); }

.wins-panel { display: none; background: var(--bg); }
.rider-row-wrap.open .wins-panel { display: block; }
.win-entry {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  font-size: .82rem;
}
.win-entry:last-child { border-bottom: none; }
.win-year { color: var(--accent); font-weight: 700; font-size: .78rem; min-width: 32px; }
.win-race { flex: 1; }
.win-cat  { color: var(--muted); font-size: .72rem; }

/* ── Misc ── */
.empty {
  color: var(--muted);
  font-style: italic;
  text-align: center;
  padding: 32px 16px;
  font-size: .9rem;
}

#loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 60vh;
  color: var(--muted);
  font-size: 1rem;
}
/* ── Rider modal ── */
.rider-modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 1000;
  align-items: flex-end;
  justify-content: center;
}
.rider-modal-overlay.open { display: flex; }
.rider-modal {
  background: var(--surface);
  border-radius: 18px 18px 0 0;
  width: 100%;
  max-width: 520px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 20px 16px 36px;
  box-shadow: 0 -4px 32px rgba(0,0,0,.4);
}
.rider-modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.rider-modal-header {
  display: flex;
  gap: 14px;
  align-items: center;
  margin-bottom: 16px;
}
.rider-modal-photo {
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center 15%;
  border: 2px solid var(--border);
  flex-shrink: 0;
}

/* ── What's New banner ── */
#whats-new-banner {
  display: none;
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  width: min(480px, calc(100vw - 24px));

  border: 1px solid var(--border);

@keyframes slideUp { from { opacity:0; transform:translateX(-50%) translateY(16px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

/* ── Stats section ── */
.stats-cat-bar { display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; margin-bottom:12px; scrollbar-width:none; }
.stats-cat-bar::-webkit-scrollbar { display:none; }
.stats-cat-btn { flex-shrink:0; padding:5px 13px; border-radius:20px; border:1px solid var(--border);
  background:transparent; color:var(--muted); cursor:pointer; font-size:.78rem; font-weight:600; transition:all .15s; }
.stats-cat-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:10px; overflow:hidden; }
.stat-card-hdr { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; cursor:pointer; user-select:none; }

.stat-card-body.open { display:block; }
.stat-tbl { width:100%; border-collapse:collapse; font-size:.82rem; }
.stat-tbl th { padding:6px 10px; text-align:left; border-bottom:2px solid var(--border); color:var(--muted); font-size:.72rem; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap; }
.stat-tbl td { padding:7px 10px; border-bottom:1px solid var(--border); white-space:nowrap; }
.stat-tbl tr:last-child td { border-bottom:none; }

.stats-loading { text-align:center; padding:60px 20px; color:var(--muted); }
</style>
</head>
<body>

<div id="whats-new-banner" role="alert" aria-live="polite">
  <div class="wn-header">
    <span class="wn-title">🔔 What's New</span>
    <button class="wn-close" onclick="dismissBanner()" aria-label="Close">✕</button>
  </div>
  <div class="wn-list" id="wn-list"></div>
  <div class="wn-footer"><button onclick="dismissBanner()">Got it ✓</button></div>
</div>

<!-- Rider profile modal -->
<div class="rider-modal-overlay" id="riderModal" onclick="closeRiderModal(event)">
  <div class="rider-modal">
    <div class="rider-modal-handle"></div>
    <div id="riderModalContent"></div>
  </div>
</div>

<header>
  <div class="header-top">
    <h1>🚴 Men's <span>UCI Road Calendar</span></h1>
    <div class="header-actions">
      <button id="install-btn" onclick="installPWA()">⬇ Install</button>
      <button id="notif-btn" onclick="toggleNotifications()" title="Enable push notifications" style="width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">🔔</button>
      <button class="refresh-btn" onclick="refreshData()" title="Refresh">↻</button>
    </div>
  </div>
  <div class="header-sub"><span id="last-updated">Loading…</span> <span id="app-version" style="opacity:.45;margin-left:6px"></span></div>
</header>

<div class="filter-bar" id="filter-bar">
  <span class="filter-chip active" onclick="setFilter('ALL',this)">All</span>
  <span class="filter-chip race-chip" onclick="setFilter('GRANDTOURS',this)">Grand Tours</span>
  <span class="filter-chip race-chip" onclick="setFilter('MONUMENTS',this)">Monuments</span>
  <span class="filter-chip" onclick="setFilter('UWT',this)">UWT ⭐</span>
  <span class="filter-chip race-chip" onclick="setFilter('PRO',this)">Pro Series</span>
  <span class="filter-chip team-chip" onclick="setFilter('PRO',this)" style="display:none">ProTeam</span>
  <span class="filter-chip race-chip" onclick="setFilter('1.1',this)">1.1 / 2.1</span>
  <span class="filter-chip" onclick="setFilter('THISWEEK',this)">This Week</span>
</div>

<main>
  <div id="loading">Loading race data…</div>

  <div class="section" id="sec-live"></div>
  <div class="section" id="sec-upcoming"></div>
  <div class="section" id="sec-recent"></div>
  <div class="section" id="sec-teams"></div>
  <div class="section" id="sec-following"></div>
  <div class="section" id="sec-fantasy"></div>
  <div class="section" id="sec-stats"></div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn" id="nav-live" onclick="showSec('live',this)">
    <span class="nav-icon">🔴<span class="live-dot" id="live-dot" style="display:none"></span></span>
    <span>Live</span>
  </button>
  <button class="nav-btn" id="nav-upcoming" onclick="showSec('upcoming',this)">
    <span class="nav-icon">📅</span><span>Upcoming</span>
  </button>
  <button class="nav-btn" id="nav-recent" onclick="showSec('recent',this)">
    <span class="nav-icon">✅</span><span>Recent</span>
  </button>
  <button class="nav-btn" id="nav-teams" onclick="showSec('teams',this)">
    <span class="nav-icon">👕</span><span>Teams</span>
  </button>
  <button class="nav-btn" id="nav-following" onclick="showSec('following',this)">
    <span class="nav-icon">⭐</span><span>Following</span>
  </button>
  <button class="nav-btn" id="nav-fantasy" onclick="showSec('fantasy',this)">
    <span class="nav-icon">🏆</span><span>Fantasy</span>
  </button>
  <button class="nav-btn" id="nav-stats" onclick="showSec('stats',this)">
    <span class="nav-icon">📊</span><span>Stats</span>
  </button>
</nav>

<script>
// ── Helpers ────────────────────────────────────────────────────────────────────

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const flagImg = nat => nat ? `<img src="https://flagcdn.com/16x12/${nat.toLowerCase()}.png" width="16" height="11" style="vertical-align:middle;margin-right:4px;border-radius:1px" loading="lazy">` : '';

function chevron(cls) {
  return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>`;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
}
function dateRange(s, e) {
  if (!s) return '';
  return (!e || s===e) ? fmtDate(s) : `${fmtDate(s)} – ${fmtDate(e)}`;
}
function daysUntil(iso) {
  if (!iso) return 999;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((new Date(iso+'T00:00:00') - today) / 86400000);
}

// ── Tab switching ──────────────────────────────────────────────────────────────

let currentTab = 'live';

function showSec(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  btn.classList.add('active');
  currentTab = name;
  // Hide filter bars on non-race tabs
  const isFantasy   = name === 'fantasy';
  const isStats     = name === 'stats';
  const isFollowing = name === 'following';
  document.getElementById('filter-bar').style.display = (isFantasy||isStats||isFollowing) ? 'none' : '';
  // Swap race/team chips
  const isTeams = name === 'teams';
  document.querySelectorAll('.race-chip').forEach(c => c.style.display = (isTeams||isStats||isFollowing) ? 'none' : '');
  document.querySelectorAll('.team-chip').forEach(c => c.style.display = (isTeams&&!isStats&&!isFollowing) ? '' : 'none');
  if (!isFantasy && !isStats && !isFollowing) applyFilter(curFilter);
  if (isFantasy)   renderFantasy();
  if (isStats)     loadStats();
  if (isFollowing) renderFollowing();
}

// ── Filter ─────────────────────────────────────────────────────────────────────

let curFilter = 'ALL';

function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('#filter-bar .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const f = curFilter;
  // Race cards
  document.querySelectorAll('.race-card').forEach(card => {
    const cat = (card.dataset.cat || '').toUpperCase();
    const stages = parseInt(card.dataset.stages || '1', 10);
    let show = true;
    if      (f === 'GRANDTOURS') show = card.dataset.grandtour === 'true';
    else if (f === 'MONUMENTS')  show = card.dataset.monument  === 'true';
    else if (f === 'UWT')        show = cat.includes('UWT');
    else if (f === 'PRO')        show = cat.includes('PRO');
    else if (f === '1.1')        show = cat.startsWith('1.') || (cat.startsWith('2.') && !cat.includes('UWT') && !cat.includes('PRO'));
    else if (f === 'THISWEEK') {
      const now  = new Date(); now.setHours(0,0,0,0);
      const soon = new Date(now.getTime() + 8*24*3600*1000);
      const s = card.dataset.start ? new Date(card.dataset.start+'T00:00:00') : null;
      const e = card.dataset.end   ? new Date(card.dataset.end  +'T00:00:00') : s;
      show = s && s <= soon && e >= now;
    }
    card.style.display = show ? '' : 'none';
  });
  // Team cards — hide for race-specific filters
  const raceOnly = ['GRANDTOURS','MONUMENTS','1.1'];
  document.querySelectorAll('.team-card').forEach(card => {
    const cat = (card.dataset.cat || '').toUpperCase();
    let show = true;
    if      (raceOnly.includes(f)) show = false;
    else if (f === 'UWT')          show = cat === 'UWT';
    else if (f === 'PRO')          show = cat === 'PRO';
    card.style.display = show ? '' : 'none';
  });
}

function applyFilter(f) { applyFilters(); }

// ── Top-10 table ───────────────────────────────────────────────────────────────

function renderTop10(rows) {
  if (!rows || !rows.length) return '<p class="empty">No results.</p>';
  const isTTT = rows.some(r => r.is_ttt);
  const riderHeader = isTTT ? 'Team' : 'Rider';
  return `<table class="top10-table">
    <thead><tr><th>#</th><th>${riderHeader}</th>${isTTT ? '' : '<th>Team</th>'}<th>Time</th></tr></thead>
    <tbody>${rows.map(r => {
      const slug = (r.rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim();
      const nameEl = (!isTTT && slug)
        ? `<span class="rider-name-link" onclick="openRiderModal('${esc(slug)}')">${esc(r.name)}</span>`
        : esc(r.name);
      return `<tr>
        <td class="rank-cell ${r.rank<=3?'rank-'+r.rank:''}">${r.rank}</td>
        <td>${flagImg(r.nat_code||r.nat||'')}${nameEl}</td>
        ${isTTT ? '' : `<td class="team-cell">${esc(r.team||'')}</td>`}
        <td class="time-cell">${esc(r.time_gap||'')}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

// ── Classifications ────────────────────────────────────────────────────────────

function renderLeaders(race) {
  const defs = [
    {leaderKey:'gc_leader',     top10Key:'gc_top10',     label:'GC',      badgeCls:'badge-gc'},
    {leaderKey:'points_leader', top10Key:'points_top10', label:'Points',  badgeCls:'badge-points'},
    {leaderKey:'kom_leader',    top10Key:'kom_top10',    label:'KOM',     badgeCls:'badge-mountain'},
    {leaderKey:'youth_leader',  top10Key:'youth_top10',  label:'Youth',   badgeCls:'badge-youth'},
  ];
  const rows = defs.filter(d => race[d.leaderKey]).map((d, i) => {
    const uid = `cl-${race._uid||Math.random().toString(36).slice(2)}-${i}`;
    const top10 = race[d.top10Key] || [];
    const hasTop10 = top10.length > 0;
    // Get leader slug from top10 first entry for profile tap
    const leaderSlug = top10.length ? (top10[0].rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim() : '';
    const leaderNat  = top10.length ? (top10[0].nat_code||top10[0].nat||'') : '';
    const leaderName = top10.length ? top10[0].name : (race[d.leaderKey]||'').replace(/^[^ ]+ /, '');
    const leaderDisplay = flagImg(leaderNat) + esc(leaderName);
    const leaderNameEl = leaderSlug
      ? `<span class="classif-leader-name rider-name-link" onclick="event.stopPropagation();openRiderModal('${esc(leaderSlug)}')">${leaderDisplay}</span>`
      : `<span class="classif-leader-name">${leaderDisplay}</span>`;
    return `<div class="classif-row${hasTop10?' clickable':''}" id="${uid}">
      <div class="classif-row-header"${hasTop10 ? ` onclick="toggleClassif('${uid}')"` : ''}>
        <span class="classif-badge ${d.badgeCls}">${d.label}</span>
        ${leaderNameEl}
        ${hasTop10 ? chevron('classif-chevron') : ''}
      </div>
      ${hasTop10 ? `<div class="classif-row-body">${renderTop10(top10)}</div>` : ''}
    </div>`;
  }).join('');
  return rows ? `<div class="classif-section"><div class="classif-title">Classifications</div>${rows}</div>` : '';
}

function toggleClassif(uid) { document.getElementById(uid)?.classList.toggle('open'); }

// ── Stage images (height profile + route map) ───────────────────────────────

function renderStageImages(s) {
  const hp = s.height_profile_img;
  const rt = s.route_img;
  if (!hp && !rt) return '';
  return `<div class="stage-images">
    ${hp ? `<div><img src="${esc(hp)}" alt="Height profile" loading="lazy" referrerpolicy="no-referrer"><div class="stage-img-label">Height profile</div></div>` : ''}
    ${rt ? `<div><img src="${esc(rt)}" alt="Route map" loading="lazy" referrerpolicy="no-referrer"><div class="stage-img-label">Route map</div></div>` : ''}
  </div>`;
}

// ── Stage type badge ─────────────────────────────────────────────────────────

function renderStageBadge(s) {
  const t = s.stage_type;
  if (!t) return '';
  const labels = { mountain: '⛰ Mountain', medium_mountain: '🏔 Med Mountain', hilly: '〰 Hilly', flat: '▬ Flat', ITT: '⏱ ITT', TTT: '⏱ TTT' };
  return `<span class="stage-type-badge ${esc(t)}">${labels[t] || esc(t)}</span>`;
}

function renderStageInfo(s) {
  const parts = [];
  if (s.date_str) parts.push(s.date_str);
  if (s.start_time) parts.push(`🕐 ${esc(s.start_time)}`);
  if (s.start_town && s.finish_town) parts.push(`${esc(s.start_town)} → ${esc(s.finish_town)}`);
  if (s.distance_km) parts.push(`${s.distance_km} km`);
  if (s.elevation_m) parts.push(`↑${Number(s.elevation_m).toLocaleString()} m`);
  return parts.length ? `<div class="stage-info-line">${parts.join(' · ')}</div>` : '';
}

function renderProgramme(race, cardId) {
  const stages = race.stages || [];
  if (stages.length < 2) return '';
  const today = new Date().toISOString().slice(0,10);
  const done  = race.stages_completed || 0;

  const BADGE = {mountain:'🏔',medium_mountain:'⛰',hilly:'🏘',flat:'➡',ITT:'⏱',TTT:'👥'};

  const rows = stages.map((s, i) => {
    const isRest = s.label && /rest/i.test(s.label);
    const isDone = s.winner || (s.top10 && s.top10.length) || i < done;
    const isNext = !isDone && !isRest && stages.slice(0, i).every((p, j) => p.winner || j >= done);
    const cls = isRest ? 'stage-rest' : isDone ? 'stage-done' : isNext ? 'stage-next' : '';
    const typeIcon = BADGE[s.stage_type] || '';
    const route = (s.start_town && s.finish_town)
      ? `${esc(s.start_town)} → ${esc(s.finish_town)}`
      : (s.label ? esc(s.label) : '');
    const dist  = s.distance_km ? `${s.distance_km} km` : '—';
    const elev  = s.elevation_m ? `↑${Number(s.elevation_m).toLocaleString()}` : '';
    const time  = s.start_time  ? `<span class="prog-time">${esc(s.start_time)}</span>` : '—';
    const date  = s.date_str    ? `<span style="opacity:.7">${esc(s.date_str)}</span>` : '';
    const winnerCell = s.winner
      ? (() => {
          const slug = (s.top10 && s.top10[0]) ? (s.top10[0].rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim() : '';
          return slug
            ? `<span class="rider-name-link" onclick="event.stopPropagation();openRiderModal('${esc(slug)}')">${esc(s.winner)}</span>`
            : esc(s.winner);
        })()
      : '';
    return `<tr class="${cls}">
      <td>${date}</td>
      <td style="font-weight:700">${typeIcon} St.${s.num}</td>
      <td class="prog-route">${route}</td>
      <td class="prog-dist">${dist}</td>
      <td class="prog-elev">${elev}</td>
      <td>${time}</td>
      <td>${winnerCell}</td>
    </tr>`;
  }).join('');

  const pid = `prog-${cardId}`;
  return `<div class="programme-toggle" onclick="toggleProgramme('${pid}')">
    📋 Full Programme (${stages.length} stages) <span class="programme-chev" id="${pid}-chev">▼</span>
  </div>
  <div class="programme-body" id="${pid}">
    <table class="programme-table">
      <thead><tr>
        <th>Date</th><th>Stage</th><th>Route</th><th>Dist</th><th>Elev</th><th>Start</th><th>Winner</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function toggleProgramme(pid) {
  const body = document.getElementById(pid);
  const chev = document.getElementById(pid + '-chev');
  if (!body) return;
  const open = body.classList.toggle('open');
  if (chev) chev.textContent = open ? '▲' : '▼';
}

function renderRoadbook(s, uid) {
  const rb = s.roadbook;
  if (!rb || !rb.length) return '';
  const rbId = 'rb-' + uid;
  const rows = rb.map(r => {
    const isChrono = r.location && r.location.toLowerCase().includes('chrono');
    const cls = isChrono ? 'rb-chrono' : '';
    return `<tr class="${cls}">
      <td class="rb-location">${esc(r.location || '')}</td>
      <td class="rb-km">${r.km_finish != null ? r.km_finish : ''}</td>
      <td class="rb-km">${r.km_start  != null ? r.km_start  : ''}</td>
      <td class="rb-time">${esc(r.caravan_time || '')}</td>
      <td class="rb-time">${esc(r.peloton_time || '')}</td>
      <td class="rb-time">${esc(r.director_time || '')}</td>
    </tr>`;
  }).join('');
  return `<div class="roadbook-toggle" onclick="toggleRoadbook('${rbId}')">
    🗺️ Timetable (${rb.length} points) <span id="${rbId}-chev" style="font-size:.7rem">▲</span>
  </div>
  <div class="roadbook-body open" id="${rbId}">
    <table class="roadbook-table">
      <thead><tr>
        <th>Location</th><th>← Fin</th><th>Start →</th>
        <th>Caravan</th><th>Peloton</th><th>Dir.</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function toggleRoadbook(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById(id + '-chev');
  if (!body) return;
  const open = body.classList.toggle('open');
  if (chev) chev.textContent = open ? '▲' : '▼';
}

// ── Stages ─────────────────────────────────────────────────────────────────────

function renderStages(stages, cardId) {
  if (!stages || !stages.length) return '';
  // Find highest stage number that has actual result data
  const lastWithData = stages.reduce((mx, s) =>
    (s.winner || (s.top10 && s.top10.length)) ? Math.max(mx, s.num) : mx, 0);
  const rows = stages.map(s => {
    const uid = `s-${cardId}-${s.num}`;
    const hasResults = s.winner || (s.top10 && s.top10.length);
    const hasDetails = !!(s.distance_km || s.description || s.height_profile_img || s.route_img || s.roadbook?.length);
    const clickable   = hasResults || hasDetails;
    const laterHasData = !hasResults && s.num < lastWithData;

    // Build winner / status element
    let winnerEl = '';
    if (hasResults) {
      const isTTT = s.top10 && s.top10.length && s.top10[0].is_ttt;
      const winSlug = (!isTTT && s.top10 && s.top10[0]) ? (s.top10[0].rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim() : '';
      const prefix = isTTT ? '<span class="ttt-badge">TTT</span> ' : flagImg(s.winner_nat||'');
      const wName = winSlug
        ? `<span class="rider-name-link" onclick="event.stopPropagation();openRiderModal('${esc(winSlug)}')">${esc(s.winner||'')}</span>`
        : esc(s.winner||'');
      winnerEl = `<span class="stage-winner-name">${prefix}${wName}</span>`;
    } else if (laterHasData) {
      winnerEl = `<span class="stage-no-data">Result unavailable</span>`;
    }
    // (no "Not yet run" label — the stage type badge + info line carry that context)

    const stageInfo = renderStageInfo(s);
    const descEl = s.description ? `<div class="stage-description">${esc(s.description)}</div>` : '';
    const roadbookEl = renderRoadbook(s, uid);
    const bodyContent = `${renderStageImages(s)}${descEl}${hasResults ? renderTop10(s.top10) : ''}${roadbookEl}`;

    return `<div class="stage-row" id="${uid}">
      <div class="stage-row-header${clickable?' clickable':''}"${clickable?` onclick="toggleStage('${uid}')"`:''}">
        <span class="stage-num">Stage ${s.num}</span>
        ${renderStageBadge(s)}
        ${winnerEl}
        ${clickable ? chevron('stage-chevron') : ''}
      </div>
      ${stageInfo}
      ${clickable ? `<div class="stage-row-body">${bodyContent}</div>` : ''}
    </div>`;
  }).join('');
  const hasAnyResults = stages.some(s => s.winner || s.top10?.length);
  return `<div class="stages-title">${hasAnyResults ? 'Stage Results' : 'Route'}</div>${rows}`;
}

function toggleStage(uid) { document.getElementById(uid)?.classList.toggle('open'); }

// ── Race card ──────────────────────────────────────────────────────────────────

let cardIdx = 0;

function renderStartlist(race) {
  const sl = race.startlist || [];
  if (!sl.length) return '';
  // Group by team
  const teams = {};
  const teamOrder = [];
  for (const r of sl) {
    const t = r.team || 'Unknown';
    if (!teams[t]) { teams[t] = []; teamOrder.push(t); }
    teams[t].push(r);
  }
  let rows = '';
  for (const t of teamOrder) {
    rows += `<div class="startlist-team-name">${esc(t)}</div>`;
    for (const r of teams[t]) {
      const flagHtml = r.nat
        ? `<img class="flag-img" src="https://flagcdn.com/16x12/${esc(r.nat.toLowerCase())}.png" alt="${esc(r.nat)}" loading="lazy">`
        : '';
      rows += `<div class="startlist-rider">${flagHtml}${esc(r.name)}</div>`;
    }
  }
  return `<div class="startlist-toggle" onclick="event.stopPropagation();this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block';this.querySelector('.sl-chev').textContent=this.nextElementSibling.style.display==='block'?'▲':'▼'">
    <span>👥 Startlist (${sl.length} riders)</span><span class="sl-chev">▼</span>
  </div>
  <div class="startlist-body" style="display:none"><div class="startlist-teams">${rows}</div></div>`;
}

// ── Startlist completeness helpers ────────────────────────────────────────────
function slExpected(race) {
  const s = race.total_stages || 1;
  if (s >= 21) return 184;   // Grand Tour: 23 teams × 8 riders
  if (s >= 5)  return 140;   // Big stage race: ~25 teams × ~6
  if (s >= 2)  return 80;    // Short stage race
  return 120;                 // 1-day race
}
function slStatus(race) {
  const count = (race.startlist||[]).length;
  if (count === 0) return 'none';
  if (count >= slExpected(race) * 0.95) return 'complete';
  return 'partial';
}

function renderRaceCard(race, status) {
  const id = `rc-${cardIdx++}`;
  race._uid = id;
  const total = race.total_stages || 1;
  const done  = race.stages_completed || 0;
  const multi = total > 1;
  const upcoming = status === 'upcoming';

  const stagePill = multi
    ? (upcoming ? `${total} stages` : `${done}/${total} stages`)
    : '1-day';

  let body = '';
  const slCount = (race.startlist||[]).length;
  const _slSt = slStatus(race);
  const slBadge = upcoming
    ? (_slSt === 'complete'
      ? `<span style="font-size:.72rem;background:rgba(45,211,111,.12);color:#2dd36f;border:1px solid rgba(45,211,111,.35);border-radius:12px;padding:2px 8px;font-weight:700;margin-left:6px">✅ Startlist complete · ${slCount} riders</span>`
      : _slSt === 'partial'
      ? `<span style="font-size:.72rem;background:rgba(234,179,8,.12);color:#eab308;border:1px solid rgba(234,179,8,.35);border-radius:12px;padding:2px 8px;font-weight:700;margin-left:6px">⚠️ ${slCount} of ~${slExpected(race)} riders confirmed</span>`
      : `<span style="font-size:.72rem;background:rgba(255,165,0,.1);color:#f97316;border:1px solid rgba(255,165,0,.3);border-radius:12px;padding:2px 8px;font-weight:700;margin-left:6px">⏳ Startlist TBA</span>`)
    : '';

  if (upcoming) {
    const datesDiv = `<div class="upcoming-dates">📅 ${dateRange(race.start_date, race.end_date) || 'Dates TBC'}${multi ? ` &nbsp;·&nbsp; ${total} stages` : ''}</div>`;
    const programmeHtml = multi ? renderProgramme(race, id) : '';
    const stagesHtml = (multi && race.stages?.length) ? renderStages(race.stages, id) : '';
    const startlistHtml = renderStartlist(race);
    body = `<div class="race-body-inner">${datesDiv}${programmeHtml}${stagesHtml}${startlistHtml}</div>`;
  } else if (!multi) {
    // 1-stage race: top10 may be at race level or under stages[0]
    const stage0 = (race.stages || [])[0] || {};
    const top10_1d = race.top10 || stage0.top10 || [];
    const winner1d = race.winner || stage0.winner || '';
    const winNat1d = race.winner_nat || stage0.winner_nat || '';
    const winSlug1d = top10_1d[0] ? (top10_1d[0].rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim() : '';
    const winnerName1d = winSlug1d
      ? `<span class="rider-name-link" onclick="openRiderModal('${esc(winSlug1d)}')">${esc(winner1d)}</span>`
      : esc(winner1d);
    const w = winner1d ? `<div class="single-winner"><span class="label">Winner</span> ${flagImg(winNat1d)}${winnerName1d}</div>` : '';
    body = `<div class="race-body-inner">${w}${renderStageImages(stage0.height_profile_img ? stage0 : race)}${renderTop10(top10_1d)}</div>`;
  } else {
    body = `<div class="race-body-inner">${renderLeaders(race)}${renderProgramme(race, id)}${renderStages(race.stages||[], id)}</div>`;
  }

  const meta = dateRange(race.start_date, race.end_date);

  const MONUMENT_NAMES = ['Milano-Sanremo','Ronde van Vlaanderen','Paris-Roubaix','Liège-Bastogne-Liège','Il Lombardia'];
  const isMonument  = MONUMENT_NAMES.some(m => (race.name||'').includes(m));
  const isGrandTour = (race.total_stages||1) >= 21;

  // Palmares section (for races that have historical data)
  const palmaresData = race.palmares || (appData.palmares || {})[race.slug] || [];
  const palmaresHTML = palmaresData.length
    ? `<div class="palmares-toggle-btn" onclick="event.stopPropagation();togglePalmares('${id}')">
        📜 Race History (${palmaresData.length} editions) <span class="palmares-chev">▼</span>
      </div>
      <div class="palmares-body" id="pal-${id}" style="display:none">
        <div class="palmares-list">
          <div class="palmares-row" style="font-size:.68rem;color:var(--muted);font-weight:700;text-transform:uppercase">
            <span>Year</span><span>Winner</span><span>2nd</span><span>3rd</span>
          </div>
          ${palmaresData.map(p => `<div class="palmares-row">
            <span class="palmares-year">${p.year}</span>
            <span class="palmares-winner">${p.winner_slug
              ? `<span class="rider-name-link" onclick="event.stopPropagation();openRiderModal('${esc(p.winner_slug)}')">${esc(p.winner_name||p.winner||'')}</span>`
              : esc(p.winner_name||p.winner||'')}</span>
            <span class="palmares-second">${p.second_slug
              ? `<span class="rider-name-link" onclick="event.stopPropagation();openRiderModal('${esc(p.second_slug)}')">${esc(p.second_name||p.second||'')}</span>`
              : esc(p.second_name||p.second||'')}</span>
            <span class="palmares-third">${p.third_slug
              ? `<span class="rider-name-link" onclick="event.stopPropagation();openRiderModal('${esc(p.third_slug)}')">${esc(p.third_name||p.third||'')}</span>`
              : esc(p.third_name||p.third||'')}</span>
          </div>`).join('')}
        </div>
      </div>`
    : '';

  return `<div class="race-card ${status}-card" id="${id}" data-cat="${esc(race.category||'')}" data-monument="${isMonument}" data-grandtour="${isGrandTour}" data-stages="${total}" data-start="${race.start_date||''}" data-end="${race.end_date||''}">
    <div class="race-header" onclick="toggleCard('${id}')">
      <div class="race-title">
        <div class="race-name">${esc(race.name||race.slug)}</div>
        <div class="race-meta">
          ${meta ? `<span>${meta}</span>` : ''}
          ${stagePill ? `<span>·</span><span class="stage-pill">${stagePill}</span>` : ''}
          ${race.category ? `<span>·</span><span class="cat-badge">${esc(race.category)}</span>` : ''}
          ${upcoming ? slBadge : ''}
        </div>
      </div>
      <div class="race-right">${chevron('chevron')}</div>
    </div>
    <div class="race-body">${body}${palmaresHTML}</div>
  </div>`;
}

function toggleCard(id) { document.getElementById(id)?.classList.toggle('open'); }

function togglePalmares(cardId) {
  const body = document.getElementById('pal-' + cardId);
  const chev = document.querySelector(`#${cardId} .palmares-chev`);
  if (!body) return;
  const open = body.style.display === 'none';
  body.style.display = open ? 'block' : 'none';
  if (chev) chev.textContent = open ? '▲' : '▼';
}

// ── Section renderers ──────────────────────────────────────────────────────────

function group(label, cards) {
  return cards.length ? `<div class="group-header">${label}</div>${cards}` : '';
}

function renderLive(races) {
  const el = document.getElementById('sec-live');
  if (!races.length) { el.innerHTML = '<p class="empty">No live races right now.</p>'; return; }
  el.innerHTML = races.map(r => renderRaceCard(r, 'live')).join('');
  // Auto-open single live race
  if (races.length === 1) el.querySelector('.race-card')?.classList.add('open');
  // Show live dot
  document.getElementById('live-dot').style.display = 'inline-block';
}

function renderUpcoming(races) {
  const el = document.getElementById('sec-upcoming');
  if (!races.length) { el.innerHTML = '<p class="empty">No upcoming races.</p>'; return; }
  const sorted = [...races].sort((a,b) => (a.start_date||'').localeCompare(b.start_date||''));
  const thisWeek  = sorted.filter(r => { const d=daysUntil(r.start_date); return d>=0&&d<7; });
  const nextWeek  = sorted.filter(r => { const d=daysUntil(r.start_date); return d>=7&&d<14; });
  const later     = sorted.filter(r => daysUntil(r.start_date) >= 14);
  el.innerHTML =
    group('This week',  thisWeek.map(r=>renderRaceCard(r,'upcoming')).join('')) +
    group('Next week',  nextWeek.map(r=>renderRaceCard(r,'upcoming')).join('')) +
    group('Coming up',  later.map(r=>renderRaceCard(r,'upcoming')).join('')) ||
    '<p class="empty">No upcoming races.</p>';
}

function renderRecent(races) {
  const el = document.getElementById('sec-recent');
  if (!races.length) { el.innerHTML = '<p class="empty">No recent results.</p>'; return; }
  const sorted = [...races].sort((a,b) => (b.end_date||'').localeCompare(a.end_date||''));
  const gt     = sorted.filter(r => r.category==='2.UWT' && (r.total_stages||1)>1);
  const stage  = sorted.filter(r => !gt.includes(r) && (r.total_stages||1)>1);
  const oneday = sorted.filter(r => (r.total_stages||1)===1);
  el.innerHTML =
    group('🏆 Grand Tours',      gt.map(r=>renderRaceCard(r,'recent')).join('')) +
    group('📋 Stage Races',      stage.map(r=>renderRaceCard(r,'recent')).join('')) +
    group('🏅 One-Day Classics', oneday.map(r=>renderRaceCard(r,'recent')).join(''));
}

// ── Teams ──────────────────────────────────────────────────────────────────────

function renderRiderRow(r, teamId, idx) {
  const natImg = r.nat
    ? `<img src="https://flagcdn.com/16x12/${(r.nat).toLowerCase()}.png" width="16" height="11" style="vertical-align:middle;margin-right:4px;border-radius:1px" loading="lazy">`
    : '';
  const photoUrl = r.photo || getRiderPhoto(r.slug || '');
  const photo = photoUrl
    ? `<img class="rider-photo" src="${esc(photoUrl)}" alt="${esc(r.name)}" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="rider-photo-ph">🚴</div>`;

  let dob = '';
  if (r.dob) {
    const d = new Date(r.dob);
    const age = Math.floor((Date.now() - d) / (365.25 * 86400000));
    dob = `${d.getFullYear()} · ${age} yrs`;
  } else if (r.age) {
    dob = `${r.age} yrs`;
  }

  const slug = r.slug || '';
  const clickAttr = slug ? ` onclick="openRiderModal('${esc(slug)}')" style="cursor:pointer"` : '';

  return `<div class="rider-row clickable"${clickAttr}>
    ${photo}
    <div class="rider-name-col">
      <div class="rider-name-text">${natImg}${esc(r.name)}</div>
      ${dob ? `<div class="rider-sub">${dob}</div>` : ''}
    </div>
  </div>`;
}

function toggleRider(uid) { document.getElementById(uid)?.classList.toggle('open'); }

let teamIdx = 0;

function renderTeamCard(team) {
  const id = `tc-${teamIdx++}`;
  const cat = (team.cat || '').toUpperCase();
  const catLabel = cat === 'UWT' ? '🌍 WorldTeam' : '🔵 ProTeam';
  const catCls   = cat === 'UWT' ? 'uwt' : 'pro';
  const jersey = team.jersey
    ? `<img class="team-jersey-thumb" src="${esc(team.jersey)}" alt="jersey" loading="lazy">`
    : `<div class="team-jersey-placeholder">👕</div>`;

  const riders = team.riders || [];
  const roster = riders.map((r, i) => renderRiderRow(r, id, i)).join('');
  const profiledCount = riders.filter(r => r.photo).length;
  const riderMeta = profiledCount < riders.length
    ? `${riders.length} riders (${riders.length - profiledCount} loading...)`
    : `${riders.length} riders`;

  return `<div class="team-card ${catCls}" id="${id}" data-cat="${cat}">
    <div class="team-header" onclick="toggleCard('${id}')">
      ${jersey}
      <div class="team-title">
        <div class="team-name-text">${esc(team.name)}</div>
        <div class="team-meta">${catLabel} &nbsp;·&nbsp; ${riderMeta}</div>
      </div>

async function searchRiders(q) {
  const resultEl = document.getElementById('rider-search-results');
  const teamsEl  = document.getElementById('teams-list');
  q = q.trim().toLowerCase();
  if (q.length < 2) {
    resultEl.style.display = 'none';
    teamsEl.style.display = '';
    return;
  }
  teamsEl.style.display = 'none';
  resultEl.style.display = '';
  resultEl.innerHTML = '<p class="empty" style="padding:16px">Searching…</p>';

  // Build team lookup for rider → team name
  const riderTeam = {};
  for (const team of (appData.teams || [])) {
    for (const r of (team.riders || [])) {
      if (r.slug) riderTeam[r.slug] = team.name;
    }
  }

  // Search rider_profiles.json (all 1800 riders)
  const profiles = await loadRiderProfiles();
  const matches = [];
  for (const [slug, p] of Object.entries(profiles)) {
    if ((p.name||'').toLowerCase().includes(q)) {
      matches.push({
        slug,
        name:     p.name,
        nat:      p.nat,
        photo:    p.photo,
        dob:      p.dob,
        teamName: riderTeam[slug] || '',
      });
    }
  }
  matches.sort((a,b) => (a.name||'').localeCompare(b.name||''));

  resultEl.scrollIntoView({block: 'start', behavior: 'smooth'});

  if (!matches.length) {
    resultEl.innerHTML = '<p class="empty" style="padding:16px">No riders found.</p>';
    return;
  }

  resultEl.innerHTML = `<div class="group-header">${matches.length} rider${matches.length>1?'s':''} found</div>` +
    matches.slice(0, 50).map((r, i) => renderRiderRow(r, 'search', i)).join('');
}

async function addIClaudiusToLeague(){
  const rk=fantasyGetRace();
  const bt=await loadBestTeams();
  if(!bt||!bt.races){alert("Team Claudius isn't ready yet — it's built once the full startlist is confirmed.");return;}
  const raceEntry=bt.races[rk];
  if(!raceEntry||!raceEntry.teams){alert("Team Claudius isn't available for this race yet.");return;}
  const tier=autoTierLoad();
  const team=raceEntry.teams[tier]||raceEntry.teams.elite;
  const tierLabel={easy:'Easy',pro:'Pro',elite:'Elite'}[tier]||'Elite';
  iClaudiusSet(rk,{name:'Team Claudius',owner:'🤖 AI · '+tierLabel+' tier',riders:team.riders,created_at:new Date().toISOString(),isIClaudius:true,tier,total_cost:team.total_cost});
  renderFantasy();
}

function removeIClaudius(){
  iClaudiusClear(fantasyGetRace());
  renderFantasy();
}

async function loadAndRenderAutoTeam(raceKey, myTotal) {
  const bt = await loadBestTeams();
  // Auto-generate Team Claudius when startlist is complete and not yet built
  if (bt && bt.races && bt.races[raceKey] && !iClaudiusGet(raceKey)) {
    const allRaces = [...(appData.live||[]),...(appData.upcoming||[]),...(appData.recent||[])];
    const race = allRaces.find(r => _raceKey(r) === raceKey);
    if (race && slStatus(race) === 'complete') {
      const raceEntry = bt.races[raceKey];
      if (raceEntry && raceEntry.teams) {
        const tier = autoTierLoad();
        const team = raceEntry.teams[tier] || raceEntry.teams.elite;
        const tierLabel = {easy:'Easy',pro:'Pro',elite:'Elite'}[tier] || 'Elite';
        iClaudiusSet(raceKey, {name:'Team Claudius',owner:'🤖 AI · '+tierLabel+' tier',riders:team.riders,
          created_at:new Date().toISOString(),isIClaudius:true,tier,total_cost:team.total_cost});
        renderFantasy();
        return;
      }
    }
  }
  const panel = document.getElementById('auto-team-panel');
  if (panel) panel.outerHTML = renderAutoTeamPanel(bt, raceKey, myTotal);
}

async function loadRiderProfiles() {
  if (riderProfilesData) return riderProfilesData;
  if (riderProfilesLoading) {
    // Wait for in-flight load
    await new Promise(res => { const t = setInterval(() => { if (!riderProfilesLoading) { clearInterval(t); res(); } }, 100); });
    return riderProfilesData;
  }
  riderProfilesLoading = true;
  try {
    const r = await fetch('./rider_profiles.json', {cache: 'no-cache'});
    if (r.ok) riderProfilesData = (await r.json()).riders || {};
  } catch(e) { riderProfilesData = {}; }
  riderProfilesLoading = false;
  return riderProfilesData;
}

async function openRiderModal(slug) {
  // Show modal immediately with loading state
  const modal = document.getElementById('riderModal');
  const content = document.getElementById('riderModalContent');
  content.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">⏳ Loading…</div>';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  const profiles = await loadRiderProfiles();
  const profile = { ...(profiles[slug] || {}), ...((appData.rider_profiles || {})[slug] || {}) };

  let baseInfo = null;
  for (const team of (appData.teams || [])) {
    const r = (team.riders || []).find(r => r.slug === slug);
    if (r) { baseInfo = {...r, teamName: team.name}; break; }
  }

  const name     = (profile || baseInfo || {}).name || slug.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  const nat      = ((profile || baseInfo || {}).nat || '').toLowerCase();
  const natName  = (profile || {}).nat_name || nat.toUpperCase();
  const photo    = (profile || {}).photo || (baseInfo || {}).photo || getRiderPhoto(slug);
  const dob      = (profile || {}).dob;
  const wins     = (profile || {}).wins || [];
  const teamHistory = (profile || {}).team_history || [];
  const currentYearTeam = (teamHistory.filter(t => t.year <= new Date().getFullYear()).sort((a,b) => b.year - a.year)[0] || {}).team || '';
  // Prefer live roster (data.json) over stale PCS team_history
  const teamName = (baseInfo || {}).teamName || currentYearTeam || '';
  const weight   = (profile || {}).weight;
  const height   = (profile || {}).height;

  const photoEl = photo
    ? `<img class="rider-modal-photo" src="${esc(photo)}" alt="${esc(name)}" onerror="this.style.display='none'">`
    : `<div class="rider-modal-photo-ph">🚴</div>`;

  let meta = '';
  if (nat) meta += `<img src="https://flagcdn.com/16x12/${nat}.png" width="16" height="11" style="vertical-align:middle;margin-right:4px;border-radius:1px"> ${esc(natName)}`;
  if (dob) {
    const age = Math.floor((Date.now() - new Date(dob)) / (365.25*86400000));
    meta += (meta ? ' · ' : '') + `${esc(dob)}${(!isNaN(age) && age > 0) ? ` (${age})` : ''}`;
  }
  if (weight || height) {
    const wh = [weight ? weight + 'kg' : '', height ? height + 'm' : ''].filter(Boolean).join(' · ');
    meta += (meta ? '<br>' : '') + esc(wh);
  }
  if (teamName) meta += (meta ? '<br>' : '') + esc(teamName);

  // Specialty bars — scraper keys: gc, oneday, tt, sprint, climber, hills
  const specialties = (profile || {}).specialties || {};
  const SPEC_ORDER = [
    { key: 'climber', label: 'Climber',    color: '#2a9d8f' },
    { key: 'gc',      label: 'GC',         color: '#e63946' },
    { key: 'oneday',  label: 'One Day',    color: '#f4a261' },
    { key: 'sprint',  label: 'Sprint',     color: '#e9c46a' },
    { key: 'tt',      label: 'Time Trial', color: '#4361ee' },
    { key: 'hills',   label: 'Hills',      color: '#8ecae6' },
  ];
  const maxSpec = Math.max(1, ...Object.values(specialties).filter(Number.isFinite));
  const specHTML = Object.keys(specialties).length
    ? `<div class="spec-bars">${SPEC_ORDER.map(({key, label, color}) => {
        const score = specialties[key];
        if (!score) return '';
        const bar = Math.round((score / maxSpec) * 100);
        return `<div class="spec-row">
          <div class="spec-label">${label}</div>
          <div class="spec-track"><div class="spec-fill" style="width:${bar}%;background:${color}"></div></div>
          <div class="spec-score">${score.toLocaleString()}</div>
        </div>`;
      }).join('')}</div>`
    : `<p class="rider-modal-no-data">Specialty scores not available</p>`;

  // Wins — scraper: {nr, race, class, date, cat}
  const winsHTML = wins.length
    ? wins.map(w => {
        const yr = (w.date || '').substring(0, 4) || (w.year || '');
        return `<div class="win-entry">
          <span class="win-year">${esc(String(yr))}</span>
          <span class="win-race">${esc(w.race || '')}</span>
          <span class="win-cat">${esc(w.class || w.cat || '')}</span>
        </div>`;
      }).join('')
    : `<p class="rider-modal-no-data">${profile ? 'No wins recorded' : 'Profile not yet fetched — run scrape_rider_profiles.py'}</p>`;

  const isFollowed = followLoad().some(f => f.slug === slug);
  const followBtnClass = isFollowed ? 'follow-modal-btn following' : 'follow-modal-btn';
  const followBtnLabel = isFollowed ? '⭐ Following' : '+ Follow';
  const followBtnOnclick = isFollowed
    ? `unfollowRider('${esc(slug)}','${esc(name)}')`
    : `followRider('${esc(slug)}','${esc(name)}','${esc(nat)}')`;

  // Team history
  const teamHistHTML = teamHistory.length
    ? `<div class="team-history-list">${teamHistory.map(t =>
        `<div class="team-hist-row">
          <span class="team-hist-year">${t.year}</span>
          <span class="team-hist-name">${esc(t.team)}</span>
        </div>`).join('')}</div>`
    : `<p class="rider-modal-no-data">${profile ? 'Team history not yet fetched' : 'Profile not yet scraped'}</p>`;

  // Season results (current year)
  const seasonResults = (profile || {}).season_results || [];
  const currentYear = new Date().getFullYear();
  const srFiltered = seasonResults.filter(r => (r.pcs_points > 0 || r.uci_points > 0) && (r.date||'').startsWith(String(currentYear)));
  const seasonHTML = srFiltered.length
    ? `<div class="season-results-list">
        <div class="season-results-header">
          <span>Date</span><span>Race / Stage</span><span>Pos</span><span>PCS</span><span>UCI</span>
        </div>
        ${srFiltered.map(r => `<div class="season-result-row">
          <span class="sr-date">${esc((r.date||'').substring(5).replace('-','.'))}</span>
          <span class="sr-race">${esc(r.race||'')}</span>
          <span class="sr-pos">${r.stage_pos != null ? r.stage_pos : ''}</span>
          <span class="sr-pts">${r.pcs_points||''}</span>
          <span class="sr-pts">${r.uci_points||''}</span>
        </div>`).join('')}
      </div>`
    : `<p class="rider-modal-no-data">${profile ? 'No points-scoring results this season' : 'Profile not yet scraped'}</p>`;

  // Tabs: Palmares | Teams | Season
  content.innerHTML = `
    <div class="rider-modal-header">
      ${photoEl}
      <div>
        <div class="rider-modal-name">${esc(name)}</div>
        ${meta ? `<div class="rider-modal-meta">${meta}</div>` : ''}
        <button id="followModalBtn" class="${followBtnClass}" data-slug="${esc(slug)}" data-nat="${esc(nat)}" onclick="${followBtnOnclick}">${followBtnLabel}</button>
      </div>
    </div>
    <div class="rider-modal-section">⭐ Specialties</div>
    ${specHTML}
    <div class="rider-tabs">
      <button class="rider-tab active" onclick="switchRiderTab(this,'tab-palmares')">🏆 Palmares (${wins.length})</button>
      <button class="rider-tab" onclick="switchRiderTab(this,'tab-teams')">👕 Teams</button>
      <button class="rider-tab" onclick="switchRiderTab(this,'tab-season')">${currentYear} Results</button>
    </div>
    <div id="tab-palmares" class="rider-tab-panel active">${winsHTML}</div>
    <div id="tab-teams"    class="rider-tab-panel" style="display:none">${teamHistHTML}</div>
    <div id="tab-season"   class="rider-tab-panel" style="display:none">${seasonHTML}</div>
  `;
}

let statsData   = null;
let statsCurCat = 'riders';
let statsOpenId = null;

const STAT_CATS = [
  ['riders',      'Riders'],
  ['grandtours',  'Grand Tours'],
  ['monuments',   'Monuments'],
  ['teams',       'Teams'],
  ['nations',     'Nations'],
  ['races',       'Races'],
  ['major-tours', 'Major Tours'],
  ['climbs',      'Climbs'],
  ['gear',        'Gear'],
];

async function loadStats() {
  const el = document.getElementById('sec-stats');
  if (statsData) { if (!statsOpenId) setStatCat(statsCurCat); else renderStats(); return; }
  el.innerHTML = '<div class="stats-loading">⏳ Loading statistics…</div>';
  try {
    const r = await fetch('./pcs_stats.json', {cache: 'no-cache'});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    statsData = await r.json();
  } catch(e) {
    el.innerHTML = `<div class="stats-loading">⚠️ Could not load stats<br><small>${esc(e.message)}</small></div>`;
    return;
  }
  setStatCat(statsCurCat); // auto-opens first card
}

function renderStats() {
  const el = document.getElementById('sec-stats');
  if (!statsData) return;
  const stats = statsData.stats || {};

  // Only show categories that have data
  const activeCats = STAT_CATS.filter(([c]) =>
    Object.values(stats).some(s => s.category === c && s.row_count > 0)
  );

  // Fallback if current cat has no data
  if (!activeCats.some(([c]) => c === statsCurCat)) {
    statsCurCat = activeCats[0]?.[0] || 'riders';
  }

  const catBar = `<div class="stats-cat-bar">${
    activeCats.map(([c, label]) =>
      `<button class="stats-cat-btn${c===statsCurCat?' active':''}" onclick="setStatCat('${c}')">${label}</button>`
    ).join('')
  }</div>`;

  const entries = Object.entries(stats)
    .filter(([, s]) => s.category === statsCurCat && s.row_count > 0)
    .sort((a, b) => a[1].label.localeCompare(b[1].label));

  const cards = entries.map(([id, s]) => {
    const open = id === statsOpenId;
    const chevron = open ? '▲' : '▼';
    const bodyId  = 'sb-' + id.replace(/\W/g,'-');
    const body    = open ? buildStatTable(s) : '';
    return `<div class="stat-card">
  <div class="stat-card-hdr" onclick="toggleStat('${esc(id)}')">
    <div>
      <div class="stat-card-title">${esc(s.label)}</div>
      <div class="stat-card-meta">${s.row_count} entries${s.notes ? ' · ' + esc(s.notes) : ''}</div>
    </div>
    <span style="color:var(--muted);font-size:.8rem">${chevron}</span>
  </div>
  <div class="stat-card-body${open?' open':''}" id="${bodyId}">${body}</div>
</div>`;
  }).join('');

  el.innerHTML = catBar + (cards ||
    '<div class="stats-loading">No data in this category</div>');
}

function setStatCat(cat) {
  statsCurCat = cat;
  statsOpenId = null;
  // Auto-open the first card in the new category
  const stats = (statsData || {}).stats || {};
  const first = Object.entries(stats)
    .filter(([, s]) => s.category === cat && s.row_count > 0)
    .sort((a, b) => a[1].label.localeCompare(b[1].label))[0];
  if (first) statsOpenId = first[0];
  renderStats();
}

function toggleStat(id) {
  statsOpenId = statsOpenId === id ? null : id;
  renderStats();
}

function buildStatTable(s) {
  const rows = s.rows || [];
  if (!rows.length) return '<p style="padding:10px;color:var(--muted)">No data</p>';

  // Columns: skip internal keys, keep useful ones
  const skip = new Set(['type', 'slug', 'section',
    'rider1_slug','rider2_slug','race_slug','rider_slug']);
  const first = rows[0];
  const cols = Object.keys(first).filter(k => !skip.has(k));

  // Header row
  const ths = cols.map(c => `<th>${esc(c.replace(/_/g,' '))}</th>`).join('');

  // Data rows (cap at 50)
  const trs = rows.slice(0, 50).map(r => {
    const tds = cols.map(c => {
      let v = r[c] ?? '';
      // Rider names open in-app modal; falls back to PCS link footer inside modal
      if (c === 'name' && r.slug && r.type === 'rider') {
        return `<td><a href="#" onclick="openRiderModal('${esc(r.slug)}');return false;" style="color:#1a0dab;text-decoration:none">${esc(String(v))}</a></td>`;
      }
      if ((c === 'rider1_name' || c === 'rider2_name') && r[c.replace('_name','_slug')]) {
        const slug = r[c.replace('_name','_slug')];
        return `<td><a href="#" onclick="openRiderModal('${esc(slug)}');return false;" style="color:#1a0dab;text-decoration:none">${esc(String(v))}</a></td>`;
      }
      if (c === 'rider_name' && r.rider_slug) {
        return `<td><a href="#" onclick="openRiderModal('${esc(r.rider_slug)}');return false;" style="color:#1a0dab;text-decoration:none">${esc(String(v))}</a></td>`;
      }
      // Reddish for unlinked rider/name columns
      const nameCol = (c === 'name' && r.type === 'rider') || c === 'rider_name' || c === 'rider1_name' || c === 'rider2_name';
      if (nameCol) return `<td><span style="color:#c0392b">${esc(String(v))}</span></td>`;
      return `<td>${esc(String(v))}</td>`;
    }).join('');
    return `<tr>${tds}</tr>`;
  }).join('');

  return `<table class="stat-tbl"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}

function _urlB64ToUint8(b64){

// ── Background auto-refresh every 30 minutes ─────────────────────────────────
let _lastScrapedAt = '';
async function silentCheck() {
  try {
    const r = await fetch('./data.json?t=' + Date.now(), {cache: 'no-cache'});
    if (!r.ok) return;
    const d = await r.json();
    if (d.scraped_at && d.scraped_at !== _lastScrapedAt) {
      // Detect newly completed stages since last check
      const prevLive = appData.live || [];
      const prevWinners = new Set();
      for(const race of prevLive) for(const s of (race.stages||[])) if(s.winner) prevWinners.add(`${race.slug}-${s.num}`);

      appData = d;
      _lastScrapedAt = d.scraped_at;
      document.getElementById('last-updated').textContent = `Updated ${d.scraped_at_human || '—'}`;
      renderLive(appData.live || []);
      renderUpcoming(appData.upcoming || []);
      renderRecent(appData.recent || []);

      // Fire in-app notification for each new stage result
      const followed = followLoad();
      const followedSlugs = new Map(followed.map(f => [f.slug, f.name]));
      for(const race of (d.live||[])){
        for(const s of (race.stages||[])){
          const key=`${race.slug}-${s.num}`;
          if(s.winner && !prevWinners.has(key)){
            // Check if winner is a followed rider (match by slug from top10)
            const winnerSlug = (s.top10 && s.top10[0])
              ? (s.top10[0].rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim() : '';
            const followedName = winnerSlug ? followedSlugs.get(winnerSlug) : null;
            if (followedName) {
              _fireInAppNotif(`🌟 ${followedName} wins!`,`${race.name} — Stage ${s.num}`,`followed-stage-${key}`);
            } else {
              _fireInAppNotif(`🏁 ${race.name} — Stage ${s.num}`,`${s.winner} wins`,`stage-${key}`);
            }
          }
        }
      }
      // Also check for followed riders in new top-10 positions (non-stage-win)
      for(const race of (d.live||[])){
        for(const s of (race.stages||[])){
          const key=`${race.slug}-${s.num}`;
          if(!prevWinners.has(key) && s.top10){
            for(let i=1; i<Math.min(s.top10.length,10); i++){
              const r = s.top10[i];
              const rSlug = (r.rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim();
              if(followedSlugs.has(rSlug)){
                _fireInAppNotif(`📍 ${followedSlugs.get(rSlug)} — P${i+1}`,`${race.name} Stage ${s.num}`,`followed-top10-${key}-${rSlug}`);
              }
            }
          }
        }
      }
      // Also notify about races going live today
      for(const race of (d.live||[])){
        const prevRaceSlugs=new Set(prevLive.map(r=>r.slug));
        if(!prevRaceSlugs.has(race.slug)){
          _fireInAppNotif(`🚴 ${race.name} has started`,`${race.total_stages} stages · ${race.category}`,'race-live-'+race.slug);
        }
      }
      // Notify when a startlist becomes newly available for any upcoming race
      const prevSlMap=new Map(prevLive.concat(appData.upcoming||[]).map(r=>[r.slug||r.cf_slug,(r.startlist||[]).length]));
      for(const race of [...(d.live||[]),...(d.upcoming||[])]){
        const key=race.slug||race.cf_slug;
        const prevCount=prevSlMap.get(key)??-1;
        const newCount=(race.startlist||[]).length;
        if(prevCount===0&&newCount>0){
          _fireInAppNotif(`👥 Startlist published`,`${race.name} · ${newCount} riders`,'startlist-'+key);
        }
      }

      showBanner('📡 New race data loaded');
    }
  } catch(e) {}
}

const FOLLOWING_KEY = 'uci_following';

function followLoad() {
  try { return JSON.parse(localStorage.getItem(FOLLOWING_KEY) || '[]'); } catch(e) { return []; }
}
function followSave(list) { localStorage.setItem(FOLLOWING_KEY, JSON.stringify(list)); }

function followRider(slug, name, nat) {
  const list = followLoad();
  if (list.find(f => f.slug === slug)) return;
  followSave([...list, { slug, name, nat: nat || '' }]);
  // Re-render if following tab is open
  if (currentTab === 'following') renderFollowing();
  // Update modal button if open
  const btn = document.getElementById('followModalBtn');
  if (btn && btn.dataset.slug === slug) {
    btn.textContent = '⭐ Following';
    btn.classList.add('following');
    btn.onclick = () => unfollowRider(slug, name);
  }
}

function unfollowRider(slug, name) {
  followSave(followLoad().filter(f => f.slug !== slug));
  if (currentTab === 'following') renderFollowing();
  const btn = document.getElementById('followModalBtn');
  if (btn && btn.dataset.slug === slug) {
    btn.textContent = '+ Follow';
    btn.classList.remove('following');
    btn.onclick = () => followRider(slug, name, btn.dataset.nat);
  }
}

function _followRiderStatus(slug) {
  // Returns { raceName, stageNum, pos, winner } or null for the most recent result
  let latest = null;
  for (const race of [...(appData.live || []), ...(appData.recent || [])]) {
    for (const s of (race.stages || [])) {
      const top10 = s.top10 || [];
      const idx = top10.findIndex(r => {
        const rSlug = (r.rider_url || '').replace('/profile/', '').replace(/^\/+/, '').trim();
        return rSlug === slug;
      });
      if (idx >= 0) {
        latest = { raceName: race.name, stageNum: s.num, pos: idx + 1, winner: idx === 0 };
      }
    }
    // Also check single-day races
    const top10 = race.top10 || [];
    const idx = top10.findIndex(r => {
      const rSlug = (r.rider_url || '').replace('/profile/', '').replace(/^\/+/, '').trim();
      return rSlug === slug;
    });
    if (idx >= 0 && !latest) {
      latest = { raceName: race.name, stageNum: null, pos: idx + 1, winner: idx === 0 };
    }
  }
  return latest;
}

function _followInLive(slug) {
  // Is this rider currently listed in any live race (startlist)
  for (const race of (appData.live || [])) {
    const inSl = (race.startlist || []).some(r =>
      (r.slug || (r.rider_url || '').replace('/profile/', '').replace(/^\/+/, '').trim()) === slug
    );
    if (inSl) return race.name;
  }
  return null;
}

const MAX_SQUAD = 9; // legacy — kept only for watchlist; use maxSquad() for squad logic

const STAGE_PTS = {1:25,2:12,3:8,4:3,5:3,6:3,7:3,8:3,9:3,10:3};

function buildRiderCosts(){

  // Both "Firstname Surname" and "SURNAME Firstname" orderings are indexed so PCS startlist

      for(const stage of (race.stages||[])){
        for(const r of (stage.top10||[])) add(r.name,STAGE_PTS[r.rank]||0);
      }
      const cl=race.classifications||{};
      for(const r of (cl.gc||[])) add(r.name,GC_PTS[r.rank]||0);
      for(const key of ['points','mountain','youth']){
        const lst=cl[key]||[];
        if(lst[0]) add(lst[0].name,JERSEY_PTS);
      }
    }
  }
  const maxPts=Math.max(...Object.values(scores),1);
  _riderCosts={};
  for(const [key,pts] of Object.entries(scores)){
    const cost=Math.max(COST_FLOOR,Math.round(COST_FLOOR+(COST_CEIL-COST_FLOOR)*Math.sqrt(pts/maxPts)));
    _riderCosts[key]=cost;
    const rev=key.split(' ').reverse().join(' ');
    if(rev!==key)_riderCosts[rev]=cost;
  }
}

function riderCost(name){ return _riderCosts[normName(name)]||COST_FLOOR; }
function squadCost(riders){ return riders.reduce((s,r)=>s+riderCost(r.name||r),0); }
