<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kieran's UCI Calendar">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Kieran's UCI Calendar</title>
<style>
:root {
  --bg:       #0f1117;
  --surface:  #1a1d27;
  --surface2: #22263a;
  --border:   #2e334d;
  --live:     #e63946;
  --upcoming: #4361ee;
  --recent:   #2d6a4f;
  --text:     #e8eaf0;
  --muted:    #8890b0;
  --accent:   #f4a261;
  --gold:     #ffd700;
  --silver:   #c0c0c0;
  --bronze:   #cd7f32;
  --nav-h:    58px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-top: env(safe-area-inset-top);
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

header h1 { font-size: 1.1rem; font-weight: 800; }
header h1 span { color: var(--accent); }

.header-actions { display: flex; align-items: center; gap: 8px; }

#install-btn {
  display: none;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  background: rgba(244,162,97,.15);
  border: 1px solid rgba(244,162,97,.4);
  border-radius: 16px;
  color: var(--accent);
  font-size: .85rem;
  font-weight: 700;
  cursor: pointer;
}

.refresh-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color .2s;
}
.refresh-btn:hover { color: var(--text); }

.header-sub { font-size: .78rem; color: var(--muted); }

/* ── Filter bar ── */
.filter-bar {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  overflow-x: auto;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 64px;
  z-index: 99;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }

.filter-chip {
  flex-shrink: 0;
  padding: 5px 13px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}
.filter-chip.active {
  background: var(--upcoming);
  border-color: var(--upcoming);
  color: #fff;
}

/* ── Sections ── */
.section { display: none; padding: 16px 14px; }
.section.active { display: block; }

.group-header {
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 18px 4px 8px;
}
.group-header:first-child { padding-top: 4px; }

/* ── Race card ── */
.race-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.race-card.live-card     { border-left: 3px solid var(--live); }
.race-card.recent-card   { border-left: 3px solid var(--recent); }
.race-card.upcoming-card { border-left: 3px solid var(--upcoming); }

.race-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  min-height: 62px;
}
.race-header:active { background: var(--surface2); }

.race-title { flex: 1; min-width: 0; }
.race-name {
  font-size: 1rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.race-meta { font-size: .8rem; color: var(--muted); margin-top: 3px; }

.race-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.cat-badge {
  font-size: .75rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}

.stage-pill { font-size: .78rem; color: var(--muted); white-space: nowrap; }

.chevron {
  width: 20px; height: 20px;
  color: var(--muted);
  transition: transform .2s;
  flex-shrink: 0;
}
.race-card.open .chevron { transform: rotate(180deg); }

.race-body { display: none; border-top: 1px solid var(--border); }
.race-card.open .race-body { display: block; }

.race-body-inner { padding: 14px; }

/* ── Classifications accordion ── */
.classif-section { margin-bottom: 16px; }
.classif-title {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 0 6px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}
.classif-row {
  border-bottom: 1px solid var(--border);
}
.classif-row:last-child { border-bottom: none; }
.classif-row-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 2px;
  cursor: pointer;
  user-select: none;
}
.classif-row-header:active { background: #2a2f47; }
.classif-badge {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .7px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 10px;
  white-space: nowrap;
  min-width: 62px;
  text-align: center;
}
.badge-gc       { background: rgba(245,203,66,.18);  color: #f5cb42; border: 1px solid rgba(245,203,66,.35); }
.badge-points   { background: rgba(45,211,111,.15);  color: #2dd36f; border: 1px solid rgba(45,211,111,.35); }
.badge-mountain { background: rgba(230,57,70,.15);   color: #e63946; border: 1px solid rgba(230,57,70,.35); }
.badge-youth    { background: rgba(76,201,240,.15);  color: #4cc9f0; border: 1px solid rgba(76,201,240,.35); }
.classif-leader-name { font-size: .92rem; font-weight: 600; flex: 1; }
.classif-chevron {
  width: 18px; height: 18px; flex-shrink: 0; color: var(--muted);
  transition: transform .2s;
}
.classif-row.open .classif-chevron { transform: rotate(180deg); }
.classif-row-body { display: none; padding-bottom: 8px; }
.classif-row.open .classif-row-body { display: block; }

/* ── Stages ── */
.stages-title {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.stage-row {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 5px;
  overflow: hidden;
}

.stage-row-header {
  padding: 11px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 46px;
}
.stage-row-header.clickable { cursor: pointer; }
.stage-row-header.clickable:active { background: #2a2f47; }

.stage-num { font-size: .78rem; font-weight: 700; color: var(--muted); min-width: 58px; }
.stage-winner-name { font-size: .92rem; flex: 1; }
.stage-no-data { font-size: .82rem; color: var(--muted); flex: 1; font-style: italic; }
.ttt-badge { font-size: .65rem; font-weight: 700; letter-spacing: .6px; background: rgba(76,201,240,.18); color: #4cc9f0; border: 1px solid rgba(76,201,240,.35); border-radius: 4px; padding: 1px 5px; vertical-align: middle; }

.stage-chevron {
  width: 16px; height: 16px;
  color: var(--muted);
  transition: transform .15s;
  flex-shrink: 0;
}
.stage-row.open .stage-chevron { transform: rotate(180deg); }
.stage-row-body { display: none; border-top: 1px solid var(--border); }
.stage-row.open .stage-row-body { display: block; }
.stage-images { display: flex; flex-direction: column; gap: 8px; padding: 10px 12px 0; }
.stage-images img { width: 100%; border-radius: 6px; display: block; }
.stage-img-label { font-size: .68rem; color: var(--muted); margin-top: 2px; }

/* ── Stage type badges & detail info ── */
.stage-type-badge { display: inline-block; font-size: .62rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; padding: 1px 6px; border-radius: 3px; vertical-align: middle; margin-right: 2px; flex-shrink: 0; }
.stage-type-badge.mountain { background: #6c3483; color: #fff; }
.stage-type-badge.hilly    { background: #c0392b; color: #fff; }
.stage-type-badge.flat     { background: #27ae60; color: #fff; }
.stage-type-badge.ITT      { background: #2980b9; color: #fff; }
.stage-type-badge.TTT      { background: #16a085; color: #fff; }
.stage-info-line { font-size: .74rem; color: var(--muted); padding: 0 12px 7px; margin-top: -4px; }
.stage-description { font-size: .82rem; line-height: 1.55; color: var(--text); padding: 8px 12px 12px; border-top: 1px solid var(--border); }

/* ── Top-10 table ── */
.top10-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
.top10-table th {
  text-align: left;
  padding: 7px 10px;
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.top10-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
.top10-table tr:last-child td { border-bottom: none; }
.rank-cell { width: 32px; font-weight: 700; color: var(--muted); }
.rank-1 { color: var(--gold); }
.rank-2 { color: var(--silver); }
.rank-3 { color: var(--bronze); }
.time-cell { color: var(--muted); font-family: monospace; font-size: .82rem; }
.team-cell { color: var(--muted); font-size: .78rem; }

/* ── Upcoming dates ── */
.upcoming-dates { padding: 14px 16px; font-size: .9rem; color: var(--muted); }

/* ── Single-day winner ── */
.single-winner {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  font-size: .95rem;
  font-weight: 600;
}
.single-winner .label {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── Bottom nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px 2px 4px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: .72rem;
  font-weight: 600;
  gap: 3px;
}
.nav-btn .nav-icon { font-size: 1.25rem; position: relative; }
.nav-btn.active { color: var(--accent); }

.live-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--live);
  position: absolute;
  top: 0; right: -4px;
  animation: ping 1.5s infinite;
}
@keyframes ping { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }

/* ── Team cards ── */
.team-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.team-card.uwt { border-left: 3px solid var(--gold); }
.team-card.pro  { border-left: 3px solid var(--upcoming); }

.team-header {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  min-height: 70px;
}
.team-header:active { background: var(--surface2); }

.team-jersey-thumb {
  width: 52px;
  height: 52px;
  object-fit: contain;
  background: #fff;
  border-radius: 6px;
  padding: 4px;
  flex-shrink: 0;
}
.team-jersey-placeholder {
  width: 52px; height: 52px;
  background: var(--surface2);
  border-radius: 6px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
}

.team-title { flex: 1; min-width: 0; }
.team-name-text {
  font-size: .95rem;
  font-weight: 700;
  line-height: 1.3;
}
.team-meta { font-size: .78rem; color: var(--muted); margin-top: 3px; }

.team-body { display: none; border-top: 1px solid var(--border); }
.team-card.open .team-body { display: block; }
.team-card.open .chevron { transform: rotate(180deg); }

.roster-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
.roster-table th {
  text-align: left;
  padding: 7px 10px;
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.roster-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.roster-table tr:last-child td { border-bottom: none; }
.roster-num { width: 28px; color: var(--muted); font-weight: 700; font-size: .78rem; }
.roster-age { color: var(--muted); font-size: .82rem; width: 36px; text-align: right; }

/* ── Rider profile in roster ── */
.rider-photo {
  width: 34px; height: 34px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--surface2);
  flex-shrink: 0;
}
.rider-photo-ph {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem;
}
.rider-row-wrap { border-bottom: 1px solid var(--border); }
.rider-row-wrap:last-child { border-bottom: none; }
.rider-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
}
.rider-row.clickable { cursor: pointer; }
.rider-row.clickable:active { background: var(--surface2); }
.rider-name-col { flex: 1; min-width: 0; }
.rider-name-text { font-size: .88rem; font-weight: 600; }
.rider-sub { font-size: .72rem; color: var(--muted); margin-top: 1px; }
.wins-badge {
  font-size: .7rem; font-weight: 700;
  background: rgba(244,162,97,.15);
  color: var(--accent);
  border: 1px solid rgba(244,162,97,.3);
  border-radius: 10px;
  padding: 2px 7px;
  white-space: nowrap;
  flex-shrink: 0;
}
.rider-chevron {
  width: 14px; height: 14px;
  color: var(--muted);
  transition: transform .15s;
  flex-shrink: 0;
}
.rider-row-wrap.open .rider-chevron { transform: rotate(180deg); }

.wins-panel { display: none; background: var(--bg); }
.rider-row-wrap.open .wins-panel { display: block; }
.win-entry {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  font-size: .82rem;
}
.win-entry:last-child { border-bottom: none; }
.win-year { color: var(--accent); font-weight: 700; font-size: .78rem; min-width: 32px; }
.win-race { flex: 1; }
.win-cat  { color: var(--muted); font-size: .72rem; }

/* ── Misc ── */
.empty {
  color: var(--muted);
  font-style: italic;
  text-align: center;
  padding: 32px 16px;
  font-size: .9rem;
}

#loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 60vh;
  color: var(--muted);
  font-size: 1rem;
}
/* ── Rider modal ── */
.rider-modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 1000;
  align-items: flex-end;
  justify-content: center;
}
.rider-modal-overlay.open { display: flex; }
.rider-modal {
  background: var(--surface);
  border-radius: 18px 18px 0 0;
  width: 100%;
  max-width: 520px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 20px 16px 36px;
  box-shadow: 0 -4px 32px rgba(0,0,0,.4);
}
.rider-modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.rider-modal-header {
  display: flex;
  gap: 14px;
  align-items: center;
  margin-bottom: 16px;
}
.rider-modal-photo {
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  flex-shrink: 0;
}
.rider-modal-photo-ph {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; flex-shrink: 0;
}
.rider-modal-name { font-size: 1.1rem; font-weight: 800; line-height: 1.2; }
.rider-modal-meta { font-size: .82rem; color: var(--muted); margin-top: 3px; }
.rider-modal-section {
  font-size: .7rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted);
  border-bottom: 1px solid var(--border);
  padding-bottom: 5px; margin: 14px 0 8px;
}
.rider-modal-no-data { font-size: .85rem; color: var(--muted); font-style: italic; }
.rider-name-link {
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: rgba(255,255,255,.25);
  text-underline-offset: 2px;
}

/* ── Rider search ── */
.rider-search-wrap {
  padding: 10px 14px 4px;
  position: sticky;
  top: 108px;
  z-index: 98;
  background: var(--bg);
}
.rider-search-input {
  width: 100%;
  padding: 9px 14px 9px 36px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: .92rem;
  outline: none;
}
.rider-search-input:focus { border-color: var(--upcoming); }
.rider-search-icon {
  position: absolute;
  left: 26px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: .95rem;
  pointer-events: none;
}
.rider-search-wrap { position: relative; }
</style>
</head>
<body>

<!-- Rider profile modal -->
<div class="rider-modal-overlay" id="riderModal" onclick="closeRiderModal(event)">
  <div class="rider-modal">
    <div class="rider-modal-handle"></div>
    <div id="riderModalContent"></div>
  </div>
</div>

<header>
  <div class="header-top">
    <h1>🚴 Kieran's <span>UCI Calendar</span></h1>
    <div class="header-actions">
      <button id="install-btn" onclick="installPWA()">⬇ Install</button>
      <button class="refresh-btn" onclick="refreshData()" title="Refresh">↻</button>
    </div>
  </div>
  <div class="header-sub" id="last-updated">Loading… <span id="app-version" style="opacity:.45;margin-left:6px"></span></div>
</header>

<div class="filter-bar" id="filter-bar">
  <span class="filter-chip active" onclick="setFilter('ALL',this)">All</span>
  <span class="filter-chip race-chip" onclick="setFilter('GRANDTOURS',this)">Grand Tours</span>
  <span class="filter-chip race-chip" onclick="setFilter('MONUMENTS',this)">Monuments</span>
  <span class="filter-chip" onclick="setFilter('UWT',this)">UWT ⭐</span>
  <span class="filter-chip race-chip" onclick="setFilter('PRO',this)">Pro Series</span>
  <span class="filter-chip team-chip" onclick="setFilter('PRO',this)" style="display:none">ProTeam</span>
  <span class="filter-chip race-chip" onclick="setFilter('1.1',this)">1.1 / 2.1</span>
</div>

<main>
  <div id="loading">Loading race data…</div>

  <div class="section" id="sec-live"></div>
  <div class="section" id="sec-upcoming"></div>
  <div class="section" id="sec-recent"></div>
  <div class="section" id="sec-teams"></div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn" id="nav-live" onclick="showSec('live',this)">
    <span class="nav-icon">🔴<span class="live-dot" id="live-dot" style="display:none"></span></span>
    <span>Live</span>
  </button>
  <button class="nav-btn" id="nav-upcoming" onclick="showSec('upcoming',this)">
    <span class="nav-icon">📅</span><span>Upcoming</span>
  </button>
  <button class="nav-btn" id="nav-recent" onclick="showSec('recent',this)">
    <span class="nav-icon">✅</span><span>Recent</span>
  </button>
  <button class="nav-btn" id="nav-teams" onclick="showSec('teams',this)">
    <span class="nav-icon">👕</span><span>Teams</span>
  </button>
</nav>

<script>
// ── Helpers ────────────────────────────────────────────────────────────────────

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function chevron(cls) {
  return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>`;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
}
function dateRange(s, e) {
  if (!s) return '';
  return (!e || s===e) ? fmtDate(s) : `${fmtDate(s)} – ${fmtDate(e)}`;
}
function daysUntil(iso) {
  if (!iso) return 999;
  return Math.round((new Date(iso+'T00:00:00') - new Date()) / 86400000);
}

// ── Tab switching ──────────────────────────────────────────────────────────────

let currentTab = 'live';

function showSec(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  btn.classList.add('active');
  currentTab = name;
  // Swap filter chips based on tab
  const isTeams = name === 'teams';
  document.querySelectorAll('.race-chip').forEach(c => c.style.display = isTeams ? 'none' : '');
  document.querySelectorAll('.team-chip').forEach(c => c.style.display = isTeams ? '' : 'none');
  applyFilter(curFilter);
}

// ── Filter ─────────────────────────────────────────────────────────────────────

let curFilter = 'ALL';

function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilter(f);
}

function applyFilter(f) {
  // Race cards
  document.querySelectorAll('.race-card').forEach(card => {
    const cat = (card.dataset.cat || '').toUpperCase();
    let show = true;
    if      (f === 'GRANDTOURS') show = card.dataset.grandtour === 'true';
    else if (f === 'MONUMENTS')  show = card.dataset.monument  === 'true';
    else if (f === 'UWT')        show = cat.includes('UWT');
    else if (f === 'PRO')        show = cat.includes('PRO');
    else if (f === '1.1')        show = cat.startsWith('1.') || (cat.startsWith('2.') && !cat.includes('UWT') && !cat.includes('PRO'));
    card.style.display = show ? '' : 'none';
  });
  // Team cards — hide for race-specific filters
  const raceOnly = ['GRANDTOURS','MONUMENTS','1.1'];
  document.querySelectorAll('.team-card').forEach(card => {
    const cat = (card.dataset.cat || '').toUpperCase();
    let show = true;
    if      (raceOnly.includes(f)) show = false;
    else if (f === 'UWT')          show = cat === 'UWT';
    else if (f === 'PRO')          show = cat === 'PRO';
    card.style.display = show ? '' : 'none';
  });
}

// ── Top-10 table ───────────────────────────────────────────────────────────────

function renderTop10(rows) {
  if (!rows || !rows.length) return '<p class="empty">No results.</p>';
  const isTTT = rows.some(r => r.is_ttt);
  const riderHeader = isTTT ? 'Team' : 'Rider';
  return `<table class="top10-table">
    <thead><tr><th>#</th><th>${riderHeader}</th>${isTTT ? '' : '<th>Team</th>'}<th>Time</th></tr></thead>
    <tbody>${rows.map(r => {
      const slug = (r.rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim();
      const nameEl = (!isTTT && slug)
        ? `<span class="rider-name-link" onclick="openRiderModal('${esc(slug)}')">${esc(r.name)}</span>`
        : esc(r.name);
      return `<tr>
        <td class="rank-cell ${r.rank<=3?'rank-'+r.rank:''}">${r.rank}</td>
        <td>${esc(r.flag||'')} ${nameEl}</td>
        ${isTTT ? '' : `<td class="team-cell">${esc(r.team||'')}</td>`}
        <td class="time-cell">${esc(r.time_gap||'')}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

// ── Classifications ────────────────────────────────────────────────────────────

function renderLeaders(race) {
  const defs = [
    {leaderKey:'gc_leader',     top10Key:'gc_top10',     label:'GC',      badgeCls:'badge-gc'},
    {leaderKey:'points_leader', top10Key:'points_top10', label:'Points',  badgeCls:'badge-points'},
    {leaderKey:'kom_leader',    top10Key:'kom_top10',    label:'KOM',     badgeCls:'badge-mountain'},
    {leaderKey:'youth_leader',  top10Key:'youth_top10',  label:'Youth',   badgeCls:'badge-youth'},
  ];
  const rows = defs.filter(d => race[d.leaderKey]).map((d, i) => {
    const uid = `cl-${race._uid||Math.random().toString(36).slice(2)}-${i}`;
    const top10 = race[d.top10Key] || [];
    const hasTop10 = top10.length > 0;
    // Get leader slug from top10 first entry for profile tap
    const leaderSlug = top10.length ? (top10[0].rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim() : '';
    const leaderNameEl = leaderSlug
      ? `<span class="classif-leader-name rider-name-link" onclick="event.stopPropagation();openRiderModal('${esc(leaderSlug)}')">${esc(race[d.leaderKey])}</span>`
      : `<span class="classif-leader-name">${esc(race[d.leaderKey])}</span>`;
    return `<div class="classif-row${hasTop10?' clickable':''}" id="${uid}">
      <div class="classif-row-header"${hasTop10 ? ` onclick="toggleClassif('${uid}')"` : ''}>
        <span class="classif-badge ${d.badgeCls}">${d.label}</span>
        ${leaderNameEl}
        ${hasTop10 ? chevron('classif-chevron') : ''}
      </div>
      ${hasTop10 ? `<div class="classif-row-body">${renderTop10(top10)}</div>` : ''}
    </div>`;
  }).join('');
  return rows ? `<div class="classif-section"><div class="classif-title">Classifications</div>${rows}</div>` : '';
}

function toggleClassif(uid) { document.getElementById(uid)?.classList.toggle('open'); }

// ── Stage images (height profile + route map) ───────────────────────────────

function renderStageImages(s) {
  const hp = s.height_profile_img;
  const rt = s.route_img;
  if (!hp && !rt) return '';
  return `<div class="stage-images">
    ${hp ? `<div><img src="${esc(hp)}" alt="Height profile" loading="lazy"><div class="stage-img-label">Height profile</div></div>` : ''}
    ${rt ? `<div><img src="${esc(rt)}" alt="Route map" loading="lazy"><div class="stage-img-label">Route map</div></div>` : ''}
  </div>`;
}

// ── Stage type badge ─────────────────────────────────────────────────────────

function renderStageBadge(s) {
  const t = s.stage_type;
  if (!t) return '';
  const labels = { mountain: '⛰ Mountain', hilly: '〰 Hilly', flat: '▬ Flat', ITT: '⏱ ITT', TTT: '⏱ TTT' };
  return `<span class="stage-type-badge ${esc(t)}">${labels[t] || esc(t)}</span>`;
}

function renderStageInfo(s) {
  const parts = [];
  if (s.date_str) parts.push(s.date_str);
  if (s.start_town && s.finish_town) parts.push(`${esc(s.start_town)} → ${esc(s.finish_town)}`);
  if (s.distance_km) parts.push(`${s.distance_km} km`);
  if (s.elevation_m) parts.push(`↑${Number(s.elevation_m).toLocaleString()} m`);
  return parts.length ? `<div class="stage-info-line">${parts.join(' · ')}</div>` : '';
}

// ── Stages ─────────────────────────────────────────────────────────────────────

function renderStages(stages, cardId) {
  if (!stages || !stages.length) return '';
  // Find highest stage number that has actual result data
  const lastWithData = stages.reduce((mx, s) =>
    (s.winner || (s.top10 && s.top10.length)) ? Math.max(mx, s.num) : mx, 0);
  const rows = stages.map(s => {
    const uid = `s-${cardId}-${s.num}`;
    const hasResults = s.winner || (s.top10 && s.top10.length);
    const hasDetails = !!(s.distance_km || s.description || s.height_profile_img);
    const clickable   = hasResults || hasDetails;
    const laterHasData = !hasResults && s.num < lastWithData;

    // Build winner / status element
    let winnerEl = '';
    if (hasResults) {
      const isTTT = s.top10 && s.top10.length && s.top10[0].is_ttt;
      const winSlug = (!isTTT && s.top10 && s.top10[0]) ? (s.top10[0].rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim() : '';
      const prefix = isTTT ? '<span class="ttt-badge">TTT</span> ' : `${esc(s.winner_flag||'')} `;
      const wName = winSlug
        ? `<span class="rider-name-link" onclick="event.stopPropagation();openRiderModal('${esc(winSlug)}')">${esc(s.winner||'')}</span>`
        : esc(s.winner||'');
      winnerEl = `<span class="stage-winner-name">${prefix}${wName}</span>`;
    } else if (laterHasData) {
      winnerEl = `<span class="stage-no-data">Result unavailable</span>`;
    }
    // (no "Not yet run" label — the stage type badge + info line carry that context)

    const stageInfo = renderStageInfo(s);
    const descEl = s.description ? `<div class="stage-description">${esc(s.description)}</div>` : '';
    const bodyContent = `${renderStageImages(s)}${descEl}${hasResults ? renderTop10(s.top10) : ''}`;

    return `<div class="stage-row" id="${uid}">
      <div class="stage-row-header${clickable?' clickable':''}"${clickable?` onclick="toggleStage('${uid}')"`:''}">
        <span class="stage-num">Stage ${s.num}</span>
        ${renderStageBadge(s)}
        ${winnerEl}
        ${clickable ? chevron('stage-chevron') : ''}
      </div>
      ${stageInfo}
      ${clickable ? `<div class="stage-row-body">${bodyContent}</div>` : ''}
    </div>`;
  }).join('');
  return `<div class="stages-title">Stage Results</div>${rows}`;
}

function toggleStage(uid) { document.getElementById(uid)?.classList.toggle('open'); }

// ── Race card ──────────────────────────────────────────────────────────────────

let cardIdx = 0;

function renderRaceCard(race, status) {
  const id = `rc-${cardIdx++}`;
  race._uid = id;
  const total = race.total_stages || 1;
  const done  = race.stages_completed || 0;
  const multi = total > 1;
  const upcoming = status === 'upcoming';

  const stagePill = multi
    ? (upcoming ? `${total} stages` : `${done}/${total} stages`)
    : '1-day';

  let body = '';
  if (upcoming) {
    body = `<div class="upcoming-dates">📅 ${dateRange(race.start_date, race.end_date) || 'Dates TBC'}${multi ? ` &nbsp;·&nbsp; ${total} stages` : ''}</div>`;
  } else if (!multi) {
    const winSlug1d = race.top10 && race.top10[0] ? (race.top10[0].rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim() : '';
    const winnerName1d = winSlug1d
      ? `<span class="rider-name-link" onclick="openRiderModal('${esc(winSlug1d)}')">${esc(race.winner)}</span>`
      : esc(race.winner||'');
    const w = race.winner ? `<div class="single-winner"><span class="label">Winner</span> ${esc(race.winner_flag||'')} ${winnerName1d}</div>` : '';
    body = `<div class="race-body-inner">${w}${renderStageImages(race)}${renderTop10(race.top10)}</div>`;
  } else {
    body = `<div class="race-body-inner">${renderLeaders(race)}${renderStages(race.stages||[], id)}</div>`;
  }

  const meta = dateRange(race.start_date, race.end_date);

  const MONUMENT_NAMES = ['Milano-Sanremo','Ronde van Vlaanderen','Paris-Roubaix','Liège-Bastogne-Liège','Il Lombardia','Strade Bianche'];
  const isMonument  = MONUMENT_NAMES.some(m => (race.name||'').includes(m));
  const isGrandTour = (race.total_stages||1) >= 21;

  return `<div class="race-card ${status}-card" id="${id}" data-cat="${esc(race.category||'')}" data-monument="${isMonument}" data-grandtour="${isGrandTour}">
    <div class="race-header" onclick="toggleCard('${id}')">
      <div class="race-title">
        <div class="race-name">${esc(race.name||race.slug)}</div>
        ${meta ? `<div class="race-meta">${meta}</div>` : ''}
      </div>
      <div class="race-right">
        <span class="stage-pill">${stagePill}</span>
        ${race.category ? `<span class="cat-badge">${esc(race.category)}</span>` : ''}
        ${chevron('chevron')}
      </div>
    </div>
    <div class="race-body">${body}</div>
  </div>`;
}

function toggleCard(id) { document.getElementById(id)?.classList.toggle('open'); }

// ── Section renderers ──────────────────────────────────────────────────────────

function group(label, cards) {
  return cards.length ? `<div class="group-header">${label}</div>${cards}` : '';
}

function renderLive(races) {
  const el = document.getElementById('sec-live');
  if (!races.length) { el.innerHTML = '<p class="empty">No live races right now.</p>'; return; }
  el.innerHTML = races.map(r => renderRaceCard(r, 'live')).join('');
  // Auto-open single live race
  if (races.length === 1) el.querySelector('.race-card')?.classList.add('open');
  // Show live dot
  document.getElementById('live-dot').style.display = 'inline-block';
}

function renderUpcoming(races) {
  const el = document.getElementById('sec-upcoming');
  if (!races.length) { el.innerHTML = '<p class="empty">No upcoming races.</p>'; return; }
  const sorted = [...races].sort((a,b) => (a.start_date||'').localeCompare(b.start_date||''));
  const thisWeek  = sorted.filter(r => { const d=daysUntil(r.start_date); return d>=0&&d<7; });
  const nextWeek  = sorted.filter(r => { const d=daysUntil(r.start_date); return d>=7&&d<14; });
  const later     = sorted.filter(r => daysUntil(r.start_date) >= 14);
  el.innerHTML =
    group('This week',  thisWeek.map(r=>renderRaceCard(r,'upcoming')).join('')) +
    group('Next week',  nextWeek.map(r=>renderRaceCard(r,'upcoming')).join('')) +
    group('Coming up',  later.map(r=>renderRaceCard(r,'upcoming')).join('')) ||
    '<p class="empty">No upcoming races.</p>';
}

function renderRecent(races) {
  const el = document.getElementById('sec-recent');
  if (!races.length) { el.innerHTML = '<p class="empty">No recent results.</p>'; return; }
  const sorted = [...races].sort((a,b) => (b.end_date||'').localeCompare(a.end_date||''));
  const gt     = sorted.filter(r => r.category==='2.UWT' && (r.total_stages||1)>1);
  const stage  = sorted.filter(r => !gt.includes(r) && (r.total_stages||1)>1);
  const oneday = sorted.filter(r => (r.total_stages||1)===1);
  el.innerHTML =
    group('🏆 Grand Tours',      gt.map(r=>renderRaceCard(r,'recent')).join('')) +
    group('📋 Stage Races',      stage.map(r=>renderRaceCard(r,'recent')).join('')) +
    group('🏅 One-Day Classics', oneday.map(r=>renderRaceCard(r,'recent')).join(''));
}

// ── Teams ──────────────────────────────────────────────────────────────────────

function renderRiderRow(r, teamId, idx) {
  const uid = `rdr-${teamId}-${idx}`;
  const wins   = r.wins || [];
  const hasWins = wins.length > 0;
  const natImg = r.nat
    ? `<img src="https://cyclingflash.com/svg/flags/${esc(r.nat)}.svg" width="16" height="16" style="vertical-align:middle;margin-right:5px" loading="lazy">`
    : '';
  const photo = r.photo
    ? `<img class="rider-photo" src="${esc(r.photo)}" alt="${esc(r.name)}" loading="lazy">`
    : `<div class="rider-photo-ph">🚴</div>`;

  let dob = '';
  if (r.dob) {
    const d = new Date(r.dob);
    const age = Math.floor((Date.now() - d) / (365.25 * 86400000));
    dob = `${d.getFullYear()} · ${age} yrs`;
  } else if (r.age) {
    dob = `${r.age} yrs`;
  }

  const winsHTML = hasWins
    ? wins.slice(0, 20).map(w =>
        `<div class="win-entry">
          <span class="win-year">${esc(w.year)}</span>
          <span class="win-race">${esc(w.race)}</span>
          <span class="win-cat">${esc(w.cat)}</span>
        </div>`).join('')
    : '';

  return `<div class="rider-row-wrap" id="${uid}">
    <div class="rider-row${hasWins ? ' clickable' : ''}"${hasWins ? ` onclick="toggleRider('${uid}')"` : ''}>
      ${photo}
      <div class="rider-name-col">
        <div class="rider-name-text">${natImg}${esc(r.name)}</div>
        ${dob ? `<div class="rider-sub">${dob}</div>` : ''}
      </div>
      ${hasWins ? `<span class="wins-badge">🏆 ${wins.length}</span>` : ''}
      ${hasWins ? chevron('rider-chevron') : ''}
    </div>
    ${hasWins ? `<div class="wins-panel">${winsHTML}</div>` : ''}
  </div>`;
}

function toggleRider(uid) { document.getElementById(uid)?.classList.toggle('open'); }

let teamIdx = 0;

function renderTeamCard(team) {
  const id = `tc-${teamIdx++}`;
  const cat = (team.cat || '').toUpperCase();
  const catLabel = cat === 'UWT' ? '🌍 WorldTeam' : '🔵 ProTeam';
  const catCls   = cat === 'UWT' ? 'uwt' : 'pro';
  const jersey = team.jersey
    ? `<img class="team-jersey-thumb" src="${esc(team.jersey)}" alt="jersey" loading="lazy">`
    : `<div class="team-jersey-placeholder">👕</div>`;

  const riders = team.riders || [];
  const roster = riders.map((r, i) => renderRiderRow(r, id, i)).join('');
  const profiledCount = riders.filter(r => r.photo).length;
  const riderMeta = profiledCount < riders.length
    ? `${riders.length} riders (${riders.length - profiledCount} loading...)`
    : `${riders.length} riders`;

  return `<div class="team-card ${catCls}" id="${id}" data-cat="${cat}">
    <div class="team-header" onclick="toggleCard('${id}')">
      ${jersey}
      <div class="team-title">
        <div class="team-name-text">${esc(team.name)}</div>
        <div class="team-meta">${catLabel} &nbsp;·&nbsp; ${riderMeta}</div>
      </div>
      ${chevron('chevron')}
    </div>
    <div class="team-body">${roster}</div>
  </div>`;
}

function renderTeams(teams) {
  const el = document.getElementById('sec-teams');
  if (!teams || !teams.length) {
    el.innerHTML = '<p class="empty">No team data yet — run the scraper.</p>';
    return;
  }
  const uwt = teams.filter(t => t.cat === 'UWT');
  const pro = teams.filter(t => t.cat !== 'UWT');
  let html = '';
  if (uwt.length) html += `<div class="group-header">🌍 UCI WorldTeam (${uwt.length})</div>` + uwt.map(renderTeamCard).join('');
  if (pro.length) html += `<div class="group-header">🔵 UCI ProTeam (${pro.length})</div>`     + pro.map(renderTeamCard).join('');
  el.innerHTML = `
    <div class="rider-search-wrap">
      <span class="rider-search-icon">🔍</span>
      <input class="rider-search-input" id="riderSearch" type="search" placeholder="Search rider…" oninput="searchRiders(this.value)">
    </div>
    <div id="rider-search-results" style="display:none;padding:0 14px 14px"></div>
    <div id="teams-list" style="padding:14px">${html}</div>`;
}

function searchRiders(q) {
  const resultEl = document.getElementById('rider-search-results');
  const teamsEl  = document.getElementById('teams-list');
  q = q.trim().toLowerCase();
  if (!q) {
    resultEl.style.display = 'none';
    teamsEl.style.display = '';
    return;
  }
  teamsEl.style.display = 'none';
  resultEl.style.display = '';

  const matches = [];
  for (const team of (appData.teams || [])) {
    for (const r of (team.riders || [])) {
      if ((r.name||'').toLowerCase().includes(q)) {
        matches.push({...r, teamName: team.name});
      }
    }
  }

  if (!matches.length) {
    resultEl.innerHTML = '<p class="empty" style="padding:16px">No riders found.</p>';
    return;
  }

  resultEl.innerHTML = `<div class="group-header">${matches.length} rider${matches.length>1?'s':''} found</div>` +
    matches.map((r, i) => renderRiderRow(r, 'search', i)).join('');
}

// ── Rider profile modal ────────────────────────────────────────────────────────

function openRiderModal(slug) {
  const profile = (appData.rider_profiles || {})[slug];
  const modal = document.getElementById('riderModal');
  const content = document.getElementById('riderModalContent');

  let baseInfo = null;
  for (const team of (appData.teams || [])) {
    const r = (team.riders || []).find(r => r.slug === slug);
    if (r) { baseInfo = {...r, teamName: team.name}; break; }
  }

  const name     = (profile || baseInfo || {}).name || slug.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  const nat      = (profile || baseInfo || {}).nat || '';
  const photo    = (profile || {}).photo;
  const dob      = (profile || {}).dob;
  const wins     = (profile || {}).wins || [];
  const teamName = (baseInfo || {}).teamName || '';

  const photoEl = photo
    ? `<img class="rider-modal-photo" src="${esc(photo)}" alt="${esc(name)}">`
    : `<div class="rider-modal-photo-ph">🚴</div>`;

  let meta = '';
  if (nat) meta += `<img src="https://cyclingflash.com/svg/flags/${esc(nat)}.svg" width="14" height="14" style="vertical-align:middle;margin-right:4px">${nat}`;
  if (dob) {
    const age = Math.floor((Date.now() - new Date(dob)) / (365.25*86400000));
    meta += (meta ? ' · ' : '') + `Born ${dob} (${age} yrs)`;
  }
  if (teamName) meta += (meta ? '<br>' : '') + teamName;

  const winsHTML = wins.length
    ? wins.map(w => `<div class="win-entry"><span class="win-year">${esc(w.year)}</span><span class="win-race">${esc(w.race)}</span><span class="win-cat">${esc(w.cat)}</span></div>`).join('')
    : `<p class="rider-modal-no-data">No wins data yet — check back after next scrape</p>`;

  content.innerHTML = `
    <div class="rider-modal-header">
      ${photoEl}
      <div>
        <div class="rider-modal-name">${esc(name)}</div>
        ${meta ? `<div class="rider-modal-meta">${meta}</div>` : ''}
      </div>
    </div>
    <div class="rider-modal-section">🏆 Palmares (${wins.length} wins)</div>
    <div class="wins-panel" style="display:block">${winsHTML}</div>
  `;

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeRiderModal(e) {
  if (!e || e.target === document.getElementById('riderModal')) {
    document.getElementById('riderModal').classList.remove('open');
    document.body.style.overflow = '';
  }
}

// ── Data loading ───────────────────────────────────────────────────────────────

let appData = {};

async function loadData(force=false) {
  try {
    const url = force ? './data.json?t=' + Date.now() : './data.json';
    const opts = force ? {cache:'no-cache'} : {};
    const r = await fetch(url, opts);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    appData = await r.json();
    document.getElementById('last-updated').textContent = `Updated ${appData.scraped_at_human || '—'}`;
    document.getElementById('loading').style.display = 'none';
    document.querySelectorAll('.section').forEach(s => s.style.display = '');
    renderLive(appData.live || []);
    renderUpcoming(appData.upcoming || []);
    renderRecent(appData.recent || []);
    renderTeams(appData.teams || []);
    const defaultTab = (appData.live||[]).length ? 'live' : 'upcoming';
    showSec(defaultTab, document.getElementById('nav-' + defaultTab));
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="text-align:center;color:var(--muted)">⚠️ Could not load race data<br><small>${esc(e.message)}</small></div>`;
  }
}

async function refreshData() {
  const btn = document.querySelector('.refresh-btn');
  btn.textContent = '⏳';
  await loadData(true);
  btn.textContent = '↻';
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-btn').style.display = 'flex';
});
function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
}
window.addEventListener('appinstalled', () => {
  document.getElementById('install-btn').style.display = 'none';
});

const APP_VERSION = 'v9';
document.getElementById('app-version').textContent = APP_VERSION;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
  // When a new SW activates it sends SW_UPDATED → reload to get new index.html
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'SW_UPDATED') {
      console.log('SW updated to', e.data.version, '— reloading');
      window.location.reload();
    }
  });
}

loadData();

// ── Background auto-refresh every 30 minutes ─────────────────────────────────
let _lastScrapedAt = '';
async function silentCheck() {
  try {
    const r = await fetch('./data.json?t=' + Date.now(), {cache: 'no-cache'});
    if (!r.ok) return;
    const d = await r.json();
    if (d.scraped_at && d.scraped_at !== _lastScrapedAt) {
      appData = d;
      _lastScrapedAt = d.scraped_at;
      document.getElementById('last-updated').textContent = `Updated ${d.scraped_at_human || '—'}`;
      renderLive(appData.live || []);
      renderUpcoming(appData.upcoming || []);
      renderRecent(appData.recent || []);
      showBanner('📡 New race data loaded');
    }
  } catch(e) {}
}
function showBanner(msg) {
  let b = document.getElementById('update-banner');
  if (!b) {
    b = document.createElement('div');
    b.id = 'update-banner';
    b.style.cssText = 'position:fixed;bottom:calc(var(--nav-h) + 8px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#4361ee;color:#fff;font-size:.82rem;font-weight:700;padding:7px 18px;border-radius:20px;z-index:999;pointer-events:none;transition:opacity .5s';
    document.body.appendChild(b);
  }
  b.textContent = msg;
  b.style.opacity = '1';
  setTimeout(() => { b.style.opacity = '0'; }, 3500);
}
// Capture initial scraped_at after first load
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => { _lastScrapedAt = appData.scraped_at || ''; }, 2000);
});
setInterval(silentCheck, 30 * 60 * 1000); // every 30 min
// Also check when tab becomes visible again (phone unlock / tab switch)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') silentCheck();
});
</script>
