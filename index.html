const normName = n => (n||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z]/g,' ').replace(/\s+/g,' ').trim();

function getRaceRiders(){
  // Return riders from the active race's startlist, enriched with team roster data where possible.
  // Falls back to full peloton if no startlist exists.
  const raceKey=fantasyGetRace();
  const race=[...(appData.live||[]),...(appData.upcoming||[]),...(appData.recent||[])].find(r=>_raceKey(r)===raceKey);
  const sl=race&&race.startlist&&race.startlist.length?race.startlist:null;
  if(!sl) return getAllRiders();
  // Build a lookup from the full roster for enrichment (photo, slug)
  const rosterMap=new Map();
  for(const team of (appData.teams||[])){
    for(const r of (team.riders||[])){
      if(r.name) rosterMap.set(normName(r.name),{...r,teamName:team.name});
    }
  }
  const riders=[],seen=new Set();
  for(const r of sl){
    if(!r.name||seen.has(r.name))continue;
    seen.add(r.name);
    const enriched=rosterMap.get(normName(r.name))||{};
    riders.push({name:r.name,slug:r.slug||enriched.slug||'',nat:(r.nat||enriched.nat||'').toLowerCase(),photo:enriched.photo||'',teamName:enriched.teamName||r.team||''});
  }
  return riders.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
}

function getAllRiders(){
  const riders=[],seen=new Set();
  // 1. Team rosters (full peloton once scraper has run)
  for(const team of (appData.teams||[])){
    for(const r of (team.riders||[])){
      if(r.name&&!seen.has(r.name)){seen.add(r.name);riders.push({name:r.name,slug:r.slug||'',nat:(r.nat||'').toLowerCase(),photo:r.photo||'',teamName:team.name});}
    }
  }
  // 2. Race results — nat_code field holds the country code (e.g. "GB")
  for(const section of ['recent','live','upcoming']){
    for(const race of (appData[section]||[])){
      for(const stage of (race.stages||[])){
        for(const r of (stage.top10||[])){
          const nat=r.nat_code||r.nat||'';
          if(r.name&&!seen.has(r.name)){seen.add(r.name);riders.push({name:r.name,slug:'',nat:nat.toLowerCase(),photo:'',teamName:r.team||''});}
        }
      }
      const cl=race.classifications||{};
      for(const key of ['gc','points','mountain','youth']){
        for(const r of (cl[key]||[])){
          const nat=r.nat_code||r.nat||'';
          if(r.name&&!seen.has(r.name)){seen.add(r.name);riders.push({name:r.name,slug:'',nat:nat.toLowerCase(),photo:'',teamName:r.team||''});}
        }
      }
    }
  }
  return riders.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
}

function computePoints(riderNames,createdAt){
  const myNorm=new Set(riderNames.map(normName));
  const cutoff=createdAt?new Date(createdAt):null;
  let pts=0;const breakdown=[];
  for(const race of [...(appData.recent||[]),...(appData.live||[])]){
    if(cutoff&&race.end_date){const rd=new Date(race.end_date);if(rd<cutoff)continue;}
    for(const stage of (race.stages||[])){
      for(const r of (stage.top10||[])){
        if(r.rank>=1&&r.rank<=10&&myNorm.has(normName(r.name))){
          const p=STAGE_PTS[r.rank]||0;
          if(p>0){pts+=p;breakdown.push({race:race.name,label:'Stage '+stage.stage_num,rank:r.rank,pts:p,rider:r.name});}
        }
      }
    }
    const cl=race.classifications||{};
    for(const r of (cl.gc||[])){
      if(r.rank>=1&&r.rank<=10&&myNorm.has(normName(r.name))){
        const p=GC_PTS[r.rank]||0;
        if(p>0){pts+=p;breakdown.push({race:race.name,label:'GC',rank:r.rank,pts:p,rider:r.name});}
      }
    }
    // Yellow jersey holder (GC leader) — jersey bonuses don't stack with Yellow
    const yellowNorm=normName(((cl.gc||[])[0]||{}).name||'');
    const sp=(cl.points||[])[0];
    if(sp&&myNorm.has(normName(sp.name))&&normName(sp.name)!==yellowNorm){pts+=JERSEY_PTS;breakdown.push({race:race.name,label:'Points Jersey 🟢',rank:1,pts:JERSEY_PTS,rider:sp.name});}
    const km=(cl.mountain||[])[0];
    if(km&&myNorm.has(normName(km.name))&&normName(km.name)!==yellowNorm){pts+=JERSEY_PTS;breakdown.push({race:race.name,label:'KOM Jersey 🔴',rank:1,pts:JERSEY_PTS,rider:km.name});}
    const yu=(cl.youth||[])[0];
    if(yu&&myNorm.has(normName(yu.name))&&normName(yu.name)!==yellowNorm){pts+=JERSEY_PTS;breakdown.push({race:race.name,label:'Youth Jersey ⚪',rank:1,pts:JERSEY_PTS,rider:yu.name});}
  }
  return{total:pts,breakdown};
}

function fSearchRiders(q){
  const el=document.getElementById('fRiderResults');if(!el)return;
  const raw=(q||'').trim();
  const picked=new Set(_fPicked.map(r=>r.name));
  const all=getRaceRiders().filter(r=>!picked.has(r.name));
  const lbl=document.getElementById('fRiderCount');
  if(!all.length){
    if(lbl)lbl.textContent='';
    el.innerHTML='<div style="padding:12px;color:var(--muted);font-size:.85rem">No rider data yet — run the scraper first.</div>';
    return;
  }
  let matches;
  if(!raw){
    matches=all; // show every available rider alphabetically
  } else {
    const lq=raw.toLowerCase();
    const starts=all.filter(r=>(r.name||'').toLowerCase().startsWith(lq));
    const contains=all.filter(r=>!(r.name||'').toLowerCase().startsWith(lq)&&(r.name||'').toLowerCase().includes(lq));
    matches=[...starts,...contains];
  }
  if(lbl)lbl.textContent='— '+matches.length+' available';
  if(!matches.length){el.innerHTML='<div style="padding:12px;color:var(--muted);font-size:.85rem">No riders found</div>';return;}
  const spent=squadCost(_fPicked);
  const remaining=FANTASY_BUDGET-spent;
  el.innerHTML=matches.map(r=>{
    const c=riderCost(r.name);
    const canAfford=c<=remaining&&_fPicked.length<maxSquad();
    const overBudget=c>remaining&&_fPicked.length<maxSquad();
    const restrictedBadge=r.restricted?'<span style="font-size:.68rem;font-weight:700;color:#f97316;background:rgba(249,115,22,.15);border-radius:3px;padding:1px 5px;flex-shrink:0">DNS?</span>':'';
    const budgetBadge=overBudget?'<span style="font-size:.68rem;font-weight:700;color:#ef4444;background:rgba(239,68,68,.12);border-radius:3px;padding:1px 5px;flex-shrink:0">💰over</span>':'';
    const infoBtn=r.slug?'<button onclick="event.stopPropagation();openRiderModal(\''+esc(r.slug)+'\')" style="background:none;border:none;cursor:pointer;font-size:.9rem;padding:0 2px;opacity:.6;flex-shrink:0" title="View profile">ℹ️</button>':'';
    return '<div '+(canAfford?'data-pick="'+esc(r.name)+'"':'data-pick-disabled="1"')+' style="padding:9px 12px;cursor:'+(canAfford?'pointer':'default')+';display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);transition:background .15s;opacity:'+(canAfford?'1':'.45')+'" onmouseenter="if('+(canAfford?'true':'false')+')this.style.background=\'var(--surface)\'" onmouseleave="this.style.background=\'\'">'
      +(r.nat?flag(r.nat):'<span style="width:20px;display:inline-block"></span>')
      +'<span style="flex:1;font-size:.9rem">'+esc(r.name)+'</span>'
      +restrictedBadge+budgetBadge
      +'<span style="font-size:.75rem;color:var(--muted);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.teamName||'')+'</span>'
      +costBadge(r.name)
      +infoBtn
    +'</div>';
  }).join('');
  el.querySelectorAll('[data-pick]').forEach(node=>node.addEventListener('click',()=>fPickRider(node.dataset.pick)));
}

function fPickRider(name){
  if(_fPicked.length>=maxSquad()){const ms=maxSquad();alert('Squad full! You need exactly '+ms+' riders.');return;}
  const r=getRaceRiders().find(r=>r.name===name)||getAllRiders().find(r=>r.name===name);
  if(!r||_fPicked.find(p=>p.name===name))return;
  const cost=riderCost(name);
  const spent=squadCost(_fPicked);
  if(spent+cost>FANTASY_BUDGET){alert('Not enough budget! '+name+' costs '+cost+' cr but you only have '+(FANTASY_BUDGET-spent)+' cr left.');return;}
  _fPicked.push(r);
  renderPickedList();
  const srch=document.getElementById('fRiderSearch');
  fSearchRiders(srch?srch.value:'');
  _fSaveDraft();
}

function fRemovePicked(name){
  _fPicked=_fPicked.filter(r=>r.name!==name);
  renderPickedList();
  const srch=document.getElementById('fRiderSearch');
  fSearchRiders(srch?srch.value:'');
  _fSaveDraft();
}

function _fSaveDraft(){
  const nameEl=document.getElementById('fTeamName'),ownerEl=document.getElementById('fOwnerName'),emailEl=document.getElementById('fOwnerEmail');
  draftSave({picked:[..._fPicked],name:nameEl?nameEl.value:'',owner:ownerEl?ownerEl.value:'',email:emailEl?emailEl.value:''});
}

function _fUpdateSquadUI(){
  const n=_fPicked.length;
  const MS=maxSquad();
  const progPct=Math.round(n/MS*100);
  const progCol=n===MS?'var(--upcoming)':n>=(MS-1)?'#f97316':'var(--accent)';
  const cnt=document.getElementById('fPickCount');if(cnt){cnt.textContent=n;cnt.style.color=progCol;}
  const bar=document.getElementById('fSquadBar');if(bar){bar.style.width=progPct+'%';bar.style.background=progCol;}
  const msg=document.getElementById('fSquadMsg');
  if(msg)msg.textContent=n===MS?'Squad complete — ready to create!':(n===0?'Pick '+MS+' riders to build your team':('Need '+(MS-n)+' more rider'+(MS-n===1?'':'s')));
  const btn=document.getElementById('fCreateBtn');
  if(btn){
    if(n===MS){btn.disabled=false;btn.style.background='var(--upcoming)';btn.style.color='#fff';btn.style.cursor='pointer';btn.textContent='✅ Create Team';}
    else{btn.disabled=true;btn.style.background='var(--border)';btn.style.color='var(--muted)';btn.style.cursor='not-allowed';btn.textContent='Pick '+MS+' Riders to Continue';}
  }
}

function renderPickedList(){
  const el=document.getElementById('fPickedList');if(!el)return;
  _fUpdateSquadUI();
  if(!_fPicked.length){el.innerHTML='';updateBudgetBar(0);return;}
  const spent=squadCost(_fPicked);
  const remaining=FANTASY_BUDGET-spent;
  el.innerHTML='<div style="display:flex;flex-direction:column;gap:4px">'
    +_fPicked.map(r=>
      '<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:9px 12px;display:flex;align-items:center;gap:8px">'
        +(r.nat?flag(r.nat):'<span style="width:16px;display:inline-block"></span>')
        +'<span style="flex:1;font-size:.9rem;font-weight:600">'+esc(r.name)+'</span>'
        +costBadge(r.name)
        +'<button data-unpick="'+esc(r.name)+'" style="background:none;border:none;color:var(--live);font-size:1rem;cursor:pointer;padding:0 4px">✕</button>'
      +'</div>'
    ).join('')
    +'</div>';
  el.querySelectorAll('[data-unpick]').forEach(node=>node.addEventListener('click',()=>fRemovePicked(node.dataset.unpick)));
  updateBudgetBar(spent);
}

function updateBudgetBar(spent){
  const bar=document.getElementById('fBudgetBar');if(!bar)return;
  const pct=Math.min(100,Math.round(spent/FANTASY_BUDGET*100));
  const remaining=FANTASY_BUDGET-spent;
  const col=remaining<10?'var(--live)':remaining<25?'#f97316':'var(--upcoming)';
  bar.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">'
      +'<span style="font-size:.78rem;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase">Budget</span>'
      +'<span style="display:flex;align-items:baseline;gap:6px">'
        +'<span style="font-size:1.6rem;font-weight:800;color:'+col+';line-height:1">'+remaining+'</span>'
        +'<span style="font-size:.78rem;color:var(--muted)">/ '+FANTASY_BUDGET+' cr remaining</span>'
      +'</span>'
    +'</div>'
    +'<div style="height:10px;background:var(--border);border-radius:5px;overflow:hidden">'
      +'<div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:5px;transition:width .35s ease"></div>'
    +'</div>'
    +'<div style="display:flex;justify-content:space-between;margin-top:4px;font-size:.72rem;color:var(--muted)">'
      +'<span>Spent: '+spent+' cr</span>'
      +'<span>'+pct+'% used</span>'
    +'</div>';
}

function _pinHash(p){return p.split('').reduce((h,c)=>((h<<5)-h+c.charCodeAt(0))|0,5381).toString(36);}
function fVerifyPin(team,action,onOk){
  if(!team.pin_hash){onOk();return;}
  const entered=(prompt('Enter your 4-digit PIN to '+action+':','')+'').trim();
  if(!entered)return;
  if(_pinHash(entered)!==team.pin_hash){alert('\u274c Incorrect PIN.');return;}
  onOk();
}
function fCreateTeam(){
  const nameEl=document.getElementById('fTeamName'),ownerEl=document.getElementById('fOwnerName'),pinEl=document.getElementById('fTeamPin'),emailEl=document.getElementById('fOwnerEmail');
  const name=nameEl?nameEl.value.trim():'',owner=ownerEl?ownerEl.value.trim():'';
  const email=(emailEl?emailEl.value.trim():'');
  const pin=(pinEl?pinEl.value:'').trim();
  if(!name||!owner){alert('Please enter a team name and owner name.');return;}
  const _ms=maxSquad();if(_fPicked.length!==_ms){alert('You must pick exactly '+_ms+' riders. You have '+_fPicked.length+'.');return;}
  if(!/^\d{4}$/.test(pin)){alert('Please set a 4-digit PIN to protect your team.');return;}
  if(email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){alert('Please enter a valid email address (or leave it blank).');return;}
  const _crk=fantasyGetRace();
  const _craces=[...(appData.live||[]),...(appData.upcoming||[]),...(appData.recent||[])].find(r=>_raceKey(r)===_crk);
  fantasySave({name,owner,email:email||'',riders:[..._fPicked],_race:_craces?_craces.name:'',created_at:new Date().toISOString(),pin_hash:_pinHash(pin)});
  draftClear();
  _fPicked=[];
  if(email) _notifySubscribersExportNeeded();
  renderFantasy();
}

function _notifySubscribersExportNeeded(){
  // Set a flag so the My Squad view prompts to re-export subscribers.json
  try{localStorage.setItem('uci_subscribers_dirty','1');}catch(e){}
}

function fOpenSwap(name){
  _fSwapOut=name;
  const panel=document.getElementById('fSwapPanel');
  const label=document.getElementById('fSwapLabel');
  const srch=document.getElementById('fSwapSearch');
  const res=document.getElementById('fSwapResults');
  if(!panel)return;
  if(label)label.textContent='Swapping out: '+name+' (costs 1 transfer)';
  if(srch)srch.value='';
  if(res)res.style.display='none';
  panel.style.display='';
}

function fCloseSwap(){
  const p=document.getElementById('fSwapPanel');if(p)p.style.display='none';
}

function fSearchSwap(q){
  const el=document.getElementById('fSwapResults');if(!el)return;
  const raw=q.trim();
  const team=fantasyLoad();
  const squad=new Set((team&&team.riders||[]).map(r=>r.name));
  const all=getAllRiders().filter(r=>!squad.has(r.name));
  let matches;
  if(!raw){
    matches=all.slice(0,20);
  } else {
    const lq=raw.toLowerCase();
    const starts=all.filter(r=>(r.name||'').toLowerCase().startsWith(lq));
    const contains=all.filter(r=>!(r.name||'').toLowerCase().startsWith(lq)&&(r.name||'').toLowerCase().includes(lq));
    matches=[...starts,...contains].slice(0,20);
  }
  if(!all.length){el.style.display='block';el.innerHTML='<div style="padding:10px;color:var(--muted);font-size:.85rem">No rider data yet.</div>';return;}
  if(!matches.length){el.style.display='block';el.innerHTML='<div style="padding:10px;color:var(--muted);font-size:.85rem">No riders found</div>';return;}
  el.style.display='block';
  const curCost=squadCost(team&&team.riders||[]);
  const outCost=riderCost(_fSwapOut||'');
  el.innerHTML=matches.map(r=>{
    const c=riderCost(r.name);
    const netChange=c-outCost;
    const affordable=(curCost-outCost+c)<=FANTASY_BUDGET;
    const changeStr=netChange>0?'+'+netChange:netChange===0?'±0':''+netChange;
    const changeCol=netChange>0?'var(--live)':netChange<0?'#2dd36f':'var(--muted)';
    return '<div data-doswap="'+esc(r.name)+'" style="padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);transition:background .15s;opacity:'+(affordable?'1':'.4')+'" onmouseenter="this.style.background=\'var(--surface2)\'" onmouseleave="this.style.background=\'\'">'
      +(r.nat?flag(r.nat):'<span style="width:20px;display:inline-block"></span>')
      +'<span style="flex:1;font-size:.88rem">'+esc(r.name)+'</span>'
      +costBadge(r.name)
      +'<span style="font-size:.72rem;font-weight:700;color:'+changeCol+';min-width:26px;text-align:right">'+changeStr+'</span>'
    +'</div>';
  }).join('');
  el.querySelectorAll('[data-doswap]').forEach(node=>node.addEventListener('click',()=>fDoSwap(node.dataset.doswap)));
}

function fDoSwap(inName){
  const team=fantasyLoad();if(!team)return;
  if((team.transfers_used||0)>=team.transfers_total){alert('No transfers remaining!');return;}
  const inR=getAllRiders().find(r=>r.name===inName);if(!inR)return;
  const outCost=riderCost(_fSwapOut);
  const inCost=riderCost(inName);
  const currentCost=squadCost(team.riders);
  const newCost=currentCost-outCost+inCost;
  if(newCost>FANTASY_BUDGET){alert('Over budget! Swapping in '+inName+' ('+inCost+' cr) would take your squad to '+newCost+' cr — budget is '+FANTASY_BUDGET+' cr.');return;}
  fVerifyPin(team,'confirm this transfer',()=>{
    team.riders=team.riders.map(r=>r.name===_fSwapOut?inR:r);
    team.transfers_used=(team.transfers_used||0)+1;
    fantasySave(team);renderFantasy();
  });
}

// ── League Table ──────────────────────────────────────────────────────────────

function renderLeagueTable(teams){
  const medals=['🥇','🥈','🥉'];
  const single=teams.length===1&&teams[0].isMine;
  const leaderPts=teams.length>0?teams[0].points:0;
  function fmtDate(iso){if(!iso)return'';try{const d=new Date(iso);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return'';}}
  return '<div style="margin-bottom:16px">'
    +'<div class="group-header">🏆 League Table</div>'
    +'<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden">'
      +teams.map((t,i)=>{
        const gap=i===0
          ?'<span style="font-size:.7rem;font-weight:700;color:var(--upcoming);letter-spacing:.5px">LEADER</span>'
          :'<span style="font-size:.78rem;color:var(--live);font-weight:600">−'+(leaderPts-t.points)+' pts</span>';
        const created=t.created_at?'<span style="font-size:.7rem;color:var(--muted)"> · From '+fmtDate(t.created_at)+'</span>':'';
        const isIC=t.isIClaudius;
        const canDelete = !t.isMine && !isIC && t.leagueIdx !== undefined;
        const deleteBtn = canDelete
          ? '<button onclick="leagueRemove('+t.leagueIdx+')" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:.72rem;cursor:pointer;margin-left:4px" title="Remove from league">✕</button>'
          : '';
        return '<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;'+(t.isMine?'background:rgba(67,97,238,.1)':isIC?'background:rgba(124,58,237,.07)':'')+'">'
          +'<span style="font-size:1.1rem;min-width:26px">'+(isIC?'🏛️':(medals[i]||(i+1)))+'</span>'
          +'<div style="flex:1;min-width:0">'
            +'<div style="font-weight:600;font-size:.92rem">'+esc(t.name)+(t.isMine?' <span style="font-size:.68rem;background:var(--upcoming);color:#fff;padding:1px 6px;border-radius:10px">YOU</span>':isIC?' <span style="font-size:.68rem;background:#7c3aed;color:#fff;padding:1px 6px;border-radius:10px">AI</span>':'')+' </div>'
            +'<div style="font-size:.76rem;color:var(--muted)">'+esc(t.owner)+created+'</div>'
          +'</div>'
          +'<div style="text-align:right;display:flex;align-items:center;gap:4px">'
            +'<div>'
              +'<div style="font-size:1.2rem;font-weight:800;color:var(--gold)">'+t.points+'</div>'
              +'<div style="margin-top:1px">'+gap+'</div>'
            +'</div>'
            +deleteBtn
          +'</div>'
        +'</div>';
      }).join('')
      +'<div style="padding:10px 14px">'
        +(single?'<div style="font-size:.82rem;color:var(--muted);margin-bottom:8px">Share your export code with friends to build a league.</div>':'')
        +'<button onclick="fImportTeam()" style="width:100%;padding:9px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer">+ Import a Friend\'s Team</button>'
      +'</div>'
    +'</div>'
  +'</div>';
}
// ── Watchlist ─────────────────────────────────────────────────────────────────

function renderWatchlist(watchlist){
  const allRaces=[...(appData.recent||[]),...(appData.live||[])];
  const watched=watchlist.map(w=>{
    let wins=0,top3=0,pts=0;
    for(const race of allRaces){
      for(const stage of (race.stages||[])){
        const r=(stage.top10||[]).find(r=>normName(r.name)===normName(w.name));
        if(r){if(r.rank===1)wins++;if(r.rank<=3)top3++;pts+=(STAGE_PTS[r.rank]||0);}
      }
      const cl=race.classifications||{};
      for(const r of (cl.gc||[])){if(normName(r.name)===normName(w.name)){pts+=(GC_PTS[r.rank]||0);}}
    }
    return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;position:relative">'
      +'<button data-unwatch="'+esc(w.name)+'" style="position:absolute;top:8px;right:8px;background:none;border:none;color:var(--muted);font-size:.85rem;cursor:pointer;line-height:1">✕</button>'
      +(w.nat?'<img src="https://flagcdn.com/16x12/'+w.nat.toLowerCase()+'.png" width="22" height="15" style="margin-bottom:4px;border-radius:1px">':'')
      +'<div style="font-size:.88rem;font-weight:700;margin-bottom:8px;padding-right:24px">'+esc(w.name)+'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center">'
        +'<div style="background:var(--surface2);border-radius:5px;padding:6px 4px"><div style="font-size:1.1rem;font-weight:800;color:var(--gold)">'+wins+'</div><div style="font-size:.62rem;color:var(--muted)">WINS</div></div>'
        +'<div style="background:var(--surface2);border-radius:5px;padding:6px 4px"><div style="font-size:1.1rem;font-weight:800">'+top3+'</div><div style="font-size:.62rem;color:var(--muted)">TOP 3</div></div>'
        +'<div style="background:var(--surface2);border-radius:5px;padding:6px 4px"><div style="font-size:1.1rem;font-weight:800;color:var(--upcoming)">'+pts+'</div><div style="font-size:.62rem;color:var(--muted)">PTS</div></div>'
      +'</div>'
    +'</div>';
  });

  const canAdd=watchlist.length<MAX_WATCH;
  const addCard=canAdd?'<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:90px">'
    +'<div style="font-size:.78rem;color:var(--muted);margin-bottom:6px">Follow a rider</div>'
    +'<input id="fWatchSearch" type="search" placeholder="Type name to search riders…" autocomplete="off" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:.85rem;outline:none" oninput="fSearchWatch(this.value)" onfocus="fSearchWatch(this.value)">'
    +'<div id="fWatchResults" style="max-height:160px;overflow-y:auto;margin-top:6px;display:none;border:1px solid var(--border);border-radius:6px;background:var(--surface2)"></div>'
  +'</div>':'';

  return '<div>'
    +'<div class="group-header">👁 Rider Watchlist ('+watchlist.length+'/'+MAX_WATCH+')</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
      +watched.join('')+addCard
    +'</div>'
  +'</div>';
}

function fSearchWatch(q){
  const el=document.getElementById('fWatchResults');if(!el)return;
  const raw=q.trim();
  const watched=new Set(watchLoad().map(w=>w.name));
  const all=getAllRiders().filter(r=>!watched.has(r.name));
  let matches;
  if(!raw){
    matches=all.slice(0,15);
  } else {
    const lq=raw.toLowerCase();
    const starts=all.filter(r=>(r.name||'').toLowerCase().startsWith(lq));
    const contains=all.filter(r=>!(r.name||'').toLowerCase().startsWith(lq)&&(r.name||'').toLowerCase().includes(lq));
    matches=[...starts,...contains].slice(0,15);
  }
  if(!matches.length&&!all.length){el.style.display='none';return;}
  if(!matches.length){el.style.display='block';el.innerHTML='<div style="padding:10px;color:var(--muted);font-size:.82rem">No riders found</div>';return;}
  el.style.display='block';
  el.innerHTML=matches.map(r=>
    '<div data-addwatch="'+esc(r.name)+'" data-nat="'+esc(r.nat||'')+'" data-slug="'+esc(r.slug||'')+'" style="padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);transition:background .15s" onmouseenter="this.style.background=\'var(--surface)\'" onmouseleave="this.style.background=\'\'">'
      +(r.nat?flag(r.nat):'<span style="width:20px;display:inline-block"></span>')
      +'<span style="flex:1;font-size:.85rem">'+esc(r.name)+'</span>'
      +'<span style="color:var(--upcoming);font-weight:700">+</span>'
    +'</div>'
  ).join('');
  el.querySelectorAll('[data-addwatch]').forEach(node=>node.addEventListener('click',()=>fAddWatch(node.dataset.addwatch,node.dataset.nat||'',node.dataset.slug||'')));
}

function fAddWatch(name,nat,slug){
  const w=watchLoad();
  if(w.length>=MAX_WATCH||w.find(x=>x.name===name))return;
  watchSave([...w,{name,nat:nat||'',slug:slug||''}]);
  renderFantasy();
}

function fRemoveWatch(name){
  watchSave(watchLoad().filter(w=>w.name!==name));
  renderFantasy();
}

// ── Export / Import ───────────────────────────────────────────────────────────

function fExportTeam(){
  const team=fantasyLoad();if(!team)return;
  const{total}=computePoints((team.riders||[]).map(r=>r.name),team.created_at);
  const code=btoa(unescape(encodeURIComponent(JSON.stringify({...team,points:total}))));
  navigator.clipboard&&navigator.clipboard.writeText(code).catch(()=>{});
  const box=fModal(
    '📤 Your Team Code',
    '<div style="font-size:.72rem;color:var(--muted);margin-bottom:8px">Share this with friends so they can import your team.</div>'
    +'<textarea readonly style="width:100%;height:80px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:.72rem;resize:none;word-break:break-all;font-family:monospace">'+esc(code)+'</textarea>'
    +'<div style="font-size:.75rem;color:#2dd36f;margin:6px 0">✓ Copied to clipboard</div>'
  );
  box.querySelector('button').textContent='Done';
}

function fDoImport(code){
  try{
    const raw=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    if(!raw||!Array.isArray(raw.riders)||!raw.riders.length) throw new Error('bad');
    // Validate squad size — hard cap 8 riders max
    if(raw.riders.length>8){
      alert('❌ This team has '+raw.riders.length+' riders — max allowed is 8. Import rejected.');return;
    }
    // Validate budget using current rider pricing
    const cost=squadCost(raw.riders);
    if(cost>FANTASY_BUDGET){
      alert('❌ This team costs '+cost+' credits (budget is '+FANTASY_BUDGET+'). Import rejected.');return;
    }
    const t={name:raw.name||'Imported Team',owner:raw.owner||'',riders:raw.riders,
      created_at:raw.created_at||new Date().toISOString(),total_cost:cost};
    leagueAdd(t);
    renderFantasy();
    alert('✅ '+t.name+' added to your league ('+t.riders.length+' riders, '+cost+' credits)');
  }catch(e){alert('❌ Invalid code — check you pasted it correctly.');}
}

function fImportTeam(){
  fModal(
    '📥 Import a Team',
    '<div style="font-size:.82rem;color:var(--muted);margin-bottom:10px">Paste a team export code:</div>'
    +'<textarea id="fImportBox" style="width:100%;height:90px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:.72rem;font-family:monospace;resize:none;outline:none" placeholder="Paste code here…"></textarea>',
    function(){
      const box=document.getElementById('fImportBox');
      if(box)fDoImport(box.value);
    },'Import'
  );
}

function fModal(title,body,onConfirm,confirmLabel){
  const box=document.createElement('div');
  box.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;width:90%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.6)';
  const btns=onConfirm
    ?'<button id="fModalCancel" style="flex:1;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-weight:600;cursor:pointer">Cancel</button>'
     +'<button id="fModalOk" style="flex:1;padding:10px;background:var(--upcoming);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer">'+(confirmLabel||'OK')+'</button>'
    :'<button onclick="this.closest(\'[data-modal]\').remove()" style="width:100%;padding:10px;background:var(--upcoming);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer">'+(confirmLabel||'Close')+'</button>';
  box.innerHTML=
    '<div style="font-weight:700;font-size:1rem;margin-bottom:12px">'+title+'</div>'
   +'<div style="font-size:.88rem;line-height:1.5;color:var(--muted);margin-bottom:16px">'+body+'</div>'
   +'<div style="display:flex;gap:8px">'+btns+'</div>';
  box.setAttribute('data-modal','1');
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9998';
  document.body.append(overlay,box);
  const close=()=>{overlay.remove();box.remove();};
  overlay.addEventListener('click',close);
  const cancelBtn=box.querySelector('#fModalCancel');
  if(cancelBtn) cancelBtn.addEventListener('click',close);
  const okBtn=box.querySelector('#fModalOk');
  if(okBtn) okBtn.addEventListener('click',()=>{if(onConfirm)onConfirm();close();});
  return box;
}

// ── Subscriber export ─────────────────────────────────────────────────────────
function exportSubscribers(){
  const all=[];
  const seen=new Set();
  function addTeam(t,source){
    if(!t||!t.email)return;
    const e=t.email.trim().toLowerCase();
    if(!e||seen.has(e))return;
    seen.add(e);
    all.push({email:t.email.trim(),name:t.owner||'',team:t.name||'',race:t._race||'',source,added:t.created_at||new Date().toISOString()});
  }
  addTeam(fantasyLoad(),'own');
  for(const t of leagueLoad()) addTeam(t,'imported');
  if(!all.length){
    alert('No emails saved yet — team owners need to add an email when creating their team.');
    return;
  }
  const json=JSON.stringify(all,null,2);
  if(window.showSaveFilePicker){
    window.showSaveFilePicker({
      suggestedName:'subscribers.json',
      types:[{description:'JSON',accept:{'application/json':['.json']}}]
    }).then(async fh=>{
      const w=await fh.createWritable();
      await w.write(json);
      await w.close();
      localStorage.removeItem('uci_subscribers_dirty');
      alert('✅ Notification list saved — your friends will receive race alerts.');
      renderFantasy();
    }).catch(()=>{});
    return;
  }
  // Fallback: trigger download
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='subscribers.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.removeItem('uci_subscribers_dirty');
  alert('✅ Downloaded — save this file to your UCI Calendar folder to enable race alerts.');
  renderFantasy();
}

// ── Service Worker ─────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(e=>console.warn('SW:',e));
}
