<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Men's UCI Road Calendar">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Men's UCI Road Calendar</title>
<style>
:root {
  --bg:       #0f1117;
  --surface:  #1a1d27;
  --surface2: #22263a;
  --border:   #2e334d;
  --live:     #e63946;
  --upcoming: #4361ee;
  --recent:   #2d6a4f;
  --text:     #e8eaf0;
  --muted:    #8890b0;
  --accent:   #f4a261;
  --gold:     #ffd700;
  --silver:   #c0c0c0;
  --bronze:   #cd7f32;
  --nav-h:    58px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-top: env(safe-area-inset-top);
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

header h1 { font-size: 1.1rem; font-weight: 800; }
header h1 span { color: var(--accent); }

.header-actions { display: flex; align-items: center; gap: 8px; }

#install-btn {
  display: none;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  background: rgba(244,162,97,.15);
  border: 1px solid rgba(244,162,97,.4);
  border-radius: 16px;
  color: var(--accent);
  font-size: .85rem;
  font-weight: 700;
  cursor: pointer;
}

.refresh-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color .2s;
}
.refresh-btn:hover { color: var(--text); }

.header-sub { font-size: .78rem; color: var(--muted); }

/* ── Filter bar ── */
.filter-bar {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  overflow-x: auto;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 64px;
  z-index: 99;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }

.filter-chip {
  flex-shrink: 0;
  padding: 5px 13px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}
.filter-chip.active {
  background: var(--upcoming);
  border-color: var(--upcoming);
  color: #fff;
}

/* ── Sections ── */
.section { display: none; padding: 16px 14px; }
.section.active { display: block; }

.group-header {
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 18px 4px 8px;
}
.group-header:first-child { padding-top: 4px; }

/* ── Race card ── */
.race-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.race-card.live-card     { border-left: 3px solid var(--live); }
.race-card.recent-card   { border-left: 3px solid var(--recent); }
.race-card.upcoming-card { border-left: 3px solid var(--upcoming); }

.race-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  min-height: 62px;
}
.race-header:active { background: var(--surface2); }

.race-title { flex: 1; min-width: 0; }
.race-name {
  font-size: 1rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.race-meta { font-size: .8rem; color: var(--muted); margin-top: 3px; }

.race-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.cat-badge {
  font-size: .75rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}

.stage-pill { font-size: .78rem; color: var(--muted); white-space: nowrap; }

.chevron {
  width: 20px; height: 20px;
  color: var(--muted);
  transition: transform .2s;
  flex-shrink: 0;
}
.race-card.open .chevron { transform: rotate(180deg); }

.race-body { display: none; border-top: 1px solid var(--border); }
.race-card.open .race-body { display: block; }

.race-body-inner { padding: 14px; }

/* ── Classifications accordion ── */
.classif-section { margin-bottom: 16px; }
.classif-title {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 0 6px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}
.classif-row {
  border-bottom: 1px solid var(--border);
}
.classif-row:last-child { border-bottom: none; }
.classif-row-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 2px;
  cursor: pointer;
  user-select: none;
}
.classif-row-header:active { background: #2a2f47; }
.classif-badge {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .7px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 10px;
  white-space: nowrap;
  min-width: 62px;
  text-align: center;
}
.badge-gc       { background: rgba(245,203,66,.18);  color: #f5cb42; border: 1px solid rgba(245,203,66,.35); }
.badge-points   { background: rgba(45,211,111,.15);  color: #2dd36f; border: 1px solid rgba(45,211,111,.35); }
.badge-mountain { background: rgba(230,57,70,.15);   color: #e63946; border: 1px solid rgba(230,57,70,.35); }
.badge-youth    { background: rgba(76,201,240,.15);  color: #4cc9f0; border: 1px solid rgba(76,201,240,.35); }
.classif-leader-name { font-size: .92rem; font-weight: 600; flex: 1; }
.classif-chevron {
  width: 18px; height: 18px; flex-shrink: 0; color: var(--muted);
  transition: transform .2s;
}
.classif-row.open .classif-chevron { transform: rotate(180deg); }
.classif-row-body { display: none; padding-bottom: 8px; }
.classif-row.open .classif-row-body { display: block; }

/* ── Stages ── */
.stages-title {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.stage-row {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 5px;
  overflow: hidden;
}

.stage-row-header {
  padding: 11px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 46px;
}
.stage-row-header.clickable { cursor: pointer; }
.stage-row-header.clickable:active { background: #2a2f47; }

.stage-num { font-size: .78rem; font-weight: 700; color: var(--muted); min-width: 58px; }
.stage-winner-name { font-size: .92rem; flex: 1; }
.stage-no-data { font-size: .82rem; color: var(--muted); flex: 1; font-style: italic; }
.ttt-badge { font-size: .65rem; font-weight: 700; letter-spacing: .6px; background: rgba(76,201,240,.18); color: #4cc9f0; border: 1px solid rgba(76,201,240,.35); border-radius: 4px; padding: 1px 5px; vertical-align: middle; }

.stage-chevron {
  width: 16px; height: 16px;
  color: var(--muted);
  transition: transform .15s;
  flex-shrink: 0;
}
.stage-row.open .stage-chevron { transform: rotate(180deg); }
.stage-row-body { display: none; border-top: 1px solid var(--border); }
.stage-row.open .stage-row-body { display: block; }
.stage-images { display: flex; flex-direction: column; gap: 8px; padding: 10px 12px 0; }
.stage-images img { width: 100%; border-radius: 6px; display: block; }
.stage-img-label { font-size: .68rem; color: var(--muted); margin-top: 2px; }

/* ── Stage type badges & detail info ── */
.stage-type-badge { display: inline-block; font-size: .62rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; padding: 1px 6px; border-radius: 3px; vertical-align: middle; margin-right: 2px; flex-shrink: 0; }
.stage-type-badge.mountain        { background: #6c3483; color: #fff; }
.stage-type-badge.medium_mountain { background: #9b59b6; color: #fff; }
.stage-type-badge.hilly           { background: #c0392b; color: #fff; }
.stage-type-badge.flat            { background: #27ae60; color: #fff; }
.stage-type-badge.ITT             { background: #2980b9; color: #fff; }
.stage-type-badge.TTT             { background: #16a085; color: #fff; }
.stage-info-line { font-size: .74rem; color: var(--muted); padding: 0 12px 7px; margin-top: -4px; }
.stage-description { font-size: .82rem; line-height: 1.55; color: var(--text); padding: 8px 12px 12px; border-top: 1px solid var(--border); }

/* ── Top-10 table ── */
.top10-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
.top10-table th {
  text-align: left;
  padding: 7px 10px;
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.top10-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
.top10-table tr:last-child td { border-bottom: none; }
.rank-cell { width: 32px; font-weight: 700; color: var(--muted); }
.rank-1 { color: var(--gold); }
.rank-2 { color: var(--silver); }
.rank-3 { color: var(--bronze); }
.time-cell { color: var(--muted); font-family: monospace; font-size: .82rem; }
.team-cell { color: var(--muted); font-size: .78rem; }

/* ── Upcoming dates ── */
.upcoming-dates { padding: 14px 16px; font-size: .9rem; color: var(--muted); }

/* ── Startlist ── */
.startlist-toggle { display:flex; align-items:center; gap:6px; padding:10px 16px; font-size:.85rem; font-weight:600; color:var(--muted); cursor:pointer; border-top:1px solid var(--border); user-select:none; }
.startlist-toggle:hover { color:var(--text); }
.startlist-body { display:none; padding:0 16px 12px; }
.race-card.open .startlist-body { display:block; }
.startlist-teams { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:4px 16px; margin-top:6px; }
.startlist-team-name { font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-top:10px; margin-bottom:2px; grid-column:1/-1; }
.startlist-rider { font-size:.82rem; color:var(--text); padding:1px 0; display:flex; align-items:center; gap:5px; }
.startlist-rider .flag-img { width:16px; height:11px; object-fit:cover; border-radius:1px; flex-shrink:0; }
.startlist-empty { font-size:.82rem; color:var(--muted); font-style:italic; }

/* ── Single-day winner ── */
.single-winner {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  font-size: .95rem;
  font-weight: 600;
}
.single-winner .label {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── Bottom nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px 2px 4px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: .72rem;
  font-weight: 600;
  gap: 3px;
}
.nav-btn .nav-icon { font-size: 1.25rem; position: relative; }
.nav-btn.active { color: var(--accent); }

.live-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--live);
  position: absolute;
  top: 0; right: -4px;
  animation: ping 1.5s infinite;
}
@keyframes ping { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }

/* ── Team cards ── */
.team-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.team-card.uwt { border-left: 3px solid var(--gold); }
.team-card.pro  { border-left: 3px solid var(--upcoming); }

.team-header {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  min-height: 70px;
}
.team-header:active { background: var(--surface2); }

.team-jersey-thumb {
  width: 52px;
  height: 52px;
  object-fit: contain;
  background: #fff;
  border-radius: 6px;
  padding: 4px;
  flex-shrink: 0;
}
.team-jersey-placeholder {
  width: 52px; height: 52px;
  background: var(--surface2);
  border-radius: 6px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
}

.team-title { flex: 1; min-width: 0; }
.team-name-text {
  font-size: .95rem;
  font-weight: 700;
  line-height: 1.3;
}
.team-meta { font-size: .78rem; color: var(--muted); margin-top: 3px; }

.team-body { display: none; border-top: 1px solid var(--border); }
.team-card.open .team-body { display: block; }
.team-card.open .chevron { transform: rotate(180deg); }

.roster-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
.roster-table th {
  text-align: left;
  padding: 7px 10px;
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.roster-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.roster-table tr:last-child td { border-bottom: none; }
.roster-num { width: 28px; color: var(--muted); font-weight: 700; font-size: .78rem; }
.roster-age { color: var(--muted); font-size: .82rem; width: 36px; text-align: right; }

/* ── Rider profile in roster ── */
.rider-photo {
  width: 34px; height: 34px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--surface2);
  flex-shrink: 0;
}
.rider-photo-ph {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem;
}
.rider-row-wrap { border-bottom: 1px solid var(--border); }
.rider-row-wrap:last-child { border-bottom: none; }
.rider-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
}
.rider-row.clickable { cursor: pointer; }
.rider-row.clickable:active { background: var(--surface2); }
.rider-name-col { flex: 1; min-width: 0; }
.rider-name-text { font-size: .88rem; font-weight: 600; }
.rider-sub { font-size: .72rem; color: var(--muted); margin-top: 1px; }
.wins-badge {
  font-size: .7rem; font-weight: 700;
  background: rgba(244,162,97,.15);
  color: var(--accent);
  border: 1px solid rgba(244,162,97,.3);
  border-radius: 10px;
  padding: 2px 7px;
  white-space: nowrap;
  flex-shrink: 0;
}
.rider-chevron {
  width: 14px; height: 14px;
  color: var(--muted);
  transition: transform .15s;
  flex-shrink: 0;
}
.rider-row-wrap.open .rider-chevron { transform: rotate(180deg); }

.wins-panel { display: none; background: var(--bg); }
.rider-row-wrap.open .wins-panel { display: block; }
.win-entry {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  font-size: .82rem;
}
.win-entry:last-child { border-bottom: none; }
.win-year { color: var(--accent); font-weight: 700; font-size: .78rem; min-width: 32px; }
.win-race { flex: 1; }
.win-cat  { color: var(--muted); font-size: .72rem; }

/* ── Misc ── */
.empty {
  color: var(--muted);
  font-style: italic;
  text-align: center;
  padding: 32px 16px;
  font-size: .9rem;
}

#loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 60vh;
  color: var(--muted);
  font-size: 1rem;
}
/* ── Rider modal ── */
.rider-modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 1000;
  align-items: flex-end;
  justify-content: center;
}
.rider-modal-overlay.open { display: flex; }
.rider-modal {
  background: var(--surface);
  border-radius: 18px 18px 0 0;
  width: 100%;
  max-width: 520px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 20px 16px 36px;
  box-shadow: 0 -4px 32px rgba(0,0,0,.4);
}
.rider-modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.rider-modal-header {
  display: flex;
  gap: 14px;
  align-items: center;
  margin-bottom: 16px;
}
.rider-modal-photo {
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  flex-shrink: 0;
}
.rider-modal-photo-ph {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; flex-shrink: 0;
}
.rider-modal-name { font-size: 1.1rem; font-weight: 800; line-height: 1.2; }
.rider-modal-meta { font-size: .82rem; color: var(--muted); margin-top: 3px; }
.rider-modal-section {
  font-size: .7rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted);
  border-bottom: 1px solid var(--border);
  padding-bottom: 5px; margin: 14px 0 8px;
}
.rider-modal-no-data { font-size: .85rem; color: var(--muted); font-style: italic; }
.rider-name-link {
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: rgba(255,255,255,.25);
  text-underline-offset: 2px;
}

/* ── Rider search ── */
.rider-search-wrap {
  padding: 10px 14px 4px;
  position: sticky;
  top: 108px;
  z-index: 98;
  background: var(--bg);
}
.rider-search-input {
  width: 100%;
  padding: 9px 14px 9px 36px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: .92rem;
  outline: none;
}
.rider-search-input:focus { border-color: var(--upcoming); }
.rider-search-icon {
  position: absolute;
  left: 26px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: .95rem;
  pointer-events: none;
}
.rider-search-wrap { position: relative; }
</style>
</head>
<body>

<!-- Rider profile modal -->
<div class="rider-modal-overlay" id="riderModal" onclick="closeRiderModal(event)">
  <div class="rider-modal">
    <div class="rider-modal-handle"></div>
    <div id="riderModalContent"></div>
  </div>
</div>

<header>
  <div class="header-top">
    <h1>🚴 Men's <span>UCI Road Calendar</span></h1>
    <div class="header-actions">
      <button id="install-btn" onclick="installPWA()">⬇ Install</button>
      <button class="refresh-btn" onclick="refreshData()" title="Refresh">↻</button>
    </div>
  </div>
  <div class="header-sub"><span id="last-updated">Loading…</span> <span id="app-version" style="opacity:.45;margin-left:6px"></span></div>
</header>

<div class="filter-bar" id="filter-bar">
  <span class="filter-chip active" onclick="setFilter('ALL',this)">All</span>
  <span class="filter-chip race-chip" onclick="setFilter('GRANDTOURS',this)">Grand Tours</span>
  <span class="filter-chip race-chip" onclick="setFilter('MONUMENTS',this)">Monuments</span>
  <span class="filter-chip" onclick="setFilter('UWT',this)">UWT ⭐</span>
  <span class="filter-chip race-chip" onclick="setFilter('PRO',this)">Pro Series</span>
  <span class="filter-chip team-chip" onclick="setFilter('PRO',this)" style="display:none">ProTeam</span>
  <span class="filter-chip race-chip" onclick="setFilter('1.1',this)">1.1 / 2.1</span>
  <span class="filter-chip" onclick="setFilter('THISWEEK',this)">📅 This Week</span>
</div>
<div class="filter-bar" id="filter-bar-stages" style="margin-top:4px">
  <span style="font-size:0.72rem;opacity:0.6;align-self:center;margin-right:4px">No of Days:</span>
  <span class="filter-chip stages-chip active" onclick="setMinStages(1,this)">All</span>
  <span class="filter-chip stages-chip" onclick="setMinStages(2,this)">2+</span>
  <span class="filter-chip stages-chip" onclick="setMinStages(5,this)">5+</span>
  <span class="filter-chip stages-chip" onclick="setMinStages(7,this)">7+</span>
  <span class="filter-chip stages-chip" onclick="setMinStages(21,this)">GT only</span>
</div>

<main>
  <div id="loading">Loading race data…</div>

  <div class="section" id="sec-live"></div>
  <div class="section" id="sec-upcoming"></div>
  <div class="section" id="sec-recent"></div>
  <div class="section" id="sec-teams"></div>
  <div class="section" id="sec-fantasy"></div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn" id="nav-live" onclick="showSec('live',this)">
    <span class="nav-icon">🔴<span class="live-dot" id="live-dot" style="display:none"></span></span>
    <span>Live</span>
  </button>
  <button class="nav-btn" id="nav-upcoming" onclick="showSec('upcoming',this)">
    <span class="nav-icon">📅</span><span>Upcoming</span>
  </button>
  <button class="nav-btn" id="nav-recent" onclick="showSec('recent',this)">
    <span class="nav-icon">✅</span><span>Recent</span>
  </button>
  <button class="nav-btn" id="nav-teams" onclick="showSec('teams',this)">
    <span class="nav-icon">👕</span><span>Teams</span>
  </button>
  <button class="nav-btn" id="nav-fantasy" onclick="showSec('fantasy',this)">
    <span class="nav-icon">🏆</span><span>Fantasy</span>
  </button>
</nav>

<script>
// ── Helpers ────────────────────────────────────────────────────────────────────

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function chevron(cls) {
  return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>`;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
}
function dateRange(s, e) {
  if (!s) return '';
  return (!e || s===e) ? fmtDate(s) : `${fmtDate(s)} – ${fmtDate(e)}`;
}
function daysUntil(iso) {
  if (!iso) return 999;
  return Math.round((new Date(iso+'T00:00:00') - new Date()) / 86400000);
}

// ── Tab switching ──────────────────────────────────────────────────────────────

let currentTab = 'live';

function showSec(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  btn.classList.add('active');
  currentTab = name;
  // Hide filter bars on fantasy tab
  const isFantasy = name === 'fantasy';
  document.getElementById('filter-bar').style.display        = isFantasy ? 'none' : '';
  document.getElementById('filter-bar-stages').style.display = isFantasy ? 'none' : '';
  // Swap race/team chips
  const isTeams = name === 'teams';
  document.querySelectorAll('.race-chip').forEach(c => c.style.display = isTeams ? 'none' : '');
  document.querySelectorAll('.team-chip').forEach(c => c.style.display = isTeams ? '' : 'none');
  if (!isFantasy) applyFilter(curFilter);
  if (isFantasy)  renderFantasy();
}

// ── Filter ─────────────────────────────────────────────────────────────────────

let curFilter = 'ALL';
let curMinStages = 1;

function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('#filter-bar .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function setMinStages(n, el) {
  curMinStages = n;
  document.querySelectorAll('.stages-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const f = curFilter;
  const minS = curMinStages;
  // Race cards
  document.querySelectorAll('.race-card').forEach(card => {
    const cat = (card.dataset.cat || '').toUpperCase();
    const stages = parseInt(card.dataset.stages || '1', 10);
    let show = true;
    if      (f === 'GRANDTOURS') show = card.dataset.grandtour === 'true';
    else if (f === 'MONUMENTS')  show = card.dataset.monument  === 'true';
    else if (f === 'UWT')        show = cat.includes('UWT');
    else if (f === 'PRO')        show = cat.includes('PRO');
    else if (f === '1.1')        show = cat.startsWith('1.') || (cat.startsWith('2.') && !cat.includes('UWT') && !cat.includes('PRO'));
    else if (f === 'THISWEEK') {
      const now  = new Date(); now.setHours(0,0,0,0);
      const soon = new Date(now.getTime() + 8*24*3600*1000);
      const s = card.dataset.start ? new Date(card.dataset.start+'T00:00:00') : null;
      const e = card.dataset.end   ? new Date(card.dataset.end  +'T00:00:00') : s;
      show = s && s <= soon && e >= now;
    }
    if (show && minS > 1)        show = stages >= minS;
    card.style.display = show ? '' : 'none';
  });
  // Team cards — hide for race-specific filters
  const raceOnly = ['GRANDTOURS','MONUMENTS','1.1'];
  document.querySelectorAll('.team-card').forEach(card => {
    const cat = (card.dataset.cat || '').toUpperCase();
    let show = true;
    if      (raceOnly.includes(f)) show = false;
    else if (f === 'UWT')          show = cat === 'UWT';
    else if (f === 'PRO')          show = cat === 'PRO';
    card.style.display = show ? '' : 'none';
  });
}

function applyFilter(f) { applyFilters(); }

// ── Top-10 table ───────────────────────────────────────────────────────────────

function renderTop10(rows) {
  if (!rows || !rows.length) return '<p class="empty">No results.</p>';
  const isTTT = rows.some(r => r.is_ttt);
  const riderHeader = isTTT ? 'Team' : 'Rider';
  return `<table class="top10-table">
    <thead><tr><th>#</th><th>${riderHeader}</th>${isTTT ? '' : '<th>Team</th>'}<th>Time</th></tr></thead>
    <tbody>${rows.map(r => {
      const slug = (r.rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim();
      const nameEl = (!isTTT && slug)
        ? `<span class="rider-name-link" onclick="openRiderModal('${esc(slug)}')">${esc(r.name)}</span>`
        : esc(r.name);
      return `<tr>
        <td class="rank-cell ${r.rank<=3?'rank-'+r.rank:''}">${r.rank}</td>
        <td>${esc(r.flag||'')} ${nameEl}</td>
        ${isTTT ? '' : `<td class="team-cell">${esc(r.team||'')}</td>`}
        <td class="time-cell">${esc(r.time_gap||'')}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

// ── Classifications ────────────────────────────────────────────────────────────

function renderLeaders(race) {
  const defs = [
    {leaderKey:'gc_leader',     top10Key:'gc_top10',     label:'GC',      badgeCls:'badge-gc'},
    {leaderKey:'points_leader', top10Key:'points_top10', label:'Points',  badgeCls:'badge-points'},
    {leaderKey:'kom_leader',    top10Key:'kom_top10',    label:'KOM',     badgeCls:'badge-mountain'},
    {leaderKey:'youth_leader',  top10Key:'youth_top10',  label:'Youth',   badgeCls:'badge-youth'},
  ];
  const rows = defs.filter(d => race[d.leaderKey]).map((d, i) => {
    const uid = `cl-${race._uid||Math.random().toString(36).slice(2)}-${i}`;
    const top10 = race[d.top10Key] || [];
    const hasTop10 = top10.length > 0;
    // Get leader slug from top10 first entry for profile tap
    const leaderSlug = top10.length ? (top10[0].rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim() : '';
    const leaderNameEl = leaderSlug
      ? `<span class="classif-leader-name rider-name-link" onclick="event.stopPropagation();openRiderModal('${esc(leaderSlug)}')">${esc(race[d.leaderKey])}</span>`
      : `<span class="classif-leader-name">${esc(race[d.leaderKey])}</span>`;
    return `<div class="classif-row${hasTop10?' clickable':''}" id="${uid}">
      <div class="classif-row-header"${hasTop10 ? ` onclick="toggleClassif('${uid}')"` : ''}>
        <span class="classif-badge ${d.badgeCls}">${d.label}</span>
        ${leaderNameEl}
        ${hasTop10 ? chevron('classif-chevron') : ''}
      </div>
      ${hasTop10 ? `<div class="classif-row-body">${renderTop10(top10)}</div>` : ''}
    </div>`;
  }).join('');
  return rows ? `<div class="classif-section"><div class="classif-title">Classifications</div>${rows}</div>` : '';
}

function toggleClassif(uid) { document.getElementById(uid)?.classList.toggle('open'); }

// ── Stage images (height profile + route map) ───────────────────────────────

function renderStageImages(s) {
  const hp = s.height_profile_img;
  const rt = s.route_img;
  if (!hp && !rt) return '';
  return `<div class="stage-images">
    ${hp ? `<div><img src="${esc(hp)}" alt="Height profile" loading="lazy"><div class="stage-img-label">Height profile</div></div>` : ''}
    ${rt ? `<div><img src="${esc(rt)}" alt="Route map" loading="lazy"><div class="stage-img-label">Route map</div></div>` : ''}
  </div>`;
}

// ── Stage type badge ─────────────────────────────────────────────────────────

function renderStageBadge(s) {
  const t = s.stage_type;
  if (!t) return '';
  const labels = { mountain: '⛰ Mountain', medium_mountain: '🏔 Med Mountain', hilly: '〰 Hilly', flat: '▬ Flat', ITT: '⏱ ITT', TTT: '⏱ TTT' };
  return `<span class="stage-type-badge ${esc(t)}">${labels[t] || esc(t)}</span>`;
}

function renderStageInfo(s) {
  const parts = [];
  if (s.date_str) parts.push(s.date_str);
  if (s.start_town && s.finish_town) parts.push(`${esc(s.start_town)} → ${esc(s.finish_town)}`);
  if (s.distance_km) parts.push(`${s.distance_km} km`);
  if (s.elevation_m) parts.push(`↑${Number(s.elevation_m).toLocaleString()} m`);
  return parts.length ? `<div class="stage-info-line">${parts.join(' · ')}</div>` : '';
}

// ── Stages ─────────────────────────────────────────────────────────────────────

function renderStages(stages, cardId) {
  if (!stages || !stages.length) return '';
  // Find highest stage number that has actual result data
  const lastWithData = stages.reduce((mx, s) =>
    (s.winner || (s.top10 && s.top10.length)) ? Math.max(mx, s.num) : mx, 0);
  const rows = stages.map(s => {
    const uid = `s-${cardId}-${s.num}`;
    const hasResults = s.winner || (s.top10 && s.top10.length);
    const hasDetails = !!(s.distance_km || s.description || s.height_profile_img);
    const clickable   = hasResults || hasDetails;
    const laterHasData = !hasResults && s.num < lastWithData;

    // Build winner / status element
    let winnerEl = '';
    if (hasResults) {
      const isTTT = s.top10 && s.top10.length && s.top10[0].is_ttt;
      const winSlug = (!isTTT && s.top10 && s.top10[0]) ? (s.top10[0].rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim() : '';
      const prefix = isTTT ? '<span class="ttt-badge">TTT</span> ' : `${esc(s.winner_flag||'')} `;
      const wName = winSlug
        ? `<span class="rider-name-link" onclick="event.stopPropagation();openRiderModal('${esc(winSlug)}')">${esc(s.winner||'')}</span>`
        : esc(s.winner||'');
      winnerEl = `<span class="stage-winner-name">${prefix}${wName}</span>`;
    } else if (laterHasData) {
      winnerEl = `<span class="stage-no-data">Result unavailable</span>`;
    }
    // (no "Not yet run" label — the stage type badge + info line carry that context)

    const stageInfo = renderStageInfo(s);
    const descEl = s.description ? `<div class="stage-description">${esc(s.description)}</div>` : '';
    const bodyContent = `${renderStageImages(s)}${descEl}${hasResults ? renderTop10(s.top10) : ''}`;

    return `<div class="stage-row" id="${uid}">
      <div class="stage-row-header${clickable?' clickable':''}"${clickable?` onclick="toggleStage('${uid}')"`:''}">
        <span class="stage-num">Stage ${s.num}</span>
        ${renderStageBadge(s)}
        ${winnerEl}
        ${clickable ? chevron('stage-chevron') : ''}
      </div>
      ${stageInfo}
      ${clickable ? `<div class="stage-row-body">${bodyContent}</div>` : ''}
    </div>`;
  }).join('');
  const hasAnyResults = stages.some(s => s.winner || s.top10?.length);
  return `<div class="stages-title">${hasAnyResults ? 'Stage Results' : 'Route'}</div>${rows}`;
}

function toggleStage(uid) { document.getElementById(uid)?.classList.toggle('open'); }

// ── Race card ──────────────────────────────────────────────────────────────────

let cardIdx = 0;

function renderStartlist(race) {
  const sl = race.startlist || [];
  if (!sl.length) return '';
  // Group by team
  const teams = {};
  const teamOrder = [];
  for (const r of sl) {
    const t = r.team || 'Unknown';
    if (!teams[t]) { teams[t] = []; teamOrder.push(t); }
    teams[t].push(r);
  }
  let rows = '';
  for (const t of teamOrder) {
    rows += `<div class="startlist-team-name">${esc(t)}</div>`;
    for (const r of teams[t]) {
      const flagHtml = r.nat
        ? `<img class="flag-img" src="https://flagcdn.com/16x12/${esc(r.nat.toLowerCase())}.png" alt="${esc(r.nat)}" loading="lazy">`
        : '';
      rows += `<div class="startlist-rider">${flagHtml}${esc(r.name)}</div>`;
    }
  }
  return `<div class="startlist-toggle" onclick="event.stopPropagation();this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block';this.querySelector('.sl-chev').textContent=this.nextElementSibling.style.display==='block'?'▲':'▼'">
    <span>👥 Startlist (${sl.length} riders)</span><span class="sl-chev">▼</span>
  </div>
  <div class="startlist-body" style="display:none"><div class="startlist-teams">${rows}</div></div>`;
}

function renderRaceCard(race, status) {
  const id = `rc-${cardIdx++}`;
  race._uid = id;
  const total = race.total_stages || 1;
  const done  = race.stages_completed || 0;
  const multi = total > 1;
  const upcoming = status === 'upcoming';

  const stagePill = multi
    ? (upcoming ? `${total} stages` : `${done}/${total} stages`)
    : '1-day';

  let body = '';
  if (upcoming) {
    const datesDiv = `<div class="upcoming-dates">📅 ${dateRange(race.start_date, race.end_date) || 'Dates TBC'}${multi ? ` &nbsp;·&nbsp; ${total} stages` : ''}</div>`;
    const stagesHtml = (multi && race.stages?.length) ? renderStages(race.stages, id) : '';
    const startlistHtml = renderStartlist(race);
    body = `<div class="race-body-inner">${datesDiv}${stagesHtml}${startlistHtml}</div>`;
  } else if (!multi) {
    const winSlug1d = race.top10 && race.top10[0] ? (race.top10[0].rider_url||'').replace('/profile/','').replace(/^\/+/,'').trim() : '';
    const winnerName1d = winSlug1d
      ? `<span class="rider-name-link" onclick="openRiderModal('${esc(winSlug1d)}')">${esc(race.winner)}</span>`
      : esc(race.winner||'');
    const w = race.winner ? `<div class="single-winner"><span class="label">Winner</span> ${esc(race.winner_flag||'')} ${winnerName1d}</div>` : '';
    body = `<div class="race-body-inner">${w}${renderStageImages(race)}${renderTop10(race.top10)}</div>`;
  } else {
    body = `<div class="race-body-inner">${renderLeaders(race)}${renderStages(race.stages||[], id)}</div>`;
  }

  const meta = dateRange(race.start_date, race.end_date);

  const MONUMENT_NAMES = ['Milano-Sanremo','Ronde van Vlaanderen','Paris-Roubaix','Liège-Bastogne-Liège','Il Lombardia','Strade Bianche'];
  const isMonument  = MONUMENT_NAMES.some(m => (race.name||'').includes(m));
  const isGrandTour = (race.total_stages||1) >= 21;

  return `<div class="race-card ${status}-card" id="${id}" data-cat="${esc(race.category||'')}" data-monument="${isMonument}" data-grandtour="${isGrandTour}" data-stages="${total}" data-start="${race.start_date||''}" data-end="${race.end_date||''}">
    <div class="race-header" onclick="toggleCard('${id}')">
      <div class="race-title">
        <div class="race-name">${esc(race.name||race.slug)}</div>
        ${meta ? `<div class="race-meta">${meta}</div>` : ''}
      </div>
      <div class="race-right">
        <span class="stage-pill">${stagePill}</span>
        ${race.category ? `<span class="cat-badge">${esc(race.category)}</span>` : ''}
        ${chevron('chevron')}
      </div>
    </div>
    <div class="race-body">${body}</div>
  </div>`;
}

function toggleCard(id) { document.getElementById(id)?.classList.toggle('open'); }

// ── Section renderers ──────────────────────────────────────────────────────────

function group(label, cards) {
  return cards.length ? `<div class="group-header">${label}</div>${cards}` : '';
}

function renderLive(races) {
  const el = document.getElementById('sec-live');
  if (!races.length) { el.innerHTML = '<p class="empty">No live races right now.</p>'; return; }
  el.innerHTML = races.map(r => renderRaceCard(r, 'live')).join('');
  // Auto-open single live race
  if (races.length === 1) el.querySelector('.race-card')?.classList.add('open');
  // Show live dot
  document.getElementById('live-dot').style.display = 'inline-block';
}

function renderUpcoming(races) {
  const el = document.getElementById('sec-upcoming');
  if (!races.length) { el.innerHTML = '<p class="empty">No upcoming races.</p>'; return; }
  const sorted = [...races].sort((a,b) => (a.start_date||'').localeCompare(b.start_date||''));
  const thisWeek  = sorted.filter(r => { const d=daysUntil(r.start_date); return d>=0&&d<7; });
  const nextWeek  = sorted.filter(r => { const d=daysUntil(r.start_date); return d>=7&&d<14; });
  const later     = sorted.filter(r => daysUntil(r.start_date) >= 14);
  el.innerHTML =
    group('This week',  thisWeek.map(r=>renderRaceCard(r,'upcoming')).join('')) +
    group('Next week',  nextWeek.map(r=>renderRaceCard(r,'upcoming')).join('')) +
    group('Coming up',  later.map(r=>renderRaceCard(r,'upcoming')).join('')) ||
    '<p class="empty">No upcoming races.</p>';
}

function renderRecent(races) {
  const el = document.getElementById('sec-recent');
  if (!races.length) { el.innerHTML = '<p class="empty">No recent results.</p>'; return; }
  const sorted = [...races].sort((a,b) => (b.end_date||'').localeCompare(a.end_date||''));
  const gt     = sorted.filter(r => r.category==='2.UWT' && (r.total_stages||1)>1);
  const stage  = sorted.filter(r => !gt.includes(r) && (r.total_stages||1)>1);
  const oneday = sorted.filter(r => (r.total_stages||1)===1);
  el.innerHTML =
    group('🏆 Grand Tours',      gt.map(r=>renderRaceCard(r,'recent')).join('')) +
    group('📋 Stage Races',      stage.map(r=>renderRaceCard(r,'recent')).join('')) +
    group('🏅 One-Day Classics', oneday.map(r=>renderRaceCard(r,'recent')).join(''));
}

// ── Teams ──────────────────────────────────────────────────────────────────────

function renderRiderRow(r, teamId, idx) {
  const uid = `rdr-${teamId}-${idx}`;
  const wins   = r.wins || [];
  const hasWins = wins.length > 0;
  const natImg = r.nat
    ? `<img src="https://cyclingflash.com/svg/flags/${esc(r.nat)}.svg" width="16" height="16" style="vertical-align:middle;margin-right:5px" loading="lazy">`
    : '';
  const photo = r.photo
    ? `<img class="rider-photo" src="${esc(r.photo)}" alt="${esc(r.name)}" loading="lazy">`
    : `<div class="rider-photo-ph">🚴</div>`;

  let dob = '';
  if (r.dob) {
    const d = new Date(r.dob);
    const age = Math.floor((Date.now() - d) / (365.25 * 86400000));
    dob = `${d.getFullYear()} · ${age} yrs`;
  } else if (r.age) {
    dob = `${r.age} yrs`;
  }

  const winsHTML = hasWins
    ? wins.slice(0, 20).map(w =>
        `<div class="win-entry">
          <span class="win-year">${esc(w.year)}</span>
          <span class="win-race">${esc(w.race)}</span>
          <span class="win-cat">${esc(w.cat)}</span>
        </div>`).join('')
    : '';

  return `<div class="rider-row-wrap" id="${uid}">
    <div class="rider-row${hasWins ? ' clickable' : ''}"${hasWins ? ` onclick="toggleRider('${uid}')"` : ''}>
      ${photo}
      <div class="rider-name-col">
        <div class="rider-name-text">${natImg}${esc(r.name)}</div>
        ${dob ? `<div class="rider-sub">${dob}</div>` : ''}
      </div>
      ${hasWins ? `<span class="wins-badge">🏆 ${wins.length}</span>` : ''}
      ${hasWins ? chevron('rider-chevron') : ''}
    </div>
    ${hasWins ? `<div class="wins-panel">${winsHTML}</div>` : ''}
  </div>`;
}

function toggleRider(uid) { document.getElementById(uid)?.classList.toggle('open'); }

let teamIdx = 0;

function renderTeamCard(team) {
  const id = `tc-${teamIdx++}`;
  const cat = (team.cat || '').toUpperCase();
  const catLabel = cat === 'UWT' ? '🌍 WorldTeam' : '🔵 ProTeam';
  const catCls   = cat === 'UWT' ? 'uwt' : 'pro';
  const jersey = team.jersey
    ? `<img class="team-jersey-thumb" src="${esc(team.jersey)}" alt="jersey" loading="lazy">`
    : `<div class="team-jersey-placeholder">👕</div>`;

  const riders = team.riders || [];
  const roster = riders.map((r, i) => renderRiderRow(r, id, i)).join('');
  const profiledCount = riders.filter(r => r.photo).length;
  const riderMeta = profiledCount < riders.length
    ? `${riders.length} riders (${riders.length - profiledCount} loading...)`
    : `${riders.length} riders`;

  return `<div class="team-card ${catCls}" id="${id}" data-cat="${cat}">

function searchRiders(q) {
  const resultEl = document.getElementById('rider-search-results');
  const teamsEl  = document.getElementById('teams-list');
  q = q.trim().toLowerCase();
  if (!q) {
    resultEl.style.display = 'none';
    teamsEl.style.display = '';
    return;
  }
  teamsEl.style.display = 'none';
  resultEl.style.display = '';

  const matches = [];
  for (const team of (appData.teams || [])) {
    for (const r of (team.riders || [])) {
      if ((r.name||'').toLowerCase().includes(q)) {
        matches.push({...r, teamName: team.name});
      }
    }
  }

  if (!matches.length) {
    resultEl.innerHTML = '<p class="empty" style="padding:16px">No riders found.</p>';
    return;
  }

  resultEl.innerHTML = `<div class="group-header">${matches.length} rider${matches.length>1?'s':''} found</div>` +
    matches.map((r, i) => renderRiderRow(r, 'search', i)).join('');
}

function openRiderModal(slug) {

  let baseInfo = null;
  for (const team of (appData.teams || [])) {

    if (r) { baseInfo = {...r, teamName: team.name}; break; }
  }

  const name     = (profile || baseInfo || {}).name || slug.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  const nat      = (profile || baseInfo || {}).nat || '';
  const photo    = (profile || {}).photo;
  const dob      = (profile || {}).dob;
  const wins     = (profile || {}).wins || [];
  const teamName = (baseInfo || {}).teamName || '';

  const photoEl = photo
    ? `<img class="rider-modal-photo" src="${esc(photo)}" alt="${esc(name)}">`
    : `<div class="rider-modal-photo-ph">🚴</div>`;

  let meta = '';
  if (nat) meta += `<img src="https://cyclingflash.com/svg/flags/${esc(nat)}.svg" width="14" height="14" style="vertical-align:middle;margin-right:4px">${nat}`;
  if (dob) {
    const age = Math.floor((Date.now() - new Date(dob)) / (365.25*86400000));
    meta += (meta ? ' · ' : '') + `Born ${dob} (${age} yrs)`;
  }
  if (teamName) meta += (meta ? '<br>' : '') + teamName;

  const winsHTML = wins.length
    ? wins.map(w => `<div class="win-entry"><span class="win-year">${esc(w.year)}</span><span class="win-race">${esc(w.race)}</span><span class="win-cat">${esc(w.cat)}</span></div>`).join('')
    : `<p class="rider-modal-no-data">No wins data yet — check back after next scrape</p>`;

  content.innerHTML = `
    <div class="rider-modal-header">
      ${photoEl}
      <div>
        <div class="rider-modal-name">${esc(name)}</div>
        ${meta ? `<div class="rider-modal-meta">${meta}</div>` : ''}

let appData = {};

async function loadData(force=false) {
  try {
    const url = force ? './data.json?t=' + Date.now() : './data.json';
    const opts = force ? {cache:'no-cache'} : {};
    const r = await fetch(url, opts);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);

    document.getElementById('last-updated').textContent = `Updated ${appData.scraped_at_human || '—'}`;
    document.getElementById('loading').style.display = 'none';

let _lastScrapedAt = '';
async function silentCheck() {
  try {
    const r = await fetch('./data.json?t=' + Date.now(), {cache: 'no-cache'});

    const d = await r.json();

const FANTASY_TEAM_KEY   = 'fantasy_my_team';
const FANTASY_LEAGUE_KEY = 'fantasy_league';
const FANTASY_WATCH_KEY  = 'fantasy_watchlist';
const FANTASY_DRAFT_KEY  = 'fantasy_draft';
const MAX_SQUAD     = 12;
const MAX_TRANSFERS = 5;
const MAX_WATCH     = 10;
const FANTASY_BUDGET = 125;   // total credits per team
const COST_FLOOR    = 4;      // cheapest rider
const COST_CEIL     = 22;     // most expensive rider (sqrt-scaled from race results)
const STAGE_PTS = {1:25,2:12,3:8,4:3,5:3,6:3,7:3,8:3,9:3,10:3};
const GC_PTS    = {1:50,2:30,3:20,4:8,5:8,6:8,7:8,8:8,9:8,10:8};
const JERSEY_PTS = 15;

let _fPicked = [];
let _fSwapOut = null;
let _riderCosts = {};   // name → credit cost

function buildRiderCosts(){
  // Compute form score for every rider from race results
  const scores={};
  for(const section of ['recent','live']){
    for(const race of (appData[section]||[])){
      for(const stage of (race.stages||[])){
        for(const r of (stage.top10||[])){
          if(r.name) scores[r.name]=(scores[r.name]||0)+(STAGE_PTS[r.rank]||0);
        }
      }
      const cl=race.classifications||{};
      for(const r of (cl.gc||[])){
        if(r.name) scores[r.name]=(scores[r.name]||0)+(GC_PTS[r.rank]||0);
      }
      for(const key of ['points','mountain','youth']){
        const lst=cl[key]||[];
        if(lst[0]&&lst[0].name) scores[lst[0].name]=(scores[lst[0].name]||0)+JERSEY_PTS;
      }
    }
  }
  const maxPts=Math.max(...Object.values(scores),1);
  _riderCosts={};
  for(const [name,pts] of Object.entries(scores)){
    _riderCosts[name]=Math.max(COST_FLOOR, Math.round(COST_FLOOR+(COST_CEIL-COST_FLOOR)*Math.sqrt(pts/maxPts)));
  }
}

function riderCost(name){ return _riderCosts[name]||COST_FLOOR; }
function squadCost(riders){ return riders.reduce((s,r)=>s+riderCost(r.name||r),0); }

function costColor(c){

  if(c>=12) return '#f97316';   // orange — mid-tier

  return 'var(--muted)';         // grey — budget
}

const normName = n => (n||'').toLowerCase().replace(/[^a-z]/g,' ').replace(/\s+/g,' ').trim();

function getAllRiders(){
  const riders=[],seen=new Set();
  // 1. Team rosters (full peloton once scraper has run)
  for(const team of (appData.teams||[])){
    for(const r of (team.riders||[])){
      if(r.name&&!seen.has(r.name)){seen.add(r.name);riders.push({name:r.name,slug:r.slug||'',nat:r.nat||'',photo:r.photo||'',teamName:team.name});}
    }
  }
  // 2. Race results — nat_code field holds the country code (e.g. "GB")
  for(const section of ['recent','live','upcoming']){
    for(const race of (appData[section]||[])){
      for(const stage of (race.stages||[])){
        for(const r of (stage.top10||[])){
          const nat=r.nat_code||r.nat||'';
          if(r.name&&!seen.has(r.name)){seen.add(r.name);riders.push({name:r.name,slug:'',nat:nat.toLowerCase(),photo:'',teamName:r.team||''});}
        }
      }
      const cl=race.classifications||{};
      for(const key of ['gc','points','mountain','youth']){
        for(const r of (cl[key]||[])){
          const nat=r.nat_code||r.nat||'';
          if(r.name&&!seen.has(r.name)){seen.add(r.name);riders.push({name:r.name,slug:'',nat:nat.toLowerCase(),photo:'',teamName:r.team||''});}
        }
      }
    }
  }
  return riders.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
}

function computePoints(riderNames,createdAt){
  const myNorm=new Set(riderNames.map(normName));
  const cutoff=createdAt?new Date(createdAt):null;
  let pts=0;const breakdown=[];
  for(const race of [...(appData.recent||[]),...(appData.live||[])]){
    if(cutoff&&race.end_date){const rd=new Date(race.end_date);if(rd<cutoff)continue;}
    for(const stage of (race.stages||[])){
      for(const r of (stage.top10||[])){
        if(r.rank>=1&&r.rank<=10&&myNorm.has(normName(r.name))){
          const p=STAGE_PTS[r.rank]||0;
          if(p>0){pts+=p;breakdown.push({race:race.name,label:'Stage '+stage.stage_num,rank:r.rank,pts:p,rider:r.name});}
        }
      }
    }
    const cl=race.classifications||{};
    for(const r of (cl.gc||[])){
      if(r.rank>=1&&r.rank<=10&&myNorm.has(normName(r.name))){
        const p=GC_PTS[r.rank]||0;
        if(p>0){pts+=p;breakdown.push({race:race.name,label:'GC',rank:r.rank,pts:p,rider:r.name});}
      }
    }
    const sp=(cl.points||[])[0];
    if(sp&&myNorm.has(normName(sp.name))){pts+=JERSEY_PTS;breakdown.push({race:race.name,label:'Sprint Jersey',rank:1,pts:JERSEY_PTS,rider:sp.name});}
    const km=(cl.mountain||[])[0];
    if(km&&myNorm.has(normName(km.name))){pts+=JERSEY_PTS;breakdown.push({race:race.name,label:'KOM Jersey',rank:1,pts:JERSEY_PTS,rider:km.name});}
  }
  return{total:pts,breakdown};
}

function renderFantasy(){
  const el=document.getElementById('sec-fantasy');
  if(!el)return;
  const myTeam=fantasyLoad();
  if(!myTeam||(myTeam.riders&&myTeam.riders.length<MAX_SQUAD)){
    if(myTeam&&myTeam.riders&&myTeam.riders.length>0){
      if(!draftLoad())draftSave({picked:myTeam.riders,name:myTeam.name||'',owner:myTeam.owner||''});
      localStorage.removeItem(FANTASY_TEAM_KEY);
    }
    _fPicked=[];
    el.innerHTML=renderFantasySetup();
    return;
  }
  const{total,breakdown}=computePoints(myTeam.riders.map(r=>r.name),myTeam.created_at);
  const league=leagueLoad();
  const allTeams=[{...myTeam,points:total,isMine:true},...league.map(t=>({...t,points:computePoints((t.riders||[]).map(r=>r.name),t.created_at).total}))];
  allTeams.sort((a,b)=>b.points-a.points);
  el.innerHTML='<div style="max-width:480px;margin:0 auto;padding:16px">'
    +renderHowToPlay()
    +renderRulesCard()
    +'</div>'
    +renderLeagueTable(allTeams)+renderMySquad(myTeam,total,breakdown)+renderWatchlist(watchLoad());
  // Wire up delegated events after render
  el.querySelectorAll('[data-pick]').forEach(el=>el.addEventListener('click',()=>fPickRider(el.dataset.pick)));
  el.querySelectorAll('[data-unpick]').forEach(el=>el.addEventListener('click',()=>fRemovePicked(el.dataset.unpick)));

  el.querySelectorAll('[data-doswap]').forEach(el=>el.addEventListener('click',()=>fDoSwap(el.dataset.doswap)));
  el.querySelectorAll('[data-addwatch]').forEach(el=>el.addEventListener('click',()=>fAddWatch(el.dataset.addwatch,el.dataset.nat||'',el.dataset.slug||'')));
}

function fSearchRiders(q){
  const el=document.getElementById('fRiderResults');if(!el)return;
  const raw=q.trim();
  const picked=new Set(_fPicked.map(r=>r.name));
  const all=getAllRiders().filter(r=>!picked.has(r.name));
  let matches;
  if(!raw){
    // show first 20 alphabetically on focus/empty
    matches=all.slice(0,20);
  } else {
    const lq=raw.toLowerCase();
    // prioritise names that START with query, then contains
    const starts=all.filter(r=>(r.name||'').toLowerCase().startsWith(lq));
    const contains=all.filter(r=>!(r.name||'').toLowerCase().startsWith(lq)&&(r.name||'').toLowerCase().includes(lq));
    matches=[...starts,...contains].slice(0,20);
  }
  if(!all.length){
    el.style.display='block';
    el.innerHTML='<div style="padding:12px;color:var(--muted);font-size:.85rem">No rider data yet — run the scraper first.</div>';
    return;
  }
  if(!matches.length){el.style.display='block';el.innerHTML='<div style="padding:12px;color:var(--muted);font-size:.85rem">No riders found</div>';return;}
  el.style.display='block';
  const spent=squadCost(_fPicked);
  const remaining=FANTASY_BUDGET-spent;
  el.innerHTML=matches.map(r=>{
    const c=riderCost(r.name);
    const canAfford=c<=remaining&&_fPicked.length<MAX_SQUAD;
    return '<div data-pick="'+esc(r.name)+'" style="padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);transition:background .15s;opacity:'+(canAfford?'1':'.45')+'" onmouseenter="this.style.background=\'var(--surface)\'" onmouseleave="this.style.background=\'\'">'
      +(r.nat?flag(r.nat):'<span style="width:20px;display:inline-block"></span>')
      +'<span style="flex:1;font-size:.9rem">'+esc(r.name)+'</span>'
      +'<span style="font-size:.75rem;color:var(--muted);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.teamName||'')+'</span>'
      +costBadge(r.name)
    +'</div>';
  }).join('');
  el.querySelectorAll('[data-pick]').forEach(node=>node.addEventListener('click',()=>fPickRider(node.dataset.pick)));
}

function fPickRider(name){
  if(_fPicked.length>=MAX_SQUAD){alert('Squad full! You need exactly 12 riders.');return;}
  const r=getAllRiders().find(r=>r.name===name);
  if(!r||_fPicked.find(p=>p.name===name))return;
  const cost=riderCost(name);
  const spent=squadCost(_fPicked);
  if(spent+cost>FANTASY_BUDGET){alert('Not enough budget! '+name+' costs '+cost+' cr but you only have '+(FANTASY_BUDGET-spent)+' cr left.');return;}
  _fPicked.push(r);
  const srch=document.getElementById('fRiderSearch');if(srch)srch.value='';
  const res=document.getElementById('fRiderResults');if(res)res.style.display='none';
  renderPickedList();
  _fSaveDraft();
}

function fRemovePicked(name){
  _fPicked=_fPicked.filter(r=>r.name!==name);
  renderPickedList();
  _fSaveDraft();
}

function _fSaveDraft(){
  const nameEl=document.getElementById('fTeamName'),ownerEl=document.getElementById('fOwnerName');
  draftSave({picked:[..._fPicked],name:nameEl?nameEl.value:'',owner:ownerEl?ownerEl.value:''});
}

function _fUpdateSquadUI(){
  const n=_fPicked.length;

function _pinHash(p){return p.split('').reduce((h,c)=>((h<<5)-h+c.charCodeAt(0))|0,5381).toString(36);}
function fVerifyPin(team,action,onOk){
  if(!team.pin_hash){onOk();return;}
  const entered=(prompt('Enter your 4-digit PIN to '+action+':','')+'').trim();
  if(!entered)return;
  if(_pinHash(entered)!==team.pin_hash){alert('\u274c Incorrect PIN.');return;}
  onOk();
}
function fCreateTeam(){
  const nameEl=document.getElementById('fTeamName'),ownerEl=document.getElementById('fOwnerName'),pinEl=document.getElementById('fTeamPin');
  const name=nameEl?nameEl.value.trim():'',owner=ownerEl?ownerEl.value.trim():'';
  const pin=(pinEl?pinEl.value:'').trim();
  if(!name||!owner){alert('Please enter a team name and owner name.');return;}
  if(_fPicked.length!==MAX_SQUAD){alert('You must pick exactly 12 riders. You have '+_fPicked.length+'.');return;}
  if(!/^\d{4}$/.test(pin)){alert('Please set a 4-digit PIN to protect your team.');return;}
  fantasySave({name,owner,riders:[..._fPicked],transfers_used:0,transfers_total:MAX_TRANSFERS,created_at:new Date().toISOString(),pin_hash:_pinHash(pin)});
  draftClear();
  _fPicked=[];
  renderFantasy();
}

function fSearchSwap(q){
  const el=document.getElementById('fSwapResults');if(!el)return;
  const raw=q.trim();
  const team=fantasyLoad();
  const squad=new Set((team&&team.riders||[]).map(r=>r.name));
  const all=getAllRiders().filter(r=>!squad.has(r.name));
  let matches;
  if(!raw){
    matches=all.slice(0,20);
  } else {
    const lq=raw.toLowerCase();
    const starts=all.filter(r=>(r.name||'').toLowerCase().startsWith(lq));
    const contains=all.filter(r=>!(r.name||'').toLowerCase().startsWith(lq)&&(r.name||'').toLowerCase().includes(lq));
    matches=[...starts,...contains].slice(0,20);
  }
  if(!all.length){el.style.display='block';el.innerHTML='<div style="padding:10px;color:var(--muted);font-size:.85rem">No rider data yet.</div>';return;}
  if(!matches.length){el.style.display='block';el.innerHTML='<div style="padding:10px;color:var(--muted);font-size:.85rem">No riders found</div>';return;}
  el.style.display='block';
  const curCost=squadCost(team&&team.riders||[]);
  const outCost=riderCost(_fSwapOut||'');
  el.innerHTML=matches.map(r=>{
    const c=riderCost(r.name);
    const netChange=c-outCost;
    const affordable=(curCost-outCost+c)<=FANTASY_BUDGET;
    const changeStr=netChange>0?'+'+netChange:netChange===0?'±0':''+netChange;
    const changeCol=netChange>0?'var(--live)':netChange<0?'#2dd36f':'var(--muted)';
    return '<div data-doswap="'+esc(r.name)+'" style="padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);transition:background .15s;opacity:'+(affordable?'1':'.4')+'" onmouseenter="this.style.background=\'var(--surface2)\'" onmouseleave="this.style.background=\'\'">'
      +(r.nat?flag(r.nat):'<span style="width:20px;display:inline-block"></span>')
      +'<span style="flex:1;font-size:.88rem">'+esc(r.name)+'</span>'
      +costBadge(r.name)
      +'<span style="font-size:.72rem;font-weight:700;color:'+changeCol+';min-width:26px;text-align:right">'+changeStr+'</span>'
    +'</div>';
  }).join('');
  el.querySelectorAll('[data-doswap]').forEach(node=>node.addEventListener('click',()=>fDoSwap(node.dataset.doswap)));
}

function fDoSwap(inName){
  const team=fantasyLoad();if(!team)return;
  if((team.transfers_used||0)>=team.transfers_total){alert('No transfers remaining!');return;}
  const inR=getAllRiders().find(r=>r.name===inName);if(!inR)return;
  const outCost=riderCost(_fSwapOut);
  const inCost=riderCost(inName);
  const currentCost=squadCost(team.riders);
  const newCost=currentCost-outCost+inCost;
  if(newCost>FANTASY_BUDGET){alert('Over budget! Swapping in '+inName+' ('+inCost+' cr) would take your squad to '+newCost+' cr — budget is '+FANTASY_BUDGET+' cr.');return;}
  fVerifyPin(team,'confirm this transfer',()=>{
    team.riders=team.riders.map(r=>r.name===_fSwapOut?inR:r);
    team.transfers_used=(team.transfers_used||0)+1;
    fantasySave(team);renderFantasy();
  });
}

// ── League Table ──────────────────────────────────────────────────────────────

function renderLeagueTable(teams){
  const medals=['🥇','🥈','🥉'];
  const single=teams.length===1&&teams[0].isMine;
  const leaderPts=teams.length>0?teams[0].points:0;
  function fmtDate(iso){if(!iso)return'';try{const d=new Date(iso);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return'';}}
  return '<div style="margin-bottom:16px">'
    +'<div class="group-header">🏆 League Table</div>'
    +'<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden">'
      +teams.map((t,i)=>{
        const gap=i===0
          ?'<span style="font-size:.7rem;font-weight:700;color:var(--upcoming);letter-spacing:.5px">LEADER</span>'
          :'<span style="font-size:.78rem;color:var(--live);font-weight:600">−'+(leaderPts-t.points)+' pts</span>';
        const created=t.created_at?'<span style="font-size:.7rem;color:var(--muted)"> · From '+fmtDate(t.created_at)+'</span>':'';
        return '<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;'+(t.isMine?'background:rgba(67,97,238,.1)':'')+'">'
          +'<span style="font-size:1.1rem;min-width:26px">'+(medals[i]||(i+1))+'</span>'
          +'<div style="flex:1;min-width:0">'
            +'<div style="font-weight:600;font-size:.92rem">'+esc(t.name)+(t.isMine?' <span style="font-size:.68rem;background:var(--upcoming);color:#fff;padding:1px 6px;border-radius:10px">YOU</span>':'')+' </div>'
            +'<div style="font-size:.76rem;color:var(--muted)">'+esc(t.owner)+created+'</div>'
          +'</div>'
          +'<div style="text-align:right">'
            +'<div style="font-size:1.2rem;font-weight:800;color:var(--gold)">'+t.points+'</div>'
            +'<div style="margin-top:1px">'+gap+'</div>'
          +'</div>'
        +'</div>';
      }).join('')
      +'<div style="padding:10px 14px">'
        +(single?'<div style="font-size:.82rem;color:var(--muted);margin-bottom:8px">Share your export code with friends to build a league.</div>':'')
        +'<button onclick="fImportTeam()" style="width:100%;padding:9px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer">+ Import a Friend\'s Team</button>'
      +'</div>'
    +'</div>'
  +'</div>';
}
// ── Watchlist ─────────────────────────────────────────────────────────────────

function renderWatchlist(watchlist){
  const allRaces=[...(appData.recent||[]),...(appData.live||[])];
  const watched=watchlist.map(w=>{
    let wins=0,top3=0,pts=0;
    for(const race of allRaces){
      for(const stage of (race.stages||[])){
        const r=(stage.top10||[]).find(r=>normName(r.name)===normName(w.name));
        if(r){if(r.rank===1)wins++;if(r.rank<=3)top3++;pts+=(STAGE_PTS[r.rank]||0);}
      }
      const cl=race.classifications||{};
      for(const r of (cl.gc||[])){if(normName(r.name)===normName(w.name)){pts+=(GC_PTS[r.rank]||0);}}
    }
    return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;position:relative">'
      +'<button data-unwatch="'+esc(w.name)+'" style="position:absolute;top:8px;right:8px;background:none;border:none;color:var(--muted);font-size:.85rem;cursor:pointer;line-height:1">✕</button>'
      +(w.nat?'<img src="https://cyclingflash.com/svg/flags/'+esc(w.nat)+'.svg" width="22" height="16" style="margin-bottom:4px">':'')
      +'<div style="font-size:.88rem;font-weight:700;margin-bottom:8px;padding-right:24px">'+esc(w.name)+'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center">'
        +'<div style="background:var(--surface2);border-radius:5px;padding:6px 4px"><div style="font-size:1.1rem;font-weight:800;color:var(--gold)">'+wins+'</div><div style="font-size:.62rem;color:var(--muted)">WINS</div></div>'
        +'<div style="background:var(--surface2);border-radius:5px;padding:6px 4px"><div style="font-size:1.1rem;font-weight:800">'+top3+'</div><div style="font-size:.62rem;color:var(--muted)">TOP 3</div></div>'
        +'<div style="background:var(--surface2);border-radius:5px;padding:6px 4px"><div style="font-size:1.1rem;font-weight:800;color:var(--upcoming)">'+pts+'</div><div style="font-size:.62rem;color:var(--muted)">PTS</div></div>'
      +'</div>'
    +'</div>';
  });

  const canAdd=watchlist.length<MAX_WATCH;
  const addCard=canAdd?'<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:90px">'
    +'<div style="font-size:.78rem;color:var(--muted);margin-bottom:6px">Follow a rider</div>'
    +'<input id="fWatchSearch" type="search" placeholder="Type name to search riders…" autocomplete="off" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:.85rem;outline:none" oninput="fSearchWatch(this.value)" onfocus="fSearchWatch(this.value)">'
    +'<div id="fWatchResults" style="max-height:160px;overflow-y:auto;margin-top:6px;display:none;border:1px solid var(--border);border-radius:6px;background:var(--surface2)"></div>'
  +'</div>':'';

  return '<div>'
    +'<div class="group-header">👁 Rider Watchlist ('+watchlist.length+'/'+MAX_WATCH+')</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
      +watched.join('')+addCard
    +'</div>'
  +'</div>';
}

function fSearchWatch(q){
  const el=document.getElementById('fWatchResults');if(!el)return;
  const raw=q.trim();
  const watched=new Set(watchLoad().map(w=>w.name));
  const all=getAllRiders().filter(r=>!watched.has(r.name));
  let matches;
  if(!raw){
    matches=all.slice(0,15);
  } else {
    const lq=raw.toLowerCase();
    const starts=all.filter(r=>(r.name||'').toLowerCase().startsWith(lq));
    const contains=all.filter(r=>!(r.name||'').toLowerCase().startsWith(lq)&&(r.name||'').toLowerCase().includes(lq));
    matches=[...starts,...contains].slice(0,15);
  }
  if(!matches.length&&!all.length){el.style.display='none';return;}
  if(!matches.length){el.style.display='block';el.innerHTML='<div style="padding:10px;color:var(--muted);font-size:.82rem">No riders found</div>';return;}
  el.style.display='block';
  el.innerHTML=matches.map(r=>
    '<div data-addwatch="'+esc(r.name)+'" data-nat="'+esc(r.nat||'')+'" data-slug="'+esc(r.slug||'')+'" style="padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);transition:background .15s" onmouseenter="this.style.background=\'var(--surface)\'" onmouseleave="this.style.background=\'\'">'
      +(r.nat?flag(r.nat):'<span style="width:20px;display:inline-block"></span>')
      +'<span style="flex:1;font-size:.85rem">'+esc(r.name)+'</span>'
      +'<span style="color:var(--upcoming);font-weight:700">+</span>'
    +'</div>'
  ).join('');
  el.querySelectorAll('[data-addwatch]').forEach(node=>node.addEventListener('click',()=>fAddWatch(node.dataset.addwatch,node.dataset.nat||'',node.dataset.slug||'')));
}

function fAddWatch(name,nat,slug){
  const w=watchLoad();
  if(w.length>=MAX_WATCH||w.find(x=>x.name===name))return;
  watchSave([...w,{name,nat:nat||'',slug:slug||''}]);
  renderFantasy();
}

function fRemoveWatch(name){
  watchSave(watchLoad().filter(w=>w.name!==name));
  renderFantasy();
}

// ── Export / Import ───────────────────────────────────────────────────────────

function fExportTeam(){
  const team=fantasyLoad();if(!team)return;
  const{total}=computePoints((team.riders||[]).map(r=>r.name),team.created_at);
  const code=btoa(unescape(encodeURIComponent(JSON.stringify({...team,points:total}))));
  navigator.clipboard&&navigator.clipboard.writeText(code).catch(()=>{});
  const box=fModal(
    '📤 Your Team Code',
    '<div style="font-size:.72rem;color:var(--muted);margin-bottom:8px">Share this with friends so they can import your team.</div>'
    +'<textarea readonly style="width:100%;height:80px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:.72rem;resize:none;word-break:break-all;font-family:monospace">'+esc(code)+'</textarea>'
    +'<div style="font-size:.75rem;color:#2dd36f;margin:6px 0">✓ Copied to clipboard</div>'
  );
  box.querySelector('button').textContent='Done';
}

function fImportTeam(){
  fModal(
    '📥 Import a Team',
    '<div style="font-size:.82rem;color:var(--muted);margin-bottom:10px">Paste a team export code:</div>'
    +'<textarea id="fImportBox" style="width:100%;height:90px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:.72rem;font-family:monospace;resize:none;outline:none" placeholder="Paste code here…"></textarea>',
    function(){
      const box=document.getElementById('fImportBox');
      if(box)fDoImport(box.value);
    },'Import'
  );
}

function fModal(title,body,onConfirm,confirmLabel){
  const box=document.createElement('div');
  box.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;width:90%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.6)';
  const btns=onConfirm
    ?'<button id="fModalCancel" style="flex:1;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-weight:600;cursor:pointer">Cancel</button>'
     +'<button id="fModalOk" style="flex:1;padding:10px;background:var(--upcoming);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer">'+(confirmLabel||'OK')+'</button>'
    :'<button id="fModalOk" style="width:100%;padding:10px;background:var(--upcoming);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer">Done</button>';
  box.innerHTML='<div style="font-weight:700;margin-bottom:10px">'+title+'</div>'+body+'<div style="display:flex;gap:8px;margin-top:12px">'+btns+'</div>';
  document.body.appendChild(box);
  box.querySelector('#fModalOk').addEventListener('click',()=>{if(onConfirm)onConfirm();box.remove();});
  const cancel=box.querySelector('#fModalCancel');
  if(cancel)cancel.addEventListener('click',()=>box.remove());
  return box;
}

function fDoImport(code){
  try{
    const team=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    if(!team.name||!team.owner||!Array.isArray(team.riders))throw new Error('bad');
    const league=leagueLoad();
    const idx=league.findIndex(t=>t.owner===team.owner&&t.name===team.name);
    if(idx>=0)league[idx]=team;else league.push(team);
    leagueSave(league);renderFantasy();
    alert('"'+team.name+'" ('+team.owner+') added!');
  }catch(e){alert('Invalid code. Ask your friend to re-export.');}
}

function fDeleteTeam(){
  const team=fantasyLoad();if(!team)return;
  if(!confirm('Delete your fantasy team? This cannot be undone.'))return;
  fVerifyPin(team,'delete your team',()=>{
    localStorage.removeItem(FANTASY_TEAM_KEY);
    _fPicked=[];
    renderFantasy();
  });
}


</script>
</body>
